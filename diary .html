<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QOL -diary-</title>
  <meta name="version" content="1.0">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f0e8df;
    --paper: #1a1612;
    --paper2: #221e1a;
    --accent: #c17f3a;
    --accent2: #a8642a;
    --muted: #9a8a7a;
    --border: rgba(255,255,255,0.10);
    --card-bg: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ヘッダー */
  .header {
    padding: 16px 20px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .header-date {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: #ffffff;
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }
  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    color: #f5efe6;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .header-subtitle {
    font-size: 15px;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  /* セクション */
  .section { padding: 8px 16px 0; }
  .section-label {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 8px;
  }

  /* カードグリッド */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 12px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .card:active { background: rgba(255,255,255,0.8); }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-icon { font-size: 20px; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-tag {
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-word {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    color: var(--ink);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  /* ローディング点滅 */
  .loading-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* カレンダーボタン */
  .cal-btn {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.05em;
  }

  /* 日記エリア */
  .diary-section { padding: 8px 16px 0; }
  .diary-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .diary-box:focus-within {
    border: 2px solid rgba(139,69,19,0.35);
  }
  .diary-prompt {
    padding: 12px 14px 6px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .diary-input {
    width: 100%;
    padding: 4px 14px 14px;
    font-size: 18px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    min-height: 180px;
    line-height: 1.8;
    caret-color: #8b4513;
  }
  .diary-input::placeholder { color: var(--accent2); opacity: 0.6; }
  .diary-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 12px;
    border-top: 1px solid var(--border);
  }
  .char-count { font-size: 12px; color: var(--muted); }
  .save-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
  }

  /* モーダル（×ボタン付きシート） */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.65);
    z-index: 9999;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--paper);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body {
    overflow-y: auto;
    padding: 16px 20px 48px;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink);
    -webkit-overflow-scrolling: touch;
  }
  .modal-body b {
    font-family: 'Shippori Mincho', serif;
    color: var(--accent);
    display: block;
    margin-top: 16px;
    margin-bottom: 4px;
    font-size: 16px;
  }
  .modal-body b:first-child { margin-top: 0; }
  .modal-body .hl { color: var(--accent2); font-weight: 600; }

  /* カレンダー */
  .cal-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px; height: 34px;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
  }
  .cal-month { font-family: 'Shippori Mincho', serif; font-size: 17px; color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }

  /* 履歴 */
  .history-entry {
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .history-time { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .history-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.7;
  }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,8,0,0.85);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  body.modal-open { overflow: hidden; position: fixed; width: 100%; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">

</div>

<!-- 今日の豆知識 -->

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QOL App v1.0
// 初版リリース: 2026-04-18
// 機能: 日記・カレンダー・365日分データ・運勢・誕生石・誕生花
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const APP_VERSION = '1.0';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 効果音（Web Audio API）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

function playSound(type) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  try {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);

    if (type === 'tap') {
      // カードタップ：短い明るい音
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.15);
    } else if (type === 'open') {
      // モーダルオープン：上昇音
      o.type = 'sine';
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.25);
    } else if (type === 'close') {
      // モーダルクローズ：下降音
      o.type = 'sine';
      o.frequency.setValueAtTime(660, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.18);
    } else if (type === 'save') {
      // 保存：明るいチャイム音
      var freqs = [523, 659, 784, 1047];
      freqs.forEach(function(freq, i) {
        var o2 = ctx.createOscillator();
        var g2 = ctx.createGain();
        o2.connect(g2);
        g2.connect(ctx.destination);
        o2.type = 'sine';
        o2.frequency.value = freq;
        var t = ctx.currentTime + i * 0.1;
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(0.15, t + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        o2.start(t);
        o2.stop(t + 0.3);
      });
      return;
    } else if (type === 'fortune') {
      // 運勢オープン：神秘的な和音
      var fqs = [392, 494, 587, 740];
      fqs.forEach(function(freq, i) {
        var o3 = ctx.createOscillator();
        var g3 = ctx.createGain();
        o3.connect(g3);
        g3.connect(ctx.destination);
        o3.type = 'sine';
        o3.frequency.value = freq;
        g3.gain.setValueAtTime(0.10, ctx.currentTime);
        g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        o3.start(ctx.currentTime);
        o3.stop(ctx.currentTime + 0.6);
      });
      return;
    }
  } catch(e) {}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 固定設定
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const settings = { name: '未来', birthday: '1984-05-15', location: '茨城県' };
let diaries = {};
let aiData = {};
let calYear, calMonth;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ストレージ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadFromStorage() {
  try {
    const r = await window.storage.get('diaries');
    if (r && r.value) diaries = JSON.parse(r.value);
  } catch(e) { diaries = {}; }
}

async function saveDiary(key, text) {
  const now = new Date();
  if (!diaries[key]) diaries[key] = [];
  diaries[key].push({ text, time: now.toISOString() });
  try { await window.storage.set('diaries', JSON.stringify(diaries)); } catch(e) {}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 占い計算
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function numReduce(n) {
  if (n === 11 || n === 22 || n === 33) return n;
  if (n < 10) return n;
  return numReduce(String(n).split('').reduce((a,b)=>a+parseInt(b),0));
}
function calcLifePath(birthday) {
  const d = new Date(birthday);
  return numReduce(numReduce(d.getFullYear()) + numReduce(d.getMonth()+1) + numReduce(d.getDate()));
}
function calcPersonalYear(birthday, year) {
  const d = new Date(birthday);
  return numReduce(numReduce(year) + numReduce(d.getMonth()+1) + numReduce(d.getDate()));
}
function calcPersonalMonth(birthday, year, month) {
  return numReduce(calcPersonalYear(birthday, year) + numReduce(month));
}
function calcPersonalDay(birthday, year, month, day) {
  return numReduce(calcPersonalMonth(birthday, year, month) + numReduce(day));
}

// 九星気学
const KYUSEI = [null,
  {n:'一白水星',el:'水',color:'白・黒',dir:'北',trait:'知性・柔軟性'},
  {n:'二黒土星',el:'土',color:'黒・黄',dir:'南西',trait:'忍耐・勤勉'},
  {n:'三碧木星',el:'木',color:'碧・緑',dir:'東',trait:'活発・行動力'},
  {n:'四緑木星',el:'木',color:'緑',dir:'東南',trait:'信用・誠実'},
  {n:'五黄土星',el:'土',color:'黄',dir:'中央',trait:'カリスマ・強運'},
  {n:'六白金星',el:'金',color:'白・金',dir:'北西',trait:'完璧主義・リーダー'},
  {n:'七赤金星',el:'金',color:'赤・金',dir:'西',trait:'社交・楽しむ'},
  {n:'八白土星',el:'土',color:'白・黄',dir:'北東',trait:'変革・積み重ね'},
  {n:'九紫火星',el:'火',color:'紫・赤',dir:'南',trait:'直感・芸術'}
];
const KYUSEI_LUCK = {
  fortune: [
    null,
    {label:'△ 注意', desc:'無理は禁物。穏やかに過ごして。'},
    {label:'△ やや注意', desc:'慎重に行動すると吉。'},
    {label:'○ 普通', desc:'着実に進める日。'},
    {label:'◎ 良好', desc:'積極的に動くと吉。'},
    {label:'✦ 最高', desc:'何事も上手くいく絶好調の日。'}
  ]
};

function getKyuseiYear(y, m, d) {
  if (m < 2 || (m === 2 && d < 4)) y--;
  let s = y;
  while (s >= 10) s = String(s).split('').reduce((a,b)=>a+parseInt(b),0);
  let star = 11 - s;
  while (star > 9) star -= 9;
  while (star <= 0) star += 9;
  return star;
}
function getKyuseiMonth(year, month, day) {
  let y = year, m = month;
  if (day < 6) { m--; if (m < 1) { m = 12; y--; } }
  const ys = getKyuseiYear(y, 6, 15);
  const base = {1:8,4:8,7:8,2:5,5:5,8:5,3:2,6:2,9:2}[ys];
  let star = base - ((m - 2 + 12) % 12);
  while (star <= 0) star += 9;
  while (star > 9) star -= 9;
  return star;
}
function getKyuseiDay(date) {
  const base = new Date(2000, 0, 9);
  const diff = Math.floor((date - base) / 86400000);
  let star = 9 - (diff % 9);
  while (star <= 0) star += 9;
  while (star > 9) star -= 9;
  return star;
}
function getKyuseiLuckScore(honmei, daystar) {
  const el = [null,'水','土','木','木','土','金','金','土','火'];
  const generate = {水:'木',木:'火',火:'土',土:'金',金:'水'};
  const overcome  = {水:'火',火:'金',金:'木',木:'土',土:'水'};
  const hEl = el[honmei], dEl = el[daystar];
  if (generate[hEl] === dEl) return 5;
  if (generate[dEl] === hEl) return 4;
  if (overcome[hEl]  === dEl) return 2;
  if (overcome[dEl]  === hEl) return 1;
  return 3;
}

// 四柱推命
const JIKKAN  = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const JUNISHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JIKKAN_EL = ['木','木','火','火','土','土','金','金','水','水'];
const JIKKAN_TRAIT = ['積極・创始','柔和・継続','情熱・明快','礼儀・感受','信義・重厚','誠実・謙虚','決断・公正','義理・繊細','包容・知恵','適応・神秘'];

function getShichuYear(year, month, day) {
  let y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  const kan = ((y - 4) % 10 + 10) % 10;
  const shi = ((y - 4) % 12 + 12) % 12;
  return { kan, shi, text: JIKKAN[kan] + JUNISHI[shi] };
}
function getShichuMonth(year, month, day) {
  let m = month, y = year;
  if (day < 6) { m--; if (m < 1) { m = 12; y--; } }
  const yk = ((y - 4) % 10 + 10) % 10;
  const base = [2,4,6,8,0,2,4,6,8,0][yk];
  const mft = (m - 2 + 12) % 12;
  const kan = (base + mft) % 10;
  const shi = (2 + mft) % 12;
  return { kan, shi, text: JIKKAN[kan] + JUNISHI[shi] };
}
function getShichuDay(date) {
  const base = new Date(1900, 0, 1);
  const diff = Math.floor((date - base) / 86400000);
  const kan = diff % 10;
  const shi = (10 + diff) % 12;
  return { kan, shi, text: JIKKAN[kan] + JUNISHI[shi] };
}
function getDaiunCycle(bYear, bMonth, bDay) {
  const yk = ((bYear - 4) % 10 + 10) % 10;
  const isYang = yk % 2 === 0;
  const isForward = isYang; // 男性固定
  const todayD = new Date();
  const age = todayD.getFullYear() - bYear;
  const cycleNum = Math.floor(age / 10);
  const yearInCycle = age % 10;
  const bmp = getShichuMonth(bYear, bMonth, bDay);
  const offset = isForward ? cycleNum + 1 : -(cycleNum + 1);
  const dKan = ((bmp.kan + offset) % 10 + 10) % 10;
  const dShi = ((bmp.shi + offset) % 12 + 12) % 12;
  return { text: JIKKAN[dKan]+JUNISHI[dShi], cycleNum, yearInCycle, nextIn: 10-yearInCycle, direction: isForward?'順行':'逆行' };
}

function getRokuyo(year, month, day) {
  const rk = ['大安','赤口','先勝','友引','先負','仏滅'];
  const kyureki = [31,0,31,30,31,30,31,31,30,31,30,31];
  let m = month, y = year;
  if (m <= 2) { m += 12; y--; }
  const jd = Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + day - 1524;
  const lm = Math.floor((jd - 2451551.5) / 29.53059);
  const ld = Math.round((jd - 2451551.5) - lm * 29.53059);
  return rk[(month + day + ld) % 6];
}

function getFlowerForDate(key) {
  return BIRTH_FLOWERS[key] || null;

function getStoneForDate(key) {
  if (BIRTH_STONES[key]) return BIRTH_STONES[key];
  const [m, d] = key.split('/').map(Number);
  for (let offset = 1; offset <= 15; offset++) {
    const d1 = new Date(2024, m-1, d-offset);
    const k1 = (d1.getMonth()+1)+'/'+d1.getDate();
    if (BIRTH_STONES[k1]) return BIRTH_STONES[k1];
    const d2 = new Date(2024, m-1, d+offset);
    const k2 = (d2.getMonth()+1)+'/'+d2.getDate();
    if (BIRTH_STONES[k2]) return BIRTH_STONES[k2];
  }
  return null;
}

// モーダル（document.createElement方式）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openDetailModal(icon, title, htmlContent, imageKeyword) {
  if (!htmlContent) return;
  var ex = document.getElementById('simpleModal');
  if (ex) ex.remove();

  var imgHtml = imageKeyword
    ? '<img src="https://loremflickr.com/480/220/' + encodeURIComponent(imageKeyword) + '" style="width:100%;border-radius:10px;display:block;margin-bottom:16px;" onerror="this.style.display=\'none\'">'
    : '';

  var modal = document.createElement('div');
  modal.id = 'simpleModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(26,20,16,0.7);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
  modal.innerHTML = '<div style="background:#f7f3ec;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px 20px;border-bottom:1px solid rgba(139,69,19,0.18);flex-shrink:0;">'
    + '<div style="font-family:\'Shippori Mincho\',serif;font-size:20px;font-weight:600;color:#8b4513;">' + icon + ' ' + title + '</div>'
    + '<button onclick="document.getElementById(\'simpleModal\').remove();document.body.classList.remove(\'modal-open\');playSound(\'close\')" style="background:none;border:1px solid rgba(139,69,19,0.18);border-radius:50%;width:32px;height:32px;font-size:14px;color:#5a4a3a;cursor:pointer;flex-shrink:0;">✕</button>'
    + '</div>'
    + '<div style="overflow-y:auto;padding:16px 20px 48px;font-size:15px;line-height:1.9;color:#1a0800;-webkit-overflow-scrolling:touch;">'
    + imgHtml + htmlContent
    + '</div></div>';
  document.body.classList.add('modal-open');
  document.body.appendChild(modal);
  playSound('open');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// renderCards
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCards(cards) {
  var grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  cards.forEach(function(card, i) {
    var div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-' + i;

    if (card.isAI || card.isZatsudan || card.isNazo) {
      var loadId = card.isAI ? 'ai-word' : card.isZatsudan ? 'zatsu-word' : 'nazo-word';
      var showDots = !card.isNazo; // なぞなぞは固定データなのでドット不要
      div.innerHTML = '<div class="card-header">'
        + '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-meta"><div class="card-tag">' + card.tag + '</div>'
        + (showDots ? '<div class="card-word" id="' + loadId + '"><span class="loading-dots"><span></span><span></span><span></span></span></div>' : '')
        + '</div></div>';
      var detailId = card.isAI ? 'ai-modal-body' : card.isZatsudan ? 'zatsu-modal-body' : 'nazo-modal-body';
      var icon = card.icon, tag = card.tag;
      div.addEventListener('click', function() {
        playSound('tap');
        var el = document.getElementById(detailId);
        if (el && el.innerHTML && el.innerHTML.trim()) {
          openDetailModal(icon, tag, el.innerHTML);
        }
      });
    } else if (card.isNews) {
      div.innerHTML = '<div class="card-header">'
        + '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-meta"><div class="card-tag">' + card.tag + '</div>'
        + '</div></div>';
      div.addEventListener('click', function() {
        playSound('tap');
        var el = document.getElementById('news-modal-body');
        if (el && el.innerHTML && el.innerHTML.trim()) {
          openDetailModal('📰', '今日のニュース', el.innerHTML, null);
        }
      });
    } else if (card.isCal) {
      div.innerHTML = '<div class="card-header" style="justify-content:center;">'
        + '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-meta"><div class="card-tag" style="font-size:14px;">' + card.tag + '</div></div>'
        + '</div>';
      div.style.cursor = 'pointer';
      div.addEventListener('click', function() { playSound('tap'); openCalModal(); });
    } else if (card.isFortune) {
      div.innerHTML = '<div class="card-header">'
        + '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-meta"><div class="card-tag">' + card.tag + '</div></div>'
        + '</div>';
      var fDetail = card.detail || '';
      var fIcon = card.icon, fTag = card.tag;
      div.addEventListener('click', function() {
        playSound('fortune');
        openDetailModal(fIcon, fTag, fDetail, null);
      });
    } else {
      div.innerHTML = '<div class="card-header">'
        + '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-meta"><div class="card-tag">' + card.tag + '</div></div>'
        + '</div>';
      var detail = card.detail || '';
      var icon2 = card.icon, tag2 = card.tag, imgkw = card.imageKeyword || '';
      div.addEventListener('click', function() {
        playSound('tap');
        openDetailModal(icon2, tag2, detail, imgkw || null);
      });
    }
    grid.appendChild(div);
  });
}

    {m:'他人に親切にしなさい。誰もが厳しい戦いを戦っているのだから。',a:'プラトン',bg:'ソクラテスの弟子。人は見えないところで様々な苦しみを抱えているという深い洞察。'},
    {m:'一度しかない人生を、いかに生きるかが問題だ。',a:'吉田松陰',bg:'幕末の思想家。松下村塾で多くの志士を育てた。29歳で処刑される直前まで信念を貫いた。'},
    {m:'花は散るから美しい。人生も限りがあるから輝く。',a:'坂本龍馬',bg:'幕末の志士。短い生涯の中で明治維新の礎を築いた。儚さの中にこそ美しさがあると悟っていた。'},
    {m:'今日という日は、残りの人生の最初の日だ。',a:'チャールズ・ディケンズ',bg:'「二都物語」の著者。毎日を新しい始まりとして捉えることの大切さを説いた。'},
    {m:'雨の日には雨の中を、風の日には風の中を行く。',a:'相田みつを',bg:'書家・詩人。飾らない言葉で人の心に寄り添った。自然体で生きることを大切にした。'},
    {m:'人生は近くで見ると悲劇だが、遠くから見ると喜劇だ。',a:'チャーリー・チャップリン',bg:'喜劇映画の巨人。貧困の中で育ち、笑いの裏に深い人間観察を持っていた。'},
    {m:'やってみせ、言って聞かせて、させてみせ、ほめてやらねば人は動かじ。',a:'山本五十六',bg:'連合艦隊司令長官。リーダーシップの本質として今も語り継がれる。'},
    {m:'昨日から学び、今日を生き、明日に希望を持て。',a:'アルベルト・アインシュタイン',bg:'過去・現在・未来のバランスを大切にした生き方を示した言葉。'},
    {m:'どんな小さなことでも、誰かの役に立てることに喜びを感じなさい。',a:'マザー・テレサ',bg:'インドのカルカッタで最も貧しい人々に仕えた聖人。小さな愛の積み重ねが世界を変えると信じた。'},
    {m:'夢を見るから人生は輝く。',a:'モーツァルト',bg:'35年の短い生涯に600曲以上を作曲した天才。常に新しい音楽を夢見て筆を走らせ続けた。'},
    {m:'千里の道も一歩から。',a:'老子',bg:'中国の哲学者。どんな大きな目標も最初の一歩から始まるという真理。'},
    {m:'自分を信じることで半分は成功している。',a:'セオドア・ルーズベルト',bg:'第26代アメリカ大統領。病弱な子供から大統領へ。自己信頼の重要性を身をもって示した。'},
    {m:'人生で最大の幸福は、愛されているという確信である。',a:'ヴィクトル・ユーゴー',bg:'「レ・ミゼラブル」の著者。愛と繋がりこそが最大の喜びだと説いた。'},
    {m:'行動がすべての成功の基本原則だ。',a:'パブロ・ピカソ',bg:'20世紀最大の画家。考えるより動くことで道が開けると信じていた。'},
    {m:'いつも心に太陽を持て。',a:'山本有三',bg:'「路傍の石」の著者。どんな境遇でも希望の光を失わないことの大切さを説き続けた。'},
    {m:'人は変われる。いつでも、どこでも、何歳でも。',a:'アルフレッド・アドラー',bg:'個人心理学の創始者。過去に縛られず自分の意志で未来を変えられると説いた。'},
    {m:'幸せは行動することから生まれる。',a:'アリストテレス',bg:'古代ギリシャの哲学者。幸福は状態ではなく活動であると定義した。'},
    {m:'今日できることを明日に延ばすな。',a:'ベンジャミン・フランクリン',bg:'凧の実験で電気を発見した発明家。勤勉さを生涯貫いた人物が残した言葉。'},
    {m:'失敗は成功のもと。転んでもただでは起きない。',a:'本田宗一郎',bg:'ホンダ創業者。数々の失敗を乗り越えて世界的企業を築いた。'},
    {m:'自分の心が動いたことを、素直にやってみなさい。',a:'松下幸之助',bg:'パナソニック創業者。直感と素直さを大切にした経営の神様の言葉。'},
    {m:'努力は必ず報われる。もし報われない努力があるとすれば、それはまだ努力と呼べない。',a:'王貞治',bg:'世界記録868本塁打の野球選手。血のにじむような練習に裏打ちされた言葉。'},
    {m:'人と比べるな。昨日の自分と比べろ。',a:'ドストエフスキー',bg:'「罪と罰」の著者。真の成長は自己との対話から生まれると説いた。'},
    {m:'最大の栄光は、一度も失敗しないことではなく、倒れるたびに起き上がることにある。',a:'ネルソン・マンデラ',bg:'27年間の投獄を経てアフリカ初の黒人大統領になった人物。不屈の精神を体現した。'},
    {m:'あなたが変われば、世界が変わる。',a:'マハトマ・ガンジー',bg:'自分自身が変化の体現者になることが世界変革の始まりだという信念。'},
    {m:'人生は自転車のようなものだ。倒れないためには走り続けなければならない。',a:'アルベルト・アインシュタイン',bg:'物理学者が自転車に乗りながら悟った人生の真理。前進の大切さを説く。'},
    {m:'生きがいとは何かを愛することだ。',a:'夏目漱石',bg:'「こころ」の著者。人生の意味を愛と情熱に見出した文豪の洞察。'},
    {m:'知ることより感じることが大切だ。',a:'レイチェル・カーソン',bg:'「沈黙の春」の著者。感受性こそが世界を救うと説いた環境運動の先駆者。'},
    {m:'今いる場所で、咲きなさい。',a:'渡辺和子',bg:'「置かれた場所で咲きなさい」は100万部を超えるベストセラーになった。'},
    {m:'継続は力なり。',a:'松岡修造',bg:'元プロテニス選手。熱い言葉で多くの人を励まし続けている。'},
    {m:'壁というのは、できる人にしかやってこない。',a:'イチロー',bg:'MLB通算3089安打の伝説。壁に直面すること自体が才能の証明という逆転の発想。'},
    {m:'人間の最大の武器は、最後まで諦めないこと。',a:'本田圭佑',bg:'サッカー日本代表。何度も逆境を経験しながら世界のトップで戦い続けた。'},
    {m:'やりたいことがあるなら、できる理由を探せ。できない理由は誰でも見つけられる。',a:'ウォルト・ディズニー',bg:'ミッキーマウスの生みの親。300回以上の銀行融資断りを経て夢の国を実現した。'},
    {m:'人間は考える葦である。',a:'ブレーズ・パスカル',bg:'フランスの数学者・哲学者。考える力において人間は宇宙全体を超えると説いた。'},
    {m:'一期一会。',a:'千利休',bg:'茶道の大成者。この出会いは二度と繰り返されないという思いで人と向き合う精神。'},
    {m:'初心忘るべからず。',a:'世阿弥',bg:'能楽の大成者。芸の道で初めて感じた感動や志を忘れてはならないという言葉。'},
    {m:'自分の価値を他人に決めさせるな。',a:'エレノア・ルーズベルト',bg:'第32代米大統領夫人。女性の権利のために戦い続けた活動家の言葉。'},
    {m:'光が強ければ、影もまた深い。',a:'ゲーテ',bg:'「ファウスト」の著者。喜びと悲しみは常に対になるという人生の真理。'},
    {m:'知識は力なり。',a:'フランシス・ベーコン',bg:'英国の哲学者・科学者。知識こそが最大の権力であると17世紀に説いた。'},
    {m:'小さいことを重ねることが、とんでもないところへ行くただひとつの道だ。',a:'イチロー',bg:'MLB3089安打の偉業を達成した日本人メジャーリーガー。地道な積み重ねの体現者。'},
    {m:'人生の意味は、あなたが与える意味によって決まる。',a:'ヴィクトール・フランクル',bg:'強制収容所を生き延びた精神科医。「夜と霧」の著者。絶望の中に意味を見出した。'},
    {m:'失敗の反対は成功ではなく、何もしないことだ。',a:'ウォルト・ディズニー',bg:'行動しないことこそが最大の失敗だと語ったディズニーの信念。'},
    {m:'心が変われば行動が変わる。行動が変われば習慣が変わる。習慣が変われば人格が変わる。',a:'ウィリアム・ジェームズ',bg:'米国心理学の父。思考の変化が人生全体を変えるプロセスを論理的に示した言葉。'},
    {m:'明けない夜はない。',a:'シェイクスピア',bg:'「マクベス」の作者。どんな絶望的な状況も必ず終わりが来るという希望の言葉。'},
    {m:'今日の自分を昨日より少しだけ成長させなさい。',a:'鈴木鎮一',bg:'バイオリン教育法スズキメソードの創始者。小さな成長の積み重ねが才能を育てると説いた。'},
    {m:'何も咲かない寒い日は、下へ下へと根を伸ばせ。やがて大きな花が咲く。',a:'瀬古利彦',bg:'マラソン選手。困難な時期こそ目に見えない力を蓄えている。忍耐と準備の大切さを植物に例えた。'},
    {m:'人生は一度きり。だから、今この瞬間を大切に。',a:'松尾芭蕉',bg:'「古池や蛙飛びこむ水の音」で有名な俳人。一瞬一瞬の命の輝きを見出し続けた。'},
    {m:'人生で最も重要な2日は、生まれた日と、なぜ生まれたかを知った日だ。',a:'マーク・トウェイン',bg:'「トム・ソーヤーの冒険」の著者。自分の使命を見つけることの重要性を説いた。'},
    {m:'七つの大罪の最大のものは、無関心である。',a:'マザー・テレサ',bg:'愛の反対は憎しみではなく無関心だと語り続けた聖人の言葉。'},
    {m:'夢なき者に理想なし、理想なき者に計画なし。',a:'吉田松陰',bg:'夢が理想を生み、理想が計画を生むという論理的な思考の連鎖を示した。'},
    {m:'幸福とは旅の方法であって、行き先ではない。',a:'ロイ・M・グッドマン',bg:'幸せは目的地ではなく、日々の過ごし方の中にあるという深い気づき。'},
    {m:'他人を変えるより、自分が変わる方が早い。',a:'ガンジー',bg:'外の世界を変えようとする前に、自分自身の変革から始めることを生涯実践した。'},
    {m:'あなたの時間は限られている。他の誰かの人生を生きることで無駄にしてはいけない。',a:'スティーブ・ジョブズ',bg:'アップル共同創業者。2005年のスタンフォード卒業式での感動的スピーチの一節。'},
    {m:'まず自分を愛せ。そうすれば世界を愛せるようになる。',a:'孔子',bg:'中国春秋時代の思想家。自愛と他者への愛は根を同じくするという儒教の教え。'},
    {m:'生きることは、ただ息をすることではない。行動することだ。',a:'ヴォルテール',bg:'フランスの啓蒙思想家。意志を持って行動することに生の意味があると説いた。'},
    {m:'一日一日を大切に。今日という日は二度と来ない。',a:'伊達政宗',bg:'戦国武将。激動の戦国時代を生き抜いた経験から、一日一日を噛みしめる大切さを説いた。'},
    {m:'真の勇気とは、恐れながらも進むことだ。',a:'マーク・トウェイン',bg:'「ハックルベリー・フィンの冒険」の著者。それでも前に進む意志こそが勇気。'},
    {m:'逆境は真の教育者だ。',a:'ベンジャミン・ディズレーリ',bg:'英国首相。困難な状況が最も深い学びをもたらすという経験に基づく洞察。'},
    {m:'必ず夢は叶う。ただし、それが叶う日は自分では決められない。',a:'手塚治虫',bg:'「鉄腕アトム」の漫画家。長い準備期間を経て突然花開く才能の開花について語った言葉。'},
    {m:'太陽が沈んでも、世界は続く。',a:'ヴィクトル・ユーゴー',bg:'どんな終わりも新しい始まりであるという希望のメッセージ。'},
    {m:'本を読む人だけが、一人で多くの人生を生きられる。',a:'北野武',bg:'映画監督・芸術家。読書が異なる視点や経験を与え、人生の幅を広げると説いた。'},
    {m:'今日という日は贈り物だ。だから現在と呼ぶ。',a:'アリス・モース・アール',bg:'現在の瞬間こそが神からの贈り物であるという深い洞察。'},
    {m:'善いことをした後の気持ちは良く、悪いことをした後の気持ちは悪い。',a:'アーネスト・ヘミングウェイ',bg:'「老人と海」のノーベル賞作家。道徳をシンプルに解いた言葉。'},
    {m:'最も大きな発見は、人間は自分の態度を変えることで人生を変えられることだ。',a:'ウィリアム・ジェームズ',bg:'心理学の父。思考や態度の変化が最終的に人生そのものを変えると科学的に説いた。'},
    {m:'どんな暗闇の中にも、必ず光はある。',a:'ヴィクトール・フランクル',bg:'強制収容所を生き延びた精神科医。絶望の中に意味と光を見出す方法を示した。'},
    {m:'人生で一番大切なのは、何事も当たり前だと思わないことだ。',a:'アルベルト・シュヴァイツァー',bg:'感謝と驚きの心を持ち続けることが豊かな人生の秘訣だと説いた医師・哲学者。'},
    {m:'七転び八起き。',a:'日本のことわざ',bg:'何度失敗しても諦めずに立ち上がることの大切さを説く。転んだ数より立ち上がった数が一つ多いことに人生の真髄がある。'},
    {m:'失ってからわかることがある。それが感謝の始まりだ。',a:'ヘレン・ケラー',bg:'視覚と聴覚を幼少期に失い、それでも世界は美しいと語り続けた教育家の言葉。'},
    {m:'強さとは、折れないことではない。曲がってまた戻ることだ。',a:'アーネスト・ヘミングウェイ',bg:'「老人と海」の著者。真の強さはしなやかさにあるという竹のような生き方を説いた。'},
    {m:'心の中に花を持ちなさい。',a:'坂村真民',bg:'「念ずれば花ひらく」で有名な詩人。98歳まで詩を書き続けた。'},
    {m:'石の上にも三年。',a:'日本のことわざ',bg:'冷たい石の上でも三年座り続ければ温まるように、忍耐強く続ければ実を結ぶという教え。'},
    {m:'自分が変われば周りが変わる。周りが変われば社会が変わる。',a:'マザー・テレサ',bg:'一人の小さな変化が連鎖して世界を変えるという信念を一生貫いた。'},
    {m:'雑草という植物はない。すべての植物には名前がある。',a:'昭和天皇',bg:'植物学の知識を持った天皇が語った言葉。どんな存在にも固有の価値があるという洞察。'},
    {m:'自分の中に毒を持て。',a:'岡本太郎',bg:'「芸術は爆発だ」の芸術家。常識に反抗し、自分の中の危険な部分を解放することが創造の源だと説いた。'},
    {m:'人は負けると知りて戦うこともある。それが人間の誇りというものだ。',a:'ゲーテ',bg:'「ファウスト」の著者。結果よりも挑戦する姿勢こそが人間の尊厳だと説いた。'},
    {m:'できると思えばできる、できないと思えばできない。これは偉大なる真実だ。',a:'パブロ・ピカソ',bg:'心理学的にもセルフイメージが実際のパフォーマンスに大きく影響することは科学的に証明されている。'},
    {m:'一番暗いのは夜明け前だ。',a:'トーマス・フラー',bg:'英国の歴史家。最も苦しいときこそ夜明けが近いというメッセージ。'},
    {m:'人生は実験の連続だ。実験が多ければ多いほどよい。',a:'ラルフ・ワルド・エマーソン',bg:'アメリカの思想家。人生を試行錯誤の連続として捉え、失敗を恐れず挑戦し続けることを説いた。'},
    {m:'勝つことばかり知りて、負くることを知らざれば、害その身にいたる。',a:'徳川家康',bg:'江戸幕府の創始者。辛抱強さの体現者が残した勝負と人生の教訓。'},
    {m:'人生に意味を見つけるためには、まず与えることから始めなさい。',a:'ウィンストン・チャーチル',bg:'受け取ることより与えることに人生の深い満足があると経験から語った言葉。'},
    {m:'美しいものを見る目を持つ人は、決して年をとらない。',a:'フランツ・カフカ',bg:'「変身」の著者。感性と好奇心を保ち続けることが若さの秘訣だという言葉。'},
    {m:'わたしは、わたしでいい。',a:'相田みつを',bg:'書家・詩人。ありのままの自分を受け入れることの大切さを説いた言葉。'},
    {m:'人生に遅すぎることはない。今がその時だ。',a:'ジョージ・エリオット',bg:'何歳からでも新しいことを始められると信じた英国の作家の言葉。'},
    {m:'まず信じること。疑いは後でいい。',a:'ゲーテ',bg:'信頼と行動を先行させ、疑念に縛られないことの大切さを説いた。'},
    {m:'人間は誰でも可能性を持っている。その可能性を信じることが最初の一歩だ。',a:'マーガレット・ミード',bg:'文化人類学者。人間の可能性と変革への信念を生涯持ち続けた研究者。'},
    {m:'笑う門には福来る。',a:'日本のことわざ',bg:'室町時代から伝わる日本の知恵。笑顔が幸運を引き寄せるという考えは世界共通で、笑いが健康にもたらす効果は科学的にも証明されている。'},
    {m:'思いやりとは、相手の痛みを自分のことのように感じることだ。',a:'アルベルト・シュヴァイツァー',bg:'ノーベル平和賞受賞の医師・哲学者。アフリカで医療活動を続けた人物の言葉。'},
    {m:'どこにいても、自分らしくあること。それが一番の才能だ。',a:'岡本太郎',bg:'「太陽の塔」の芸術家。常識を壊し続けた革命的アーティストの言葉。'},
    {m:'一生懸命だと知恵が出る。中途半端だと愚痴が出る。いい加減だと言い訳が出る。',a:'武田信玄',bg:'戦国最強と呼ばれた武将。全力で取り組むことの重要性を端的に示した名言。'},
    {m:'人はいつでも今いる場所から歩き始められる。',a:'レイ・ブラッドベリ',bg:'SF作家。「華氏451度」の著者。どこにいても新しい旅は始められると説いた。'},
    {m:'頭は使えば使うほど良くなる。体は使えば使うほど強くなる。',a:'野口英世',bg:'細菌学者。貧しい境遇から世界的科学者になった人物の言葉。努力と実践の大切さを説く。'},
    {m:'我思う、ゆえに我あり。',a:'デカルト',bg:'フランスの哲学者。疑うことで確かめられる唯一の真実として「考える自己の存在」を証明した。'},
    {m:'道は己の足で拓くものだ。',a:'宮本武蔵',bg:'「五輪書」の著者。剣の道を極めた侍。他人に依存せず自分自身の力で道を切り開くことを説いた。'},
    {m:'過去は変えられないが、未来はいくらでも変えられる。',a:'アン・フランク',bg:'ナチスの迫害を受けながらも希望を失わなかった少女。「アンネの日記」に残された言葉。'},
    {m:'人生の最大の喜びは、できないと言われたことをすることだ。',a:'ウォルター・バジョット',bg:'英国の経済学者・作者。挑戦することの喜びと可能性を説いた言葉。'},
    {m:'誰でも夢と可能性を持っている。大切なのはそれを信じて行動することだ。',a:'ローザ・パークス',bg:'公民権運動の母。バスの席を譲らなかった一つの行動が歴史を変えた。'},
    {m:'今日という日を精一杯生きることが、最高の未来への準備だ。',a:'アブラハム・リンカーン',bg:'奴隷解放を成し遂げた第16代米国大統領。日々の積み重ねを大切にした政治家。'},
    {m:'できないと思ったとき、それはまだ本気でないだけだ。',a:'長嶋茂雄',bg:'「ミスター・プロ野球」と呼ばれた野球界の英雄。諦めない姿勢を全力で体現した人物。'},
    {m:'涙の数だけ強くなれる。',a:'岡本真夜',bg:'シンガーソングライター。「Tomorrow」のヒット曲で知られる。苦しみが力に変わるという希望のメッセージ。'},
    {m:'人生とは、自分を見つけることではない。人生とは、自分を創ることだ。',a:'バーナード・ショー',bg:'「ピグマリオン」の作者。ノーベル文学賞受賞。人は生まれながらに決まっているのではなく、自ら作り上げるという思想。'},
    {m:'負けを知ることで本当の強さが身につく。',a:'柔道の格言',bg:'日本武道の教え。勝つことだけでなく、敗北から学ぶことが真の武道家の姿だという考え方。'},
    {m:'今日の夢が明日の現実になる。',a:'ヴィクトル・ユーゴー',bg:'「レ・ミゼラブル」の著者。夢と現実の距離は、行動一つで縮まると説いた。'},
    {m:'過去を振り返るな。未来を恐れるな。今を大切にせよ。',a:'ブッダ',bg:'仏教の開祖。過去への執着と未来への不安から解放されることが悟りの道だと説いた。'},
    {m:'本当の親切は、見返りを求めない。',a:'マザー・テレサ',bg:'インドで生涯を貧しい人々に捧げた聖人。無私の愛こそが真の親切だと体で示した。'},
    {m:'希望は羽のある生き物で、魂の中に宿る。',a:'エミリー・ディキンソン',bg:'米国の詩人。生涯のほとんどを家に閉じこもりながら、1800篇以上の詩を書き続けた。'},
    {m:'道を選ぶことも大切だが、その道を全力で歩くことが最も大切だ。',a:'稲盛和夫',bg:'京セラ・KDDIの創業者。日本航空を再建した経営者。全力で取り組むことが成功の秘訣だと説いた。'},
    {m:'人はパンのみにて生きるにあらず。',a:'聖書（マタイ伝）',bg:'人間には食べ物だけでなく、精神的な糧が必要だという意味。物質的豊かさだけでは満足できない人間の本質を示す。'},
    {m:'出る杭は打たれるが、出すぎた杭は打たれない。',a:'日本のことわざの逆説',bg:'目立つ人は批判を受けるが、圧倒的に抜きん出ると誰も批判できなくなるという逆転の発想。'},
    {m:'人生において最も輝く瞬間は、今この瞬間だ。',a:'モーリス・メーテルリンク',bg:'「青い鳥」の作者。幸せは遠くにあるのではなく、今ここにあると説いた。'},
    {m:'夢を語れ、夢を描け、夢を生きよ。',a:'マーティン・ルーサー・キング',bg:'「私には夢がある」の演説で知られる公民権運動の指導者。夢を行動に移すことを生涯実践した。'},
    {m:'大きな岩は一度には動かせない。しかし毎日少しずつ押せば必ず動く。',a:'マーク・トウェイン',bg:'「トム・ソーヤーの冒険」の著者。継続と積み重ねの力を説いた言葉。'},
    {m:'自分の限界は自分が決める。',a:'エドモンド・ヒラリー',bg:'世界初のエベレスト登頂者。「不可能」という壁は自分の心が作るものだと証明した人物。'},
    {m:'優しくあることは、弱さではない。世界で最も難しいことの一つだ。',a:'フレデリック・ドグラス',bg:'元奴隷から社会活動家へ。人間の尊厳と優しさの強さを説いた言葉。'},
    {m:'今日だけを懸命に生きよ。',a:'稲盛和夫',bg:'「一日一日を全力で生きる」という経営哲学を持ち続けた企業家。京セラ・KDDIを創業した。'},
    {m:'どんな仕事も、手を抜かずやれば、必ずあとで役に立つ。',a:'本田宗一郎',bg:'ホンダ創業者。一見無駄に見える経験も、後に大きな意味を持つと信じ続けた。'},
    {m:'言葉は魂の鏡だ。',a:'ルキウス・アンナエウス・セネカ',bg:'古代ローマの哲学者・劇作家。言葉の使い方がその人の内側の状態を映し出すと説いた。'},
    {m:'一つのことを十年やれば、誰でも専門家になれる。',a:'マルコム・グラッドウェル',bg:'「1万時間の法則」で有名なライター。才能より練習の積み重ねが卓越性を生むと説いた。'},
    {m:'人生の意義は与えることにあり、奪うことにない。',a:'タゴール',bg:'インドの詩人・ノーベル文学賞受賞者。人間の存在価値は他者への貢献にあると説いた。'},
    {m:'天才とは、1%のひらめきと99%の努力だ。',a:'トーマス・エジソン',bg:'電球・蓄音機など1000以上の発明を持つ発明王。才能より努力を重視した言葉として有名。'},
    {m:'歩みを止めた時が、本当の終わりだ。',a:'宮本武蔵',bg:'「五輪書」の著者。剣客として生涯60回以上の決闘で一度も負けなかった。前進し続けることの大切さを説く。'},
    {m:'人は自分が期待するほど悲しみはしない。それ以上に、自分が感じるほど幸せでもない。',a:'バルタザール・グラシアン',bg:'17世紀スペインの哲学者・作家。感情の相対性と心の自由について説いた言葉。'},
    {m:'生きているということは、奇跡だ。',a:'アンリ・マティス',bg:'フォービズムの画家。色彩の革命家。生命の存在そのものへの深い感謝を示した言葉。'},
    {m:'無駄な努力はない。すべての経験が自分を作る。',a:'イチロー',bg:'MLB3089安打の伝説的選手。回り道に見えた経験が後に大きな力になったと語った。'},
    {m:'自分の長所を活かし、短所を補う。それが成長の道だ。',a:'ピーター・ドラッカー',bg:'経営学の父。「マネジメント」の著者。強みを最大化することが組織と個人の成功の鍵だと説いた。'},
    {m:'川の流れのように、人生も流れていく。美しい水が流れ続けるように生きたい。',a:'美空ひばり',bg:'日本を代表する歌手。「川の流れのように」は彼女の遺作となり、生き方そのものを歌った名曲。'},
    {m:'成功した人を見ると運が良かったと思う人がいる。しかし成功した人には必ず長い準備期間がある。',a:'松下幸之助',bg:'パナソニック創業者。成功の陰にある見えない努力と準備の大切さを語った言葉。'},
    {m:'今日一日、怒らず、恐れず、悲しまず、正直、親切、愉快に過ごそう。',a:'中村天風',bg:'陽明学者・実業家。心の持ち方が人生を決めるという思想を説き、多くのビジネスリーダーに影響を与えた。'},
    {m:'希望を捨てるな。暗闇の中でこそ、星は輝く。',a:'コンフキウス（孔子）',bg:'中国春秋時代の思想家。逆境の中にこそ可能性があるという深い洞察。'},
    {m:'自分の信念を貫くことは、時に孤独だ。しかしそれが本当の自由だ。',a:'ヘンリー・デイヴィッド・ソロー',bg:'「ウォールデン」の著者。物質文明を離れ自然の中で生きた思想家。真の自由は信念に従う生き方にあると説いた。'},
    {m:'今日の苦労は明日の糧だ。',a:'日本のことわざ',bg:'今日経験した困難や苦労が、明日の力になるという教え。苦しみを前向きに捉える日本人の知恵。'},
    {m:'人は強さではなく、誠実さで信頼される。',a:'山上の垂訓（聖書）',bg:'人間関係における信頼の本質は力や地位ではなく、誠実な態度にあるという普遍的な真理。'},
    {m:'笑いは最良の薬だ。',a:'ウィリアム・オスラー',bg:'近代医学の父。笑いがストレスホルモンを減らし免疫を高めることは今日の医学でも証明されている。'},
    {m:'目標のない人は、どこへも行けない。',a:'ルイス・キャロル',bg:'「不思議の国のアリス」の著者。目的地を決めなければどの道を選んでも意味がないというアリスの洞察。'},
    {m:'時間は命そのものだ。大切に使いなさい。',a:'ブルース・リー',bg:'武道家・俳優。「燃えよドラゴン」で世界に名を刻んだ。32歳で急逝した彼の言葉は重く響く。'},
    {m:'何かを失った時、その喪失が次の何かへの扉を開く。',a:'ヘレン・ケラー',bg:'視覚・聴覚障害を乗り越えた教育家。失うことが新しい可能性を開くという深い経験に基づく言葉。'},
    {m:'世界は一冊の本だ。旅をしない人はその一ページしか読まない。',a:'アウグスティヌス',bg:'4世紀のキリスト教神学者。旅と経験を通じた学びの大切さを説いた言葉。'},
    {m:'人の心に種をまきなさい。花はいつか必ず咲く。',a:'ハーバート・クラップ',bg:'善意の行動は必ずいつか実を結ぶという希望のメッセージ。'},
    {m:'今日の読書は、明日の自分を作る。',a:'林修',bg:'予備校講師。「今でしょ！」で有名。知識と読書の積み重ねが人格形成に大きく影響すると説いた。'},
    {m:'人生で一番むずかしいのは、自分を知ることだ。',a:'タレス',bg:'古代ギリシャ七賢人の一人。哲学の始祖とされる。デルフォイの神殿の銘「汝自身を知れ」に通じる言葉。'},
    {m:'夢を見る力こそが、人間最大の能力だ。',a:'ロアルド・ダール',bg:'「チャーリーとチョコレート工場」の著者。想像力と夢が人間を他の動物と区別する最大の力だと説いた。'},
    {m:'人間は環境の産物ではなく、環境を作る存在だ。',a:'バーナード・ショー',bg:'「ピグマリオン」の著者。人間には環境に流されるのではなく、環境を変える力があると説いた。'},
    {m:'転んだ後に立ち上がる回数が、その人の強さを決める。',a:'ヴィンス・ロンバルディ',bg:'アメリカンフットボールの伝説的監督。勝利より失敗から立ち上がる姿勢を重視した。'},
    {m:'平和は外から来ない。心の中から生まれる。',a:'ジャワハルラール・ネルー',bg:'インド初代首相。心の平和こそが世界平和の基盤だと信じ続けた政治家。'},
    {m:'どんなに小さくても、善いことをしよう。',a:'マザー・テレサ',bg:'「海は一滴の水から始まる」という信念で、小さな善意を生涯積み重ねた聖人。'},
    {m:'最高の復讐は、圧倒的な成功だ。',a:'フランク・シナトラ',bg:'歌手・俳優。批判や妨害に対して言い訳せず、結果を出すことが最善の答えだと示した。'},
    {m:'人生は近道より遠回りの方が、多くのものを得る。',a:'夏目漱石',bg:'「坊っちゃん」の著者。効率より深みを重視した文豪の生き方を示す言葉。'},
    {m:'あきらめたらそこで試合終了だよ。',a:'井上雄彦（スラムダンク）',bg:'漫画「SLAM DUNK」の名言。絶望的な状況でも諦めない心の大切さを説く。'},
    {m:'失敗を恐れるな。失敗しないために何もしないことを恐れよ。',a:'ウィリアム・ウォード',bg:'米国の教育者・著述家。行動しないことこそが最大の失敗だという逆転の発想。'},
    {m:'善い習慣は、善い人生を作る。',a:'アリストテレス',bg:'古代ギリシャの哲学者。人格は日々の行動と習慣によって形成されると説いた。'},
    {m:'一日の計は朝にあり。',a:'中国のことわざ',bg:'一日の計画は朝のうちに立てよという意味。物事の準備と計画の大切さを示す格言。'},
    {m:'花が咲かない日があっても、根は育っている。',a:'不詳',bg:'見えないところで着実に力を蓄えているという励ましの言葉。'},
    {m:'人生は贈り物だ。毎朝、それを開けることを忘れるな。',a:'エリノア・ルーズベルト',bg:'第32代米大統領夫人。毎日新しい日を感謝と期待を持って迎えることの大切さを説いた。'},
    {m:'今日という日は残りの人生で最も若い日だ。',a:'マーク・トウェイン',bg:'ユーモア作家。今この瞬間が最も若い自分であることを認識して行動することを促す言葉。'},
    {m:'どんな状況でも、感謝できることは必ずある。',a:'ネルソン・マンデラ',bg:'27年の獄中生活でも感謝の気持ちを失わなかった指導者。どんな境遇にも学びと恵みがあると説いた。'},

    {m:'夢は逃げない。逃げているのはいつも自分だ。',a:'高橋歩',bg:'作家・冒険家。夢を実現できないのは環境のせいではなく、自分が逃げているからだという厳しくも温かい言葉。'},
    {m:'大切なのは、どれだけ長く生きたかではなく、どれだけ深く生きたかだ。',a:'ラルフ・ワルド・エマーソン',bg:'アメリカの哲学者。人生の質は量より深さにあると説いた超越主義の思想家。'},
    {m:'笑いながら泣くことができれば、それが強さだ。',a:'リンダ・ロンスタット',bg:'歌手。喜びと悲しみを同時に持つことができる人間の複雑な感情の強さを称えた言葉。'},
    {m:'人は愛した分だけ豊かになる。',a:'ヴィクトル・ユーゴー',bg:'「レ・ミゼラブル」の著者。愛することで奪われるのではなく、豊かになるという逆説的な真理。'},
    {m:'今日の善行は、必ずどこかで誰かの力になる。',a:'ラビンドラナート・タゴール',bg:'ノーベル文学賞受賞インドの詩人。善意の連鎖が見えないところで世界を豊かにしていると説いた。'},
    {m:'人間はそれほど賢くはない。しかしそれほど馬鹿でもない。',a:'ウィル・ロジャース',bg:'米国の俳優・コメディアン。人間の等身大の姿を愛情を持って表現した言葉。'},
    {m:'老いることを恐れるな。成長することを恐れよ。',a:'ジョージ・バーナード・ショー',bg:'「ピグマリオン」の著者。年齢より精神的な停滞を恐れるべきだという逆転の視点。'},
    {m:'雨は必ず止む。嵐は必ず明ける。',a:'日本のことわざ',bg:'どんな困難も永遠には続かないという希望のメッセージ。忍耐と希望を持って前進する大切さを示す。'},

    {m:'我思う、ゆえに我あり。',a:'デカルト',bg:'フランスの哲学者。疑うことで確かめられる唯一の真実として「考える自己の存在」を証明した。'},

    {m:'今日だけを懸命に生きよ。',a:'稲盛和夫',bg:'「一日一日を全力で生きる」という経営哲学を持ち続けた企業家。京セラ・KDDIを創業した。'},
    {m:'どんな仕事も、手を抜かずやれば、必ずあとで役に立つ。',a:'本田宗一郎',bg:'ホンダ創業者。一見無駄に見える経験も、後に大きな意味を持つと信じ続けた。'},
    {m:'言葉は魂の鏡だ。',a:'ルキウス・アンナエウス・セネカ',bg:'古代ローマの哲学者・劇作家。言葉の使い方がその人の内側の状態を映し出すと説いた。'},
    {m:'一つのことを十年やれば、誰でも専門家になれる。',a:'マルコム・グラッドウェル',bg:'「1万時間の法則」で有名なライター。才能より練習の積み重ねが卓越性を生むと説いた。'},
    {m:'人生の意義は与えることにあり、奪うことにない。',a:'タゴール',bg:'インドの詩人・ノーベル文学賞受賞者。人間の存在価値は他者への貢献にあると説いた。'},
    {m:'天才とは、1%のひらめきと99%の努力だ。',a:'トーマス・エジソン',bg:'電球・蓄音機など1000以上の発明を持つ発明王。才能より努力を重視した言葉として有名。'},
    {m:'歩みを止めた時が、本当の終わりだ。',a:'宮本武蔵',bg:'「五輪書」の著者。剣客として生涯60回以上の決闘で一度も負けなかった。前進し続けることの大切さを説く。'},
    {m:'生きているということは、奇跡だ。',a:'アンリ・マティス',bg:'フォービズムの画家。色彩の革命家。生命の存在そのものへの深い感謝を示した言葉。'},
    {m:'無駄な努力はない。すべての経験が自分を作る。',a:'イチロー',bg:'MLB3089安打の伝説的選手。回り道に見えた経験が後に大きな力になったと語った。'},
    {m:'自分の長所を活かし、短所を補う。それが成長の道だ。',a:'ピーター・ドラッカー',bg:'経営学の父。「マネジメント」の著者。強みを最大化することが組織と個人の成功の鍵だと説いた。'},
    {m:'川の流れのように、人生も流れていく。美しい水が流れ続けるように生きたい。',a:'美空ひばり',bg:'日本を代表する歌手。「川の流れのように」は遺作となり、生き方そのものを歌った名曲。'},
    {m:'今日一日、怒らず、恐れず、悲しまず、正直、親切、愉快に過ごそう。',a:'中村天風',bg:'陽明学者・実業家。心の持ち方が人生を決めるという思想を説き多くのビジネスリーダーに影響を与えた。'},
    {m:'希望を捨てるな。暗闇の中でこそ、星は輝く。',a:'孔子',bg:'中国春秋時代の思想家。逆境の中にこそ可能性があるという深い洞察。'},
    {m:'自分の信念を貫くことは、時に孤独だ。しかしそれが本当の自由だ。',a:'ヘンリー・デイヴィッド・ソロー',bg:'「ウォールデン」の著者。物質文明を離れ自然の中で生きた思想家。真の自由は信念に従う生き方にあると説いた。'},
    {m:'今日の苦労は明日の糧だ。',a:'日本のことわざ',bg:'今日経験した困難や苦労が明日の力になるという教え。苦しみを前向きに捉える日本人の知恵。'},
    {m:'笑いは最良の薬だ。',a:'ウィリアム・オスラー',bg:'近代医学の父。笑いがストレスホルモンを減らし免疫を高めることは今日の医学でも証明されている。'},
    {m:'目標のない人は、どこへも行けない。',a:'ルイス・キャロル',bg:'「不思議の国のアリス」の著者。目的地を決めなければどの道を選んでも意味がないというアリスの洞察。'},
    {m:'時間は命そのものだ。大切に使いなさい。',a:'ブルース・リー',bg:'武道家・俳優。「燃えよドラゴン」で世界に名を刻んだ。32歳で急逝した彼の言葉は重く響く。'},
    {m:'何かを失った時、その喪失が次の何かへの扉を開く。',a:'ヘレン・ケラー',bg:'視覚・聴覚障害を乗り越えた教育家。失うことが新しい可能性を開くという深い経験に基づく言葉。'},
    {m:'世界は一冊の本だ。旅をしない人はその一ページしか読まない。',a:'アウグスティヌス',bg:'4世紀のキリスト教神学者。旅と経験を通じた学びの大切さを説いた言葉。'},
    {m:'今日の読書は、明日の自分を作る。',a:'林修',bg:'予備校講師。「今でしょ！」で有名。知識と読書の積み重ねが人格形成に大きく影響すると説いた。'},
    {m:'人生で一番むずかしいのは、自分を知ることだ。',a:'タレス',bg:'古代ギリシャ七賢人の一人。哲学の始祖とされる。デルフォイの神殿の銘「汝自身を知れ」に通じる言葉。'},
    {m:'夢を見る力こそが、人間最大の能力だ。',a:'ロアルド・ダール',bg:'「チャーリーとチョコレート工場」の著者。想像力と夢が人間を他の動物と区別する最大の力だと説いた。'},
    {m:'人間は環境の産物ではなく、環境を作る存在だ。',a:'バーナード・ショー',bg:'「ピグマリオン」の著者。人間には環境に流されるのではなく、環境を変える力があると説いた。'},
    {m:'転んだ後に立ち上がる回数が、その人の強さを決める。',a:'ヴィンス・ロンバルディ',bg:'アメリカンフットボールの伝説的監督。勝利より失敗から立ち上がる姿勢を重視した。'},
    {m:'平和は外から来ない。心の中から生まれる。',a:'ジャワハルラール・ネルー',bg:'インド初代首相。心の平和こそが世界平和の基盤だと信じ続けた政治家。'},
    {m:'どんなに小さくても、善いことをしよう。',a:'マザー・テレサ',bg:'「海は一滴の水から始まる」という信念で小さな善意を生涯積み重ねた聖人。'},
    {m:'最高の復讐は、圧倒的な成功だ。',a:'フランク・シナトラ',bg:'歌手・俳優。批判や妨害に対して言い訳せず、結果を出すことが最善の答えだと示した。'},
    {m:'人生は近道より遠回りの方が、多くのものを得る。',a:'夏目漱石',bg:'「坊っちゃん」の著者。効率より深みを重視した文豪の生き方を示す言葉。'},
    {m:'失敗を恐れるな。失敗しないために何もしないことを恐れよ。',a:'ウィリアム・ウォード',bg:'米国の教育者・著述家。行動しないことこそが最大の失敗だという逆転の発想。'},
    {m:'善い習慣は、善い人生を作る。',a:'アリストテレス',bg:'古代ギリシャの哲学者。人格は日々の行動と習慣によって形成されると説いた。'},
    {m:'一日の計は朝にあり。',a:'中国のことわざ',bg:'一日の計画は朝のうちに立てよという意味。物事の準備と計画の大切さを示す格言。'},
    {m:'人生は贈り物だ。毎朝、それを開けることを忘れるな。',a:'エリノア・ルーズベルト',bg:'第32代米大統領夫人。毎日新しい日を感謝と期待を持って迎えることの大切さを説いた。'},
    {m:'今日という日は残りの人生で最も若い日だ。',a:'マーク・トウェイン',bg:'ユーモア作家。今この瞬間が最も若い自分であることを認識して行動することを促す言葉。'},
    {m:'どんな状況でも、感謝できることは必ずある。',a:'ネルソン・マンデラ',bg:'27年の獄中生活でも感謝の気持ちを失わなかった指導者。どんな境遇にも学びと恵みがあると説いた。'},
    {m:'人の値打ちは、何を持っているかではなく、何を与えられるかで決まる。',a:'ウォルト・ホイットマン',bg:'米国の詩人。「草の葉」の著者。人間の価値は所有より貢献にあるという普遍的な哲学。'},
    {m:'夢は逃げない。逃げているのはいつも自分だ。',a:'高橋歩',bg:'作家・冒険家。夢を実現できないのは環境のせいではなく、自分が逃げているからだという厳しくも温かい言葉。'},
    {m:'大切なのは、どれだけ長く生きたかではなく、どれだけ深く生きたかだ。',a:'ラルフ・ワルド・エマーソン',bg:'アメリカの哲学者。人生の質は量より深さにあると説いた超越主義の思想家。'},
    {m:'人は愛した分だけ豊かになる。',a:'ヴィクトル・ユーゴー',bg:'「レ・ミゼラブル」の著者。愛することで奪われるのではなく、豊かになるという逆説的な真理。'},
    {m:'今日の善行は、必ずどこかで誰かの力になる。',a:'ラビンドラナート・タゴール',bg:'ノーベル文学賞受賞インドの詩人。善意の連鎖が見えないところで世界を豊かにしていると説いた。'},
    {m:'老いることを恐れるな。成長することを恐れよ。',a:'ジョージ・バーナード・ショー',bg:'「ピグマリオン」の著者。年齢より精神的な停滞を恐れるべきだという逆転の視点。'},
    {m:'雨は必ず止む。嵐は必ず明ける。',a:'日本のことわざ',bg:'どんな困難も永遠には続かないという希望のメッセージ。忍耐と希望を持って前進する大切さを示す。'},
    {m:'人間はそれほど賢くはない。しかしそれほど馬鹿でもない。',a:'ウィル・ロジャース',bg:'米国の俳優・コメディアン。人間の等身大の姿を愛情を持って表現した言葉。'},
    {m:'何かを始めるためには、話すことをやめなければならない。',a:'ウォルト・ディズニー',bg:'行動なき夢は夢のままで終わるという実践家の言葉。'},
    {m:'成功した人を見ると運が良かったと思う人がいる。しかし成功した人には必ず長い準備期間がある。',a:'松下幸之助',bg:'パナソニック創業者。成功の陰にある見えない努力と準備の大切さを語った言葉。'},
    {m:'人間の赤血球は核がないのに生きている。それが人間の本質だ。',a:'不詳',bg:'核（中心）を失っても役割を果たし続けることができるという比喩的な言葉。'},
    {m:'知恵ある者は水のように生きよ。',a:'老子',bg:'水は低いところに流れ、争わず、全てのものに恵みをもたらす。柔軟で謙虚な生き方を示した言葉。'},
    {m:'孤独を恐れるな。孤独は自分を深める時間だ。',a:'パウロ・コエーリョ',bg:'「アルケミスト」の著者。自分自身と向き合う時間の価値を説いたブラジルの作家。'},
    {m:'負けることを知らない者に、真の勝利はない。',a:'ナポレオン・ボナパルト',bg:'フランス皇帝。数多くの敗北から学びながら偉業を成し遂げた。敗北の経験が強さを生むという逆説。'},
    {m:'言葉より行動が人を作る。',a:'アリストテレス',bg:'古代ギリシャの哲学者。人は言ったことではなく、やったことで評価されると説いた。'},
    {m:'感謝する心は、最高の祈りだ。',a:'ジョン・F・ケネディ',bg:'第35代米国大統領。感謝の気持ちが人を豊かにし、社会を明るくすると語った政治家。'},
    {m:'人生に困難は必要だ。困難なしに、人は偉大になれない。',a:'シラー',bg:'ドイツの詩人・劇作家。苦しみと挑戦が人間の偉大さを生み出すと説いた。'},
    {m:'知恵は年齢からではなく、経験から生まれる。',a:'シェイクスピア',bg:'「ハムレット」「マクベス」の作者。生きた経験こそが真の知恵の源であるという洞察。'},
    {m:'もし今日が人生最後の日だとしたら、何をしたいか。',a:'スティーブ・ジョブズ',bg:'毎朝鏡の前でこの問いを自分に投げかけていたと語ったアップルの共同創業者。'},
    {m:'愛することは、見つけることではなく、育てることだ。',a:'エーリッヒ・フロム',bg:'「愛するということ」の著者。愛は感情ではなく技術であり、意志と実践によって育まれると説いた。'},
    {m:'失敗は人を賢くし、成功は人を謙虚にする。',a:'ベンジャミン・フランクリン',bg:'凧の実験で電気を発見した発明家。失敗と成功の両方から学び続けた生き方を示す。'},
    {m:'大志を抱け。',a:'クラーク博士（ウィリアム・スミス・クラーク）',bg:'北海道開拓使の教師。「Boys, be ambitious!」という言葉で知られ、若者の夢と挑戦を鼓舞した。'},
    {m:'人生で最も重要な投資は、自分自身への投資だ。',a:'ウォーレン・バフェット',bg:'世界的な投資家。知識・スキル・健康への投資が最大のリターンをもたらすと説いた。'},
    {m:'誠実さは最高の政策だ。',a:'ベンジャミン・フランクリン',bg:'凧の実験で電気を発見した発明家。誠実に生きることが長期的に最も有利な生き方だと説いた。'},
    {m:'昨日の自分を超えることが、真の競争だ。',a:'本田圭佑',bg:'サッカー選手。他者との比較ではなく、自己成長こそが本当の挑戦だと語った。'},
    {m:'夜が明けない夜はない。冬の来ない春はない。',a:'シェイクスピア',bg:'「マクベス」の作者。絶望の中にも必ず希望の光があるというメッセージ。'},
    {m:'地球は全人類の故郷だ。国境は地図の上にしかない。',a:'ユーリ・ガガーリン',bg:'人類初の宇宙飛行士。宇宙から見た地球に国境はなく、人類は一つだと語った。'},
    {m:'できないと思った瞬間に、可能性は消える。',a:'マイケル・ジョーダン',bg:'バスケットボールの神様。「諦めない」ことが成功の最大の要因だと証明した伝説のプレーヤー。'},
    {m:'今日笑えば、明日も笑える。',a:'チャーリー・チャップリン',bg:'喜劇王。苦難の中でも笑いを忘れない生き方が、明日への力を生むと説いた。'},
    {m:'水は低いところに流れ、謙虚な心は知恵に満たされる。',a:'老子',bg:'中国の哲学者。「道徳経」に記された言葉。謙虚さが真の知恵をもたらすという教え。'},
    {m:'最良の時間は、今この瞬間だ。',a:'ヨハン・ヴォルフガング・フォン・ゲーテ',bg:'「ファウスト」の著者。今を生きることの大切さを説いた文豪。'},
    {m:'失敗したことのない人間は、何も新しいことに挑戦したことがない人間だ。',a:'アルベルト・アインシュタイン',bg:'相対性理論の発見者。失敗を恐れずに挑戦し続けることが革新の源だと示した言葉。'},
    {m:'志の高い人は、難しい道を選ぶ。',a:'吉田松陰',bg:'幕末の思想家。安易な道ではなく、困難な道こそが人を成長させると説いた。'},
    {m:'美しい心は、美しい言葉を生む。',a:'マザー・テレサ',bg:'インドで生涯を貧しい人々に捧げた聖人。内なる美しさが外の言葉に表れると語った。'},
    {m:'喜んで働く者に、不可能はない。',a:'コンフキウス（孔子）',bg:'中国春秋時代の思想家。情熱と喜びを持って取り組む時、人間は驚くべき力を発揮すると説いた。'},
    {m:'人は失敗から学ぶか、成功から学ぶか。どちらにせよ、学び続けることが大切だ。',a:'ウィンストン・チャーチル',bg:'英国首相。失敗も成功も全て学びの機会であり、立ち止まらないことの大切さを説いた。'},
    {m:'太陽の光は平等に降り注ぐ。受け取り方が違うだけだ。',a:'不詳',bg:'同じ環境や状況でも、受け取り方次第で人生は全く変わるという普遍的な真理。'},
    {m:'言葉で花を咲かせよ。',a:'相田みつを',bg:'書家・詩人。優しい言葉、温かい言葉が人の心に花を咲かせるという詩的な表現。'},
    {m:'信念は山を動かす。',a:'聖書（マタイ伝17章20節）',bg:'「芥子種ほどの信仰があれば山を動かせる」という言葉。強い信念の力を説いたキリストの教え。'},
    {m:'人は自分が思う通りの人間になる。',a:'ジェームズ・アレン',bg:'「『原因』と『結果』の法則」の著者。思考が現実を作り出すという自己実現の哲学を説いた。'},
    {m:'勇気は筋肉と同じだ。使えば使うほど強くなる。',a:'ルース・ゴードン',bg:'女優・脚本家。勇気は生まれ持ったものではなく、実践によって鍛えられるものだと説いた。'},
    {m:'人生で大切なのは、どこにいるかではなく、どこへ向かっているかだ。',a:'ヘンリー・デイヴィッド・ソロー',bg:'「ウォールデン」の著者。現在地より未来への方向性が重要だという思想家の洞察。'},
    {m:'笑顔は最も安価な贈り物だ。',a:'不詳',bg:'お金はかからないのに、相手の心を温め幸福感を生む笑顔の価値を示した言葉。'},
    {m:'今日できることをすれば、明日の自分がもっと自由になる。',a:'ベンジャミン・フランクリン',bg:'勤勉と計画性で知られる発明家・政治家。今日の実行が明日の選択肢を広げると説いた。'},
    {m:'人間は弱い。しかし人間は集まると強くなる。',a:'アントワーヌ・ド・サン＝テグジュペリ',bg:'「星の王子さま」の著者。一人では弱くても、協力し合うことで人間は偉大になれると説いた。'},
    {m:'思い出は心の宝箱だ。',a:'不詳',bg:'大切な体験や出会いが思い出として心に積み重なり、人生を豊かにするという言葉。'},
    {m:'限界を決めるのは、体ではなく心だ。',a:'ロジャー・バニスター',bg:'1954年に人類初の4分を切るマイル走を達成した医師。「不可能」は心が作り出す幻想だと証明した。'},
    {m:'誰かの笑顔のために生きることが、最高の喜びだ。',a:'アルベルト・シュヴァイツァー',bg:'ノーベル平和賞受賞の医師・哲学者。他者への奉仕の中に人生の最大の喜びがあると説いた。'},
    {m:'木は嵐の中で根を深くする。',a:'不詳',bg:'困難な時期こそ、目に見えない力（根）が深く育っているという比喩的な励ましの言葉。'},
    {m:'人生は旅だ。目的地より、旅の仲間が大切だ。',a:'不詳',bg:'人生において誰と歩むかが、どこへ行くかよりも重要だという人間関係の本質を示す。'},
    {m:'夜の星は、昼には見えない。しかし消えているわけではない。',a:'不詳',bg:'困難な時期には見えなくなるが、才能や可能性は消えていないという励ましの言葉。'},
    {m:'人生で最も勇気のいることは、自分自身であることだ。',a:'アンドレ・ジッド',bg:'フランスのノーベル文学賞作家。社会の圧力に流されず、自分自身であり続けることの難しさと重要さを説いた。'},
    {m:'時間を制する者が、人生を制する。',a:'不詳',bg:'時間管理の重要性を説いた言葉。限られた時間をどう使うかが、人生の質を決定する。'},

    {t:'蜂蜜は3000年腐らない',b:'蜂蜜はエジプトのピラミッドから発見されても今も食べられる状態だった。高い糖分と低い水分が細菌の繁殖を防ぐ。'},
    {t:'カタツムリの歯は25000本',b:'カタツムリの歯は約25,000本。舌の表面にヤスリ状に並び、食べ物をすりおろすように食べる。世界で最も歯が多い生き物の一つ。'},
    {t:'人は一生で地球4周分歩く',b:'人が一生で歩く距離は約16万km。地球の円周が約4万kmなので、一生で地球を約4周歩く計算になる。'},
    {t:'バナナはベリーの仲間',b:'植物学的にバナナはベリー（液果）に分類される。一方、イチゴは偽果と呼ばれ厳密にはベリーではない。'},
    {t:'キリンの舌は紫外線対策',b:'キリンの舌は黒紫色で長さ約45cm。一日中日光に当たるため、舌の色が濃いのは紫外線から守るメラニン色素のためと考えられている。'},
    {t:'人体の骨の半分は手足に',b:'人体には約206本の骨があり、両手で54本、両足で52本。手足だけで全体の約半分の骨が集まっている。'},
    {t:'アリは体重の50倍を運ぶ',b:'アリは自分の体重の50倍もの重さを運べる。人間に換算すると体重60kgの人が3トンのものを運ぶようなもの。'},
    {t:'光は1秒で地球を7.5周する',b:'光の速さは秒速約30万km。地球の円周が約4万kmなので、光は1秒で地球を約7.5周する。'},
    {t:'ペンギンは空を飛んでいた',b:'約6000万年前、ペンギンの祖先は空を飛べる鳥だった。海に適応するうちに翼がひれに変化した。'},
    {t:'人間の脳は毎秒100万回の計算',b:'人間の脳は毎秒約100万回の演算を行う。使う神経細胞は約1000億個。1日に生み出す思考の量は推定6万〜7万回以上。'},
    {t:'カメレオンの色変化は感情表現',b:'カメレオンが色を変えるのは主に擬態ではなく、感情や体温調節のため。興奮すると明るく、リラックスすると暗い色になる。'},
    {t:'江戸の人口は世界最大だった',b:'18世紀初頭、江戸の人口は約100万人で当時の世界最大級の都市だった。ロンドンが約70万人、パリが約50万人の時代。'},
    {t:'人は一生で約35トンの食事をする',b:'人が一生で食べる食事の総量は約35トン。毎日3食を80年間続けると約87,600回の食事になる。'},
    {t:'雨の匂いの正体は細菌',b:'雨が降った後の独特の匂いペトリコールの正体は、土の中の放線菌が作るジェオスミンという物質。'},
    {t:'月は毎年3.8cm遠ざかっている',b:'月は地球から毎年約3.8cm遠ざかっている。45億年後には月は現在より遥かに遠く、皆既日食は見られなくなる。'},
    {t:'指紋は6歳頃に完成する',b:'指紋は胎児の頃から形成が始まり、6歳頃に完成する。同じ指紋を持つ人が偶然に存在する確率は640億分の1以下。'},
    {t:'鮭は生まれた川に戻る',b:'鮭は生まれた川の匂いを記憶し、数年後に数百〜数千kmを旅して同じ川に戻る。地球の磁場と嗅覚を組み合わせたナビゲーションによるもの。'},
    {t:'ありがとうの語源は有り難し',b:'「ありがとう」は「有り難し」が変化したもの。「存在することが難しい」から「まれで貴重だ」、そして「感謝する」という意味の変遷をたどった。'},
    {t:'地球の中心は太陽表面より熱い',b:'地球の中心核の温度は約6000℃。太陽の表面温度が約5500℃なので、地球の中心は太陽表面より熱い。'},
    {t:'チョコレートは19世紀まで飲み物',b:'チョコレートは長らく固形ではなく飲み物として消費されてきた。固形チョコが登場したのは1847年のこと。'},
    {t:'クモの糸は鉄より強い',b:'クモの糸は同じ太さの鋼鉄より約5倍強く、ナイロンより3倍の弾力性がある。宇宙服や防弾チョッキへの応用研究が進んでいる。'},
    {t:'ハチドリは1秒間に80回羽ばたく',b:'ハチドリは1秒間に最大80回も羽ばたく。ホバリングができる唯一の鳥で、後ろ向きに飛ぶことも可能。'},
    {t:'日本の国土の67%は森林',b:'日本の国土面積約37.8万平方kmのうち、約67%が森林。先進国の中で最高水準の森林率を誇る。'},
    {t:'人間の体の60%は水分',b:'成人の体重の約60%は水分。脳の約75%、血液の約83%が水でできている。体内の水分が2%失われると集中力が低下し始める。'},
    {t:'北極星は真北ではない',b:'北極星は真北から約0.7度ずれている。地球の自転軸は約26000年周期でゆっくり回転しており、約1万3000年後にはベガが北極星になる。'},
    {t:'眠っている間に身長が伸びる',b:'人間は横になって寝ると背骨の椎間板が伸び、起床時は就寝前より約1〜3cm背が高い。'},
    {t:'カカオは通貨として使われた',b:'マヤ文明やアステカ文明ではカカオ豆が通貨として使われていた。スペイン人が征服した16世紀まで、カカオ豆10粒で1羽の七面鳥が買えた。'},
    {t:'人間は唯一の赤面する動物',b:'チャールズ・ダーウィンは「人間は赤面する唯一の動物だ」と述べた。恥ずかしさを感じたとき、自律神経が血管を拡張させて起こる現象。'},
    {t:'富士山の高さは毎年変わる',b:'富士山の標高は3776mとして知られているが、測量技術の進歩により毎回わずかに数値が変わる。山頂の雪の量によっても変動する。'},
    {t:'日本語の文字体系は3種類',b:'日本語には漢字・ひらがな・カタカナの3種類の文字体系がある。常用漢字だけで2136字。外国人が習得するのに必要な時間はフランス語の約4倍。'},
    {t:'サメは骨がない',b:'サメの骨格は骨ではなく軟骨でできている。軽くて柔軟なため、水中でのすばやい動きが可能。化石が少ないのも軟骨は分解されやすいため。'},
    {t:'アボカドはフルーツ',b:'アボカドは植物学的には果物（核果）に分類される。木に実るため「森のバター」とも呼ばれ、脂質が多くカロリーは果物の中でトップクラス。'},
    {t:'フラミンゴが赤いのは食べ物のせい',b:'フラミンゴの羽が赤やピンクなのは食べ物に含まれるカロテノイド色素のため。白い食べ物だけを与えると白くなってしまう。'},
    {t:'人間の髪は1日に約0.4mm伸びる',b:'人間の髪の毛は1日に約0.4mmほど伸びる。つまり1ヶ月で約1.2cm、1年で約15cm。抜けるまでの寿命は3〜6年。'},
    {t:'コアラの指紋は人間とほぼ同じ',b:'コアラの指紋は人間のものと非常に似ており、犯罪捜査で混同されたケースもある。進化的に全く別の系統なのに、収斂進化で似た形になった不思議な例。'},
    {t:'カラスは道具を使える',b:'カラスは石を使ってクルミを割ったり、信号で車にクルミを割ってもらう知恵を持つ。IQテストでは一部の問題で子供と同等の成績を出すことも。'},
    {t:'日本の国花は桜と菊',b:'日本の国花は法律で定められておらず、慣例的に桜と菊の2つが国花とされる。桜は開花の美しさ、菊は天皇家の紋章として重んじられている。'},
    {t:'イルカは半脳睡眠する',b:'イルカは脳の左右を交互に眠らせる半脳睡眠が可能。泳ぎながら眠ることができ、呼吸のために水面に出る動作を維持しながら休息を取る。'},
    {t:'地球上の生物の80%は海に生息',b:'地球上に存在する生命体の約80%は海に生息している。しかし海のうち人類が探索できたのはわずか5%以下。'},
    {t:'コーヒーはエチオピアが発祥',b:'コーヒーの発祥は9世紀のエチオピアとされる。ヤギが赤い実を食べて元気になるのを見た羊飼いが発見したという伝説が残っている。'},
    {t:'リンゴは収穫後も呼吸している',b:'リンゴは収穫後もエチレンガスを放出し続け、周囲の果物の熟成を早める。「腐ったリンゴが隣のリンゴを腐らせる」という表現はここから来ている。'},
    {t:'カタカナは漢字から生まれた',b:'カタカナは9世紀頃、仏教の経典の注釈を書くために漢字の一部を省略して作られた文字。ひらがなとは異なる経緯で誕生した日本独自の文字体系。'},
    {t:'人間の腸は第二の脳',b:'腸には約1億個以上の神経細胞があり、脳に次ぐ神経細胞の密度を持つ。「腸が判断する」「腹が決まる」という表現はこの脳腸相関に基づく。'},
    {t:'ネコは飼い主を仲間の猫と見ている',b:'研究によると、ネコは飼い主を大きな猫と認識している可能性が高い。大人の猫は他の猫に対しては鳴かないが、人間には鳴くという行動がその証拠。'},
    {t:'地球の陸地はかつて一つだった',b:'約2億年前、地球の陸地はパンゲアという一つの超大陸だった。プレートテクトニクスによって現在の7大陸に分裂し、今も毎年数cmずつ動いている。'},
    {t:'サクラの花びらは必ず5枚',b:'ソメイヨシノの花びらは必ず5枚。自然界では5の倍数の花びらを持つ植物が多い。八重桜は改良によって花びらが増えた品種。'},
    {t:'日本語のありがとうは世界でも珍しい語源',b:'多くの言語で「感謝」を表す言葉は「与える」や「贈る」が語源だが、日本語の「ありがとう」は「存在が難しい＝貴重だ」が語源という珍しいケース。'},
    {t:'キリンの睡眠は1日20分',b:'キリンの睡眠時間は1日わずか20分程度とされる。天敵から身を守るため、横にならず立ったまま数分ずつ眠る分割睡眠を行う。'},
    {t:'タランチュラの一種は口がない',b:'成体のタランチュラの一種は口を持たず、幼虫の頃に蓄えた栄養だけで生きる。これは極めて特殊な進化の一例。'},
    {t:'人間の骨は鋼鉄より強い',b:'重量比で比べると、人間の骨は鋼鉄より強い。骨の密度と構造は圧縮力に対して非常に優れており、最大4トンの圧力に耐えられる場合もある。'},
    {t:'ライオンはほとんど眠っている',b:'ライオンは1日約20時間眠る。雌のライオンが狩りを担い、雄は主にテリトリーの防衛をする。活動時間は1日のうちわずか2〜4時間程度。'},
    {t:'人間の舌の味覚は4種類ではなく5種類',b:'長らく甘・酸・塩・苦の4種類とされていたが、1908年に池田菊苗博士が「旨味」を発見。現在は5つの基本味として世界的に認められている。'},
    {t:'犬は色盲ではない',b:'犬は完全な色盲ではなく、黄色と青は見える。赤と緑の区別は難しいが、人間の「色覚異常」に近い視覚を持っている。夜間の視力は人間より優れている。'},
    {t:'富士山は成層火山',b:'富士山は安山岩と玄武岩から成る成層火山。最後の噴火は1707年（宝永の噴火）で、現在も活火山に分類されている。'},
    {t:'蚊の羽ばたきは1秒600回',b:'蚊は1秒間に約600回羽ばたく。このため「ブーン」という独特の音がする。蚊は二酸化炭素・体温・汗の匂いを感知して標的を見つける。'},
    {t:'カエルは皮膚で呼吸する',b:'カエルは肺呼吸と皮膚呼吸の両方を行う。皮膚が乾燥すると呼吸できなくなるため、常に湿った環境が必要。水中での呼吸も皮膚から行える。'},
    {t:'世界で最も高い山は海底から',b:'最も「高い山」をどう定義するかで変わる。海抜では富士山3776m（エベレスト8849m）だが、海底から測ると南太平洋のマウナケアが一番高い。'},
    {t:'バオバブの木は水を1000L蓄える',b:'アフリカのバオバブの木は幹に最大で1000リットル以上の水を蓄える能力を持つ。乾燥地帯で生き残るための驚異の適応。'},
    {t:'人間が1秒間に行う細胞分裂は約380万回',b:'人間の体では1秒間に約380万個の細胞が分裂している。一方で約380万個の細胞が死んでいる。細胞の入れ替わりが常に起きている。'},
    {t:'海の深さは宇宙より未探索',b:'宇宙は月まで往復探索したが、マリアナ海溝の最深部（水深11034m）を直接探索した人間はごく少数。宇宙に行った人間の数より少ない。'},
    {t:'オウムは人間の言葉の意味を理解する',b:'アレックスというヨウムは「何個ある？」「何色？」などの質問に正確に答えた。単なる音の模倣ではなく、概念を理解していたと考えられている。'},
    {t:'竹は世界で最も成長が速い植物',b:'竹は1日で最大91cm成長することが記録されている。1時間に約4cm、1秒間に約0.001mmというスピードで成長する植物の世界記録保持者。'},
    {t:'猫の骨格は人間と同じ数',b:'猫の骨の数は約230本で、人間の206本より多い。特に尻尾の骨が多い。柔軟性の高い背骨の構造が独特の動きを可能にしている。'},
    {t:'海水を全て蒸発させると塩の山になる',b:'地球上の海水を全て蒸発させると、約4500万立方キロメートルの塩が残る。これは陸地全体を約152m覆う量に相当する。'},
    {t:'ガラスは液体ではない',b:'「ガラスは非常にゆっくり流れる液体」という説があるが誤り。古い教会のガラスが下が厚いのは製造上の問題。ガラスは非晶質固体で液体ではない。'},
    {t:'人間の赤血球は核がない',b:'成熟した人間の赤血球には核も細胞小器官もない。DNAを持たないため分裂できず、約120日で寿命を迎える。その代わり大量のヘモグロビンを詰め込める。'},
    {t:'蝶の翅は生きている',b:'蝶の翅は死細胞ではなく、薄い細胞膜と体液が通う管（翅脈）から構成される。翅は生命維持に必要な器官で、傷つくと飛行能力に影響が出る。'},
    {t:'日本の苗字は約30万種以上',b:'日本には約30万種以上の苗字があるとされる。世界で最も苗字の種類が多い国の一つ。明治時代に一般人が苗字を持つよう義務付けられたことで急増した。'},
    {t:'地球の自転は少しずつ遅くなっている',b:'月の引力による潮汐力の影響で、地球の自転は100年に約0.002秒ずつ遅くなっている。5億年前は1日が約22時間だったと計算されている。'},
    {t:'電子レンジはレーダー研究から偶然発明',b:'1945年、レーダー研究者のパーシー・スペンサーがマグネトロンの前に立ったとき、ポケットのチョコレートが溶けたことで電子レンジの原理を発見した。'},
    {t:'コウモリは鳥ではなく哺乳類',b:'コウモリは哺乳類で、飛べる唯一の哺乳類。翼は人間の手に相当する骨格に皮膜が張ったもの。超音波を使ったエコーロケーションで暗闇でも飛行できる。'},
    {t:'アリの巣には空調システムがある',b:'シロアリの巨大な塚には、温度と湿度を一定に保つための通気システムが備わっている。外気温が40℃でも内部は約30℃を維持できる。'},
    {t:'ウナギの産卵場所は長年謎だった',b:'ニホンウナギの産卵場所は長年不明だったが、2009年にマリアナ海嶺付近であることが初めて確認された。稚魚が日本まで数千km旅してくる。'},
    {t:'チーターの加速は0〜100kmが3秒',b:'チーターは0〜100km/hの加速が約3秒。最高速度は約120km/hで陸上最速の動物。ただし30秒ほどしか全力疾走できず、その後は休憩が必要。'},
    {t:'人間の腎臓は1日180リットルを処理',b:'人間の腎臓は1日に約180リットルもの血液をろ過する。そのうち尿として排出されるのは1.5リットル程度で、残りは再吸収される。'},
    {t:'サンゴは動物である',b:'サンゴは植物に見えるが実は動物。ポリプという小さな動物が集まって形成する。体内に共生する藻類（褐虫藻）が光合成でサンゴに栄養を提供している。'},
    {t:'人間は1日に約2万回呼吸する',b:'人間は1日に約2万回呼吸し、約500リットルの酸素を取り込む。1分間に約15〜20回が安静時の標準的な呼吸数。'},
    {t:'イチゴのつぶつぶが本当の果実',b:'イチゴで赤く柔らかい部分は実は花床（花を支える部分）が肥大したもの。表面のつぶつぶが本当の果実（そう果）で、中に種がある。'},
    {t:'人工知能の基礎は1950年代に生まれた',b:'「人工知能」という言葉は1956年のダートマス会議で初めて使われた。チューリングが1950年に発表した「チューリングテスト」が概念の起源とされる。'},
    {t:'クジラの歌は数千km届く',b:'ザトウクジラの歌声は低周波で、水中を数千km以上伝わる。これは地球の反対側まで届く可能性もある。主にオスが繁殖期に発声する。'},
    {t:'南極には淡水が最も多い',b:'地球上の淡水の約69%は南極の氷河として存在する。もし南極の氷が全て溶けると、海面は約60m上昇すると試算されている。'},
    {t:'人間は目を開けたままくしゃみできない',b:'くしゃみ中に目を開け続けることは極めて難しい。強制的に開けようとする実験もあるが、反射として目が閉じることが多い。眼球保護のための反射とされる。'},
    {t:'桜の花の寿命は1週間',b:'ソメイヨシノ1本の花の寿命は約1週間。しかし木全体の開花期間は2週間程度。1本の木に約40〜60万個の花が咲くとされる。'},
    {t:'日本語の「颯」は世界最短の天気予報',b:'「颯」（さつ）という漢字は「風がさっと吹く様子」を表す。日本語には自然現象を一文字で表す文字が多く、言語の凝縮性の高さを示している。'},
    {t:'ゾウは死を悼む唯一の動物の一つ',b:'ゾウは仲間の死に際して骨の周りに集まり、鼻で触れる行動が観察されている。死の概念を持つ動物の一つとして研究されている。'},
    {t:'人間の心臓は一生に約30億回拍動する',b:'人間の心臓は1分間に約60〜100回拍動する。80年の生涯で計算すると、約30億回拍動し続ける計算になる。'},
    {t:'ジェット気流は富士山より高い',b:'ジェット気流は高度約7,000〜13,000mを流れる速い風。富士山（3,776m）よりもはるかに高い上空を時速300km以上で流れる。'},
    {t:'アリの巣の女王は30年以上生きる',b:'アリの女王は種によって30年以上生きることもある。働きアリが数ヶ月〜1年程度の寿命なのと比べると、驚異的な長寿命を持つ。'},
    {t:'人間の体重の10%は細菌の重さ',b:'人間の腸内などに生息する細菌の数は約38兆個。これら細菌の総重量は体重の約10%、約1〜2kgに相当するとも言われる。'},
    {t:'飛行機の窓は丸い理由',b:'初期のジェット旅客機は四角い窓だったが、気圧差で角にひびが入り墜落事故が起きた。それ以降、応力集中を避けるため丸い窓が標準になった。'},
    {t:'蜂はダンスで仲間に花の場所を伝える',b:'ミツバチは8の字ダンスで花の方向と距離を仲間に伝える。角度で太陽からの方向、ダンスの速さで距離を示す精密なコミュニケーション。'},
    {t:'紙を42回折ると月に届く',b:'紙の厚さ0.1mmを42回折り重ねると、その厚さは月と地球の距離（約38万km）を超える。指数関数的増大の力を示す有名な例え。'},
    {t:'ピラニアは実は臆病な魚',b:'ピラニアは映画では凶暴に描かれるが、実際は臆病で人間を積極的に攻撃することは稀。集団で行動するのも身を守るためで、通常は植物や死んだ魚を食べる。'},
    {t:'ポップコーンが爆発する温度は約180℃',b:'トウモロコシのポップコーン用品種の粒の中には水分が含まれており、約180℃で水蒸気が膨張して爆発する。爆発時の速さは約300km/h。'},
    {t:'クラゲは宇宙に行ったことがある',b:'1991年、スペースシャトルで約2500匹のクラゲが宇宙に行った実験があった。帰還後の子クラゲは重力の感覚に異常を示し、宇宙での生殖・発育の研究に貢献した。'},
    {t:'日本の国技は相撲と言われるが法律上の国技はない',b:'相撲が「国技」と呼ばれるようになったのは1909年に両国国技館が建設されたことが由来。法律で定められた「国技」は日本には存在しない。'},
    {t:'ネコは超音波を聞き取れる',b:'ネコの可聴域は人間の倍以上で、約79kHzまでの超音波を聞き取れる。ネズミが出す超音波を感知して狩りに活用している。'},
    {t:'人間の鼻は約1兆種の匂いを嗅ぎ分ける',b:'2014年の研究で、人間は約1兆種の異なる匂いを区別できることが判明した。以前の推定値10,000種を大幅に上回る結果で、嗅覚の鋭敏さが改めて注目された。'},
    {t:'ゴリラは人間と97%以上DNAが同じ',b:'ゴリラと人間のDNA配列は約97〜98%一致する。チンパンジーはさらに近く約99%一致。人間と最も近い動物は意外にも類人猿ではなくイルカだという説もある。'},
    {t:'宇宙空間では音は聞こえない',b:'宇宙空間はほぼ真空で、音（空気の振動）が伝わらない。SF映画の宇宙戦争の爆発音は実際には存在しない。電磁波は伝わるため光や電波は届く。'},
    {t:'ハリネズミは実はハリを意識的に制御できる',b:'ハリネズミのハリは背中の筋肉で制御できる。怒ったり怖がったりするとハリを立て、リラックスすると寝かせる。ハリの数は約5000〜8000本。'},
    {t:'アイスクリームは中国が発祥',b:'アイスクリームの原型は7世紀頃の中国唐王朝にあったとされる。雪や氷に牛乳や砂糖を混ぜた「冷菓」が起源で、マルコ・ポーロによってヨーロッパに伝わったという説がある。'},
    {t:'時計回りは太陽の動きが由来',b:'北半球で日時計を使うと影が左から右へ動く。これが時計の針の方向の起源。南半球では逆に動くため、オーストラリア製の日時計は反時計回りになる。'},
    {t:'人間の爪は1日に0.1mm伸びる',b:'人間の爪は1日に約0.1mm伸びる。つまり1ヶ月で約3mm。手の爪が足の爪より早く伸び、夏の方が冬より伸びが速い。'},
    {t:'砂漠は乾燥した場所ではなく降水量が少ない場所',b:'南極も砂漠の一種に分類される。降水量が少ない（年間250mm以下）という定義によるもので、南極は年間降水量が約50〜200mmしかない「寒冷砂漠」。'},
    {t:'タコは3色の皮膚変化を持つ',b:'タコは色盲（1種類の光受容体しか持たない）なのに体の色を変えられる謎が長年残っていた。最近の研究で、皮膚にも光を感じる細胞があることが発見された。'},
    {t:'人間は生まれた時から恐怖を2つだけ持つ',b:'生まれつき持つ恐怖は「大きな音」と「落ちる感覚」の2つだけとされる。蛇や暗闇への恐怖は後天的に学習される。'},
    {t:'チーズは世界最古の加工食品の一つ',b:'チーズの歴史は約7500年前のポーランドにさかのぼる。乳製品の土器が発見されており、これが現在確認されている最古のチーズ製造の証拠とされる。'},
    {t:'日本は世界最多の温泉数',b:'日本の温泉は約27,000か所以上あり、世界最多水準を誇る。温泉の定義（25℃以上か特定成分を含む）を満たす源泉の数は世界トップクラス。'},
    {t:'サメは骨がない',b:'サメの骨格は骨ではなく軟骨でできている。軽くて柔軟なため水中でのすばやい動きが可能。化石が少ないのも軟骨は分解されやすいため。'},
    {t:'アボカドはフルーツ',b:'アボカドは植物学的には果物（核果）に分類される。木に実るため「森のバター」とも呼ばれ、脂質が多くカロリーは果物の中でトップクラス。'},
    {t:'フラミンゴが赤いのは食べ物のせい',b:'フラミンゴの羽が赤やピンクなのは食べ物に含まれるカロテノイド色素のため。白い食べ物だけを与えると白くなってしまう。'},
    {t:'人間の髪は1日に約0.4mm伸びる',b:'人間の髪の毛は1日に約0.4mmほど伸びる。1ヶ月で約1.2cm、1年で約15cm。抜けるまでの寿命は3〜6年。'},
    {t:'コアラの指紋は人間とほぼ同じ',b:'コアラの指紋は人間のものと非常に似ており、犯罪捜査で混同されたケースもある。進化的に全く別の系統なのに収斂進化で似た形になった。'},
    {t:'カラスは道具を使える',b:'カラスは石を使ってクルミを割ったり、信号で車にクルミを割ってもらう知恵を持つ。IQテストでは一部の問題で子供と同等の成績を出すことも。'},
    {t:'イルカは半脳睡眠する',b:'イルカは脳の左右を交互に眠らせる半脳睡眠が可能。泳ぎながら眠ることができ、呼吸のために水面に出る動作を維持しながら休息を取る。'},
    {t:'コーヒーはエチオピアが発祥',b:'コーヒーの発祥は9世紀のエチオピアとされる。ヤギが赤い実を食べて元気になるのを見た羊飼いが発見したという伝説が残っている。'},
    {t:'リンゴは収穫後も呼吸している',b:'リンゴは収穫後もエチレンガスを放出し続け、周囲の果物の熟成を早める。「腐ったリンゴが隣のリンゴを腐らせる」という表現はここから来ている。'},
    {t:'人間の腸は第二の脳',b:'腸には約1億個以上の神経細胞があり、脳に次ぐ神経細胞の密度を持つ。「腹が決まる」という表現はこの脳腸相関に基づく。'},
    {t:'ネコは飼い主を大きな猫と認識している',b:'研究によると、ネコは飼い主を大きな猫と認識している可能性が高い。大人の猫は他の猫に対しては鳴かないが、人間には鳴くという行動がその証拠。'},
    {t:'地球の陸地はかつて一つだった',b:'約2億年前、地球の陸地はパンゲアという一つの超大陸だった。プレートテクトニクスによって現在の7大陸に分裂し、今も毎年数cmずつ動いている。'},
    {t:'ライオンはほとんど眠っている',b:'ライオンは1日約20時間眠る。雌が狩りを担い、雄は主にテリトリーの防衛をする。活動時間は1日のうちわずか2〜4時間程度。'},
    {t:'旨味は日本人が発見した',b:'「旨味（UMAMI）」は1908年に池田菊苗博士が昆布だしから発見した。甘・酸・塩・苦の4種に続く第5の基本味として世界的に認められている。'},
    {t:'犬は色盲ではない',b:'犬は完全な色盲ではなく、黄色と青は見える。赤と緑の区別は難しいが夜間の視力は人間より優れている。'},
    {t:'蚊の羽ばたきは1秒600回',b:'蚊は1秒間に約600回羽ばたく。このため「ブーン」という独特の音がする。二酸化炭素・体温・汗の匂いを感知して標的を見つける。'},
    {t:'竹は世界で最も成長が速い植物',b:'竹は1日で最大91cm成長することが記録されている。1時間に約4cm。植物の成長速度の世界記録保持者。'},
    {t:'アリの巣には空調システムがある',b:'シロアリの巨大な塚には温度と湿度を一定に保つための通気システムが備わっている。外気温が40℃でも内部は約30℃を維持できる。'},
    {t:'南極には淡水が最も多い',b:'地球上の淡水の約69%は南極の氷河として存在する。もし南極の氷が全て溶けると海面は約60m上昇すると試算されている。'},
    {t:'電子レンジはレーダー研究から偶然発明',b:'1945年、レーダー研究者のパーシー・スペンサーがマグネトロンの前に立ったとき、ポケットのチョコレートが溶けたことで電子レンジの原理を発見した。'},
    {t:'ハチはダンスで仲間に花の場所を伝える',b:'ミツバチは8の字ダンスで花の方向と距離を仲間に伝える。角度で太陽からの方向、ダンスの速さで距離を示す精密なコミュニケーション。'},
    {t:'紙を42回折ると月に届く',b:'紙の厚さ0.1mmを42回折り重ねると、その厚さは月と地球の距離（約38万km）を超える。指数関数的増大の力を示す有名な例え。'},
    {t:'カカオは通貨として使われた',b:'マヤ文明やアステカ文明ではカカオ豆が通貨として使われていた。スペイン人が征服した16世紀まで、カカオ豆10粒で1羽の七面鳥が買えた。'},
    {t:'日本の苗字は約30万種以上',b:'日本には約30万種以上の苗字があるとされる。明治時代に一般人が苗字を持つよう義務付けられたことで急増した。世界で最も苗字の種類が多い国の一つ。'},
    {t:'時計回りは太陽の動きが由来',b:'北半球で日時計を使うと影が左から右へ動く。これが時計の針の方向の起源。南半球では逆に動くため、オーストラリア製の日時計は反時計回りになる。'},
    {t:'バオバブの木は水を1000L蓄える',b:'アフリカのバオバブの木は幹に最大1000リットル以上の水を蓄える能力を持つ。乾燥地帯で生き残るための驚異の適応。'},
    {t:'人間の目を開けたままくしゃみできない',b:'くしゃみ中に目を開け続けることは極めて難しい。反射として目が閉じることが多い。眼球保護のための反射とされる。'},
    {t:'桜の花の寿命は1週間',b:'ソメイヨシノ1本の花の寿命は約1週間。木全体の開花期間は2週間程度。1本の木に約40〜60万個の花が咲くとされる。'},
    {t:'ゾウは死を悼む唯一の動物の一つ',b:'ゾウは仲間の死に際して骨の周りに集まり鼻で触れる行動が観察されている。死の概念を持つ動物の一つとして研究されている。'},
    {t:'人間の心臓は一生に約30億回拍動する',b:'人間の心臓は1分間に約60〜100回拍動する。80年の生涯で計算すると約30億回拍動し続ける計算になる。'},
    {t:'日本は世界最多の温泉数',b:'日本の温泉は約27,000か所以上あり世界最多水準を誇る。源泉の数は世界トップクラス。'},
    {t:'チーターの加速は0〜100kmが3秒',b:'チーターは0〜100km/hの加速が約3秒。最高速度は約120km/hで陸上最速の動物。ただし30秒ほどしか全力疾走できない。'},
    {t:'人間の腎臓は1日180リットルを処理',b:'人間の腎臓は1日に約180リットルもの血液をろ過する。そのうち尿として排出されるのは1.5リットル程度で残りは再吸収される。'},
    {t:'クジラの歌は数千km届く',b:'ザトウクジラの歌声は低周波で水中を数千km以上伝わる。主にオスが繁殖期に発声する。'},
    {t:'サンゴは動物である',b:'サンゴは植物に見えるが実は動物。ポリプという小さな動物が集まって形成する。体内に共生する藻類が光合成でサンゴに栄養を提供している。'},

    {t:'ゾウの鼻は4万の筋肉でできている',b:'ゾウの鼻には4万以上の筋肉が含まれ、非常に精密な動きができる。重さ270kgの木を持ち上げる一方、地面に落ちた一粒の豆を拾うことも可能。'},
    {t:'人間の目は1千万色を識別できる',b:'人間の目には赤・緑・青の三種類の錐体細胞があり、理論上1千万種以上の色を識別できる。ただし個人差が大きく、色覚に関わる遺伝子の違いで識別できる色の範囲が異なる。'},
    {t:'ピアノの鍵盤は88鍵',b:'標準的なピアノには88鍵（白鍵52・黒鍵36）ある。これは人間の耳が快適に聞ける音域をほぼカバーしており、1700年代から現在の形に落ち着いた。'},
    {t:'カメのDNAは人間より多い',b:'ある種のカメのゲノムは人間より多くの遺伝子を含む。遺伝子の数と生物の複雑さは必ずしも一致しない。'},
    {t:'人間の骨は鋼鉄より硬い（重量比）',b:'重量比で比べると人間の骨は鋼鉄より強い。骨の密度と構造は圧縮力に対して非常に優れており、最大4トンの圧力に耐えられる場合もある。'},
    {t:'ライオンが狩りをするのは主にメス',b:'ライオンの群れで狩りを担当するのは主にメスライオン。オスは縄張りの防衛が主な役割。ただしオスも独り暮らしでは自分で狩りをする。'},
    {t:'富士山は成層火山',b:'富士山は安山岩と玄武岩から成る成層火山。最後の噴火は1707年（宝永の噴火）で、現在も活火山に分類されている。'},
    {t:'雷は同じ場所に2度落ちる',b:'「雷は同じ場所に2度落ちない」は迷信。エンパイアステートビルは年間約20〜30回落雷を受ける。高い建物や木は繰り返し落雷の標的になる。'},
    {t:'人間の舌は地紋が指紋と同様にユニーク',b:'舌の表面のパターンは個人ごとに異なり、指紋と同様に個人識別に使える可能性がある。舌紋認証の研究が進んでいる。'},
    {t:'海の平均深度は3,688メートル',b:'太平洋・大西洋・インド洋などを含めた世界の海の平均深度は約3,688m。最も深いマリアナ海溝チャレンジャー深淵は約10,994m。'},
    {t:'人類が月面に置いてきた物の総重量は181トン',b:'アポロ計画で月面に置いてきた機材・廃棄物・記念品などの総重量は約181トン。一方月から地球に持ち帰った岩石は約382kg。'},
    {t:'日本の自動販売機は世界最多密度',b:'日本には約420万台以上の自動販売機があり、国民約30人に1台の割合。世界で最も自動販売機の密度が高い国の一つで、その種類も食品・飲料・本・服など多様。'},
    {t:'タコの血は青い',b:'タコの血液は銅を含むヘモシアニンが酸素を運ぶため、青色をしている。人間のヘモグロビン（鉄含有）は赤い。寒い環境では青い血の方が効率的に酸素を運べる。'},
    {t:'虹は実は円形',b:'虹は太陽光が水滴で屈折して生まれる現象で、観測者から見ると本来は完全な円形。地面が邪魔をするため地上からは半円に見えるが、飛行機や山頂からは完全な円の虹が見える。'},
    {t:'睡眠中も脳は活動している',b:'睡眠中の脳は「休んでいる」のではなく、記憶の整理、老廃物の除去、免疫機能の強化など重要な作業を行っている。特にREM睡眠時には夢を見ながら感情の処理が行われる。'},
    {t:'サメは軟骨魚類',b:'サメには骨がなく、骨格は全て軟骨でできている。軽くて柔軟な軟骨は水中での俊敏な動きを可能にする。化石が少ないのも軟骨は分解されやすいため。'},
    {t:'人間は一日に約2万回まばたきする',b:'人間は1分間に15〜20回まばたきし、1日で約1〜2万回。まばたきは目の表面を涙液で保護し乾燥を防ぐ重要な役割がある。'},
    {t:'チンパンジーと人間のDNA差は1.2%',b:'チンパンジーと人間のDNA配列の差はわずか約1.2〜1.6%。しかしこの小さな違いが言語、文明、芸術など人間固有の能力を生み出している。'},
    {t:'地球の表面の71%が海',b:'地球の表面積の約71%（約3億6000万平方km）が海で覆われている。そのため「地球」より「水球」と呼ぶ方が正確かもしれない。'},
    {t:'ミツバチは1秒間に200回羽ばたく',b:'ミツバチは1秒間に約200回羽ばたく。この振動が独特の「ブーン」という音を生む。蜂蜜1kg作るのに、1匹のミツバチが地球4周分以上飛ぶ必要がある。'},
    {t:'木は地球上に約3兆本存在する',b:'2015年の研究で、地球上の木の総数は約3兆本と推定された。これは従来の推定値（4000億本）の約7倍。人間の活動により1年に150億本が失われているという。'},
    {t:'月面の足跡はあと数百万年残る',b:'月には大気も雨も風もないため、アポロ計画の宇宙飛行士が残した足跡は数百万年以上残ると考えられている。ただし微小隕石の衝突で徐々に消えていく。'},
    {t:'ネコは舌で水を飲む独自の方法を持つ',b:'ネコは水を飲む時、舌の先端を水面に触れさせ素早く引き抜いて水の柱を作り飲み込む。この動作は1秒間に約4回で、人間の目には見えないほど速い。'},
    {t:'パスポートの色は4種類に大別される',b:'世界のパスポートの色は赤・青・緑・黒の4色に大別される。各色には地域的・宗教的・政治的な意味合いがある。日本のパスポートは紺色（濃紺）。'},
    {t:'北極と南極、より寒いのは南極',b:'北極の平均気温は約-34℃だが、南極の平均気温は約-57℃で南極の方が圧倒的に寒い。南極は大陸の上にある一方、北極は海の上の氷なので熱が蓄えられにくい。'},
    {t:'人間の脳は重量の2%なのに全エネルギーの20%を消費',b:'人間の脳は体重の約2%しかないにも関わらず、体が使うエネルギーの約20%を消費する。特に思考・記憶・感情処理などの高次機能に大量のエネルギーが必要。'},
    {t:'金属のナトリウムは水に触れると爆発する',b:'金属ナトリウムは常温の水と激しく反応して水素ガスを発生し、発火・爆発する。食塩（塩化ナトリウム）は安定しているが、純粋なナトリウム金属は非常に危険。'},
    {t:'人間の腸内には約100兆個の細菌がいる',b:'腸内には約100兆個の細菌が生息しており、その重量は約1〜2kg。これらの腸内細菌は消化だけでなく、免疫システム、メンタルヘルス、さらには性格にも影響を与えると研究されている。'},
    {t:'地球から最も近い星はプロキシマ・ケンタウリ',b:'太陽を除いて地球から最も近い星はプロキシマ・ケンタウリで、約4.24光年の距離にある。光の速さで移動しても4年以上かかる距離。'},
    {t:'タコは眠る',b:'2021年の研究でタコが睡眠中に色が変わり、夢を見ている可能性があることが発見された。眠ること自体が哺乳類だけでなく、頭足類にも共通することが示唆された。'},
    {t:'毛細血管の総延長は地球2周半分',b:'人間の体内の毛細血管をすべてつなぎ合わせると、総延長は約10万kmになる。これは地球を約2.5周する距離。'},
    {t:'リンゴとバラは同じ科',b:'リンゴ、バラ、イチゴ、桃、梨はすべてバラ科（Rosaceae）に属する植物。果物とバラが近い親戚であることは多くの人が知らない生物学的事実。'},
    {t:'テレビは1925年に発明された',b:'スコットランドの発明家ジョン・ロジー・ベアードが1925年に世界初のテレビの実演を行った。日本でNHKがテレビ放送を開始したのは1953年。'},
    {t:'地球の磁気北極は移動している',b:'地球の磁気北極は固定されておらず、毎年約50〜60km移動している。現在はカナダ北部からシベリア方向へ移動中。コンパスが指す北は地理的な北極点とは異なる。'},
    {t:'日本語の「木漏れ日」は翻訳不可能',b:'木漏れ日（こもれび）は木の葉の間から差し込む光を表す日本語で、他の言語に対応する一語がないとされる。日本人の自然への繊細な感性を示す言葉。'},
    {t:'クモは毎晩巣を食べる',b:'多くのクモは毎晩自分の巣を食べてそのタンパク質を回収し、翌朝また新しい巣を張る。クモの糸はタンパク質でできているため、リサイクルして効率よく利用している。'},
    {t:'人間は生まれつき泳げない',b:'人間は水泳の本能を持たず、泳ぎは後天的に学習する必要がある技術。ただし生後数ヶ月の赤ちゃんは水に入ると反射的に息を止め手足を動かす「潜水反射」がある。'},
    {t:'羽毛布団は1000年以上前から使われていた',b:'羽毛布団の起源は中世ヨーロッパや中国にさかのぼり、少なくとも1000年以上の歴史がある。ガチョウやアヒルの羽毛の空気を含む構造が保温性を高める。'},
    {t:'ロシアは9つのタイムゾーンを持つ',b:'ロシアは世界最大の国土面積を誇り、11のタイムゾーンにまたがるが、実際に使用しているタイムゾーンは9つ。東西の時差は最大10時間。'},
    {t:'ゴールデンゲートブリッジは毎日わずかに揺れる',b:'サンフランシスコのゴールデンゲートブリッジは気温変化・風・交通による荷重で毎日わずかに伸縮・振動する。夏場は冬より橋が長くなり、中央で最大約2.7m低くなることもある。'},
    {t:'飛行機の座席は前方が安全',b:'統計的に飛行機の後部座席の生存率が高いとする研究もあるが、専門家は「飛行機は自動車より圧倒的に安全な乗り物」であることを強調している。'},
    {t:'ジャガイモは宇宙食として研究されている',b:'NASAはジャガイモを宇宙での食料として研究している。少ない土地と水で大量のカロリーを生産でき、火星での栽培可能性も研究されている。'},
    {t:'人間の声帯は1秒間に100〜1000回振動する',b:'人間の発声時、声帯は1秒間に100〜1000回以上振動する。低い声では振動数が少なく、高い声では多くなる。'},
    {t:'インターネットの重さは約50グラム',b:'電子全体の重さで換算すると、インターネット上を流れる情報（電子の動き）の総重量は約50グラムという試算がある。もちろんインフラ自体は膨大な重量。'},
    {t:'クジラは歌を学習する',b:'ザトウクジラのオスは歌を学習・変化させる。群れの中で流行する「最新の歌」があり、数年かけて変化していく文化的進化が観察されている。'},
    {t:'人間の体内の原子は宇宙の年齢と同じくらい古い',b:'人間の体を構成する原子のほとんどは、超新星爆発など宇宙の歴史的事件で生まれた。炭素・酸素・鉄などの原子は数十億年前からある「星の欠片」。'},
    {t:'ダイヤモンドは燃える',b:'ダイヤモンドは炭素の純粋な結晶。酸素の中で約850℃以上に加熱すると燃えてCO2になる。世界最硬の物質だが、燃えるという意外な性質を持つ。'},
    {t:'ナポレオンは低身長ではなかった',b:'ナポレオンが短身というのは誤解。彼の身長は約169cmで当時のフランス人平均より高かった。「低身長」のイメージは当時の政治漫画と単位の混同が原因とされる。'},
    {t:'ゴキブリは核爆発を生き延びられない',b:'「ゴキブリは核爆発を生き延びられる」は誇張。放射線に対する耐性は人間の10倍程度あるが、核爆発の直接の衝撃波・熱には耐えられない。'},
    {t:'牛はほぼすべて北を向いて草を食む',b:'衛星写真の分析で、牛や鹿は草を食む時に地球の磁場に沿って北か南を向く傾向があることが発見された。動物も磁場を感知している可能性を示す。'},
    {t:'人間の皮膚は完全に入れ替わる',b:'人間の皮膚の細胞（角質細胞）は約28日周期で入れ替わる。皮膚の最外層（表皮）は約1ヶ月で完全に新しい細胞に更新される。'},
    {t:'水は4℃で最も密度が高い',b:'水は温度を下げると密度が高くなるが、4℃で最も密度が高くなり、それより低くなると膨張して密度が下がる。氷が水に浮くのはこの性質のため。'},
    {t:'地球は完全な球体ではない',b:'地球は自転による遠心力で赤道方向に膨らんだ「回転楕円体」。赤道半径（6,378km）は極半径（6,357km）より約21km大きい。'},
    {t:'アリはコロニーで民主主義的な決定をする',b:'アリのコロニーは女王が「命令」するのではなく、個々のアリのフェロモンによる情報伝達で集団的な意思決定をする。これは民主的・分散的な意思決定の例として研究されている。'},
    {t:'ブロッコリーは一つの花序',b:'ブロッコリーは無数の小さな花のつぼみが集まった「花序」。収穫せずに置いておくと黄色い花が咲く。カリフラワーも同様の構造。'},
    {t:'クロコダイルは4億年以上前からほぼ同じ姿',b:'クロコダイルの祖先は約2億4000万年前から存在し、現在の形とほぼ同じ。恐竜が絶滅した大量絶滅を生き延びた「生きた化石」の一つ。'},
    {t:'はちみつは世界最古の医薬品の一つ',b:'古代エジプトでは3500年以上前からはちみつを傷の治療に使用していた。抗菌作用を持つことが現代でも確認されており、医療用に使われることもある。'},
    {t:'ツノゼミは様々な形の「ツノ」を進化させた',b:'ツノゼミという虫は頭部から奇妙な形の突起（ツノ）を進化させた。球形・渦巻き・アンテナ状など多様な形があり、その機能はまだ完全に解明されていない。'},
    {t:'電球の発明よりもインターネットの普及の方が速かった',b:'電球が家庭に普及するまで約46年かかったが、インターネットは7年で世界人口の25%に普及。スマートフォンは4年で同じ普及率を達成した。'},
    {t:'ウォルト・ディズニーはMICKEYをMORTIMERにしようとした',b:'ミッキーマウスは当初「モーティマー・マウス」と名付けられる予定だった。ウォルト・ディズニーの妻がミッキーという名前を提案したことで変更された。'},
    {t:'人間は一生に約7万5000リットルの唾液を分泌する',b:'人間は1日に約1〜1.5リットルの唾液を分泌し、一生では約7万5000リットルになる。唾液は消化・殺菌・歯の保護など重要な役割を果たしている。'},
    {t:'タコは一度だけ繁殖する',b:'ほとんどのタコは一生に一度だけ繁殖し、メスは卵を産んだ後に食事をやめて卵を守り続け、孵化後に命を落とす。一世代で完結する劇的な生態。'},
    {t:'ハチは電場を感じることができる',b:'ミツバチは花が発する弱い電場を感知できる能力を持つ。花が他のハチに訪れられると電場が変わり、ミツバチはその変化で「蜜がある花か」を判断する。'},
    {t:'人間の指紋は妊娠3ヶ月頃に形成される',b:'指紋は胎児期の妊娠3〜4ヶ月頃に形成される。羊水の中で指の先端の皮膚が成長する過程で生じる独特のパターンで、以後一生変わらない。'},
    {t:'ソファーに座り過ぎると寿命が縮む',b:'研究によると1日8時間以上座り続けると死亡リスクが15%増加するという。「座り過ぎ」は喫煙と同程度の健康リスクとも言われ、定期的に立ち上がることが重要。'},
    {t:'世界で最も多く栽培されている果物はトマト',b:'トマトは植物学的には果物（液果）に分類される。年間生産量は約2億トンで世界最多の「果物」。ただし一般的には野菜として扱われる。'},
    {t:'オウムは人間の言葉の意味を理解できる',b:'ヨウムのアレックスは「いくつある？」「何色？」「何が違う？」などの質問に正確に答えた。単なる音の模倣ではなく概念を理解していた可能性がある。'},
    {t:'紙幣には思いのほか多くの細菌がいる',b:'研究によると、紙幣には数十種類の細菌が付着しており、使用されるたびに人から人へと移動する。一部の紙幣からは食中毒菌が検出された例もある。'},
    {t:'カメは肺で呼吸する',b:'カメは肺呼吸をする爬虫類で、水に潜っても水中から酸素を取り込む「鰓」は持たない。ただし一部のカメは皮膚や総排泄腔から限られた酸素を取り込むことができる。'},
    {t:'月は地球から少しずつ離れていく',b:'月は毎年約3.8cm地球から遠ざかっている。45億年後には月の見かけの大きさが現在より小さくなり、皆既日食が起こらなくなる計算になる。'},
    {t:'日本は世界第3位の経済大国',b:'GDPベースで日本は世界第3位の経済大国（2024年時点ではドイツに抜かれ4位になったという報道も）。自動車・電子機器・精密機械などの分野で世界をリードする。'},
    {t:'ヒマワリは成長期のみ太陽を追う',b:'「ヒマワリは太陽を追って回る」のは成長中の若い茎だけ。開花後は東を向いて固定されたままになる。これは蜂を引き寄せるための戦略とも言われている。'},
    {t:'蚊が最も人間を殺している生き物',b:'年間約72万5000人がマラリアなどの蚊が媒介する病気で死亡。2位はヘビ（約5万人）、3位は犬（3万5000人）。最も危険な「生き物」は蚊という統計がある。'},
    {t:'世界初の写真は露光に8時間かかった',b:'1826年にニエプスが撮影した世界最古の写真は、露光時間に約8時間を要した。現在のカメラは1/8000秒以下で写真を撮ることができる。'},
    {t:'人間の体の中で最も大きい細胞は卵細胞',b:'人間の体の細胞の中で最も大きいのは卵細胞（卵子）で直径約0.1mm（100マイクロメートル）。最も小さい細胞の一つは赤血球で直径約7マイクロメートル。'},
    {t:'砂漠は全て砂ではない',b:'砂漠の定義は「年間降水量250mm以下の地域」。砂は砂漠面積の約25%に過ぎず、残りは岩や砂利でできている。南極は「寒冷砂漠」として世界最大の砂漠。'},
    {t:'人体の最も薄い骨は耳の骨',b:'人体の骨の中で最も薄いのは中耳にあるアブミ骨で、厚さ約0.5mm。これら耳小骨（ツチ骨・キヌタ骨・アブミ骨）は体内で最も小さい骨でもある。'},
    {t:'コーヒーの木は一杯のコーヒーに4000粒の豆が必要',b:'コーヒーの木1本から年間約2000粒のコーヒー豆が収穫できる。一杯のコーヒーには約70粒の豆が必要なため、一本の木で約28〜29杯分しか作れない。'},
    {t:'人間の声は約9種類の感情を表せる',b:'研究によると、人間は声のトーンだけで愛情・恐怖・驚き・怒り・悲しみ・喜びなど少なくとも9種類の感情を表現でき、他者もそれを識別できることがわかった。'},
    {t:'地球上のすべての金は宇宙から来た',b:'地球上に存在する金のほとんどは、小惑星・隕石が地球に衝突した時に持ち込まれたものと考えられている。地球が形成された際の金は地球の核に沈んでしまっている。'},
    {t:'世界で最も翻訳されている本は聖書',b:'聖書は約700言語に翻訳されており、世界で最も多くの言語に翻訳された書物。2位は「ピノキオ」で約300言語、3位が「星の王子さま」で約260言語。'},
    {t:'人間は地球上で唯一「顎を左右に動かせる」哺乳類の一つ',b:'人間など一部の哺乳類は顎を前後・左右に動かして食べ物を咀嚼できる。これが硬い食べ物を効率よく噛み砕く能力につながっている。'},
    {t:'鉄は地球で最も多い元素（質量比）',b:'地球全体で見ると、最も多い元素は鉄（約32%）、次いで酸素（30%）、ケイ素（15%）、マグネシウム（14%）の順。ただし地球の表面（地殻）では酸素が最多。'},
    {t:'人間は水の中で目を開けると視力が下がる',b:'水の中では角膜の屈折率と水の屈折率が近くなるため、焦点が合わなくなり視力が約0.1程度まで下がる。魚は水中に適応した目の構造を持つ。'},
    {t:'チョコレートの語源はアステカ語',b:'チョコレートの語源はアステカ語の「ショコラトル（xocolatl）」で「苦い水」を意味する。アステカ人はカカオを苦い飲み物として飲んでいた。'},
    {t:'地球の自転は徐々に遅くなっている',b:'月の引力による潮汐力の影響で地球の自転速度は少しずつ低下している。1億年後には1日が約25時間になると試算されている。'},
    {t:'スマートフォンは5億年分の計算能力を持つ',b:'現代のスマートフォンのCPUは、アポロ11号を月に送ったコンピューターの約100万倍の処理能力を持つ。また人間が手作業で行うと5億年かかる計算を1秒でこなせる。'},
    {t:'日本の漢字の総数は約5万字',b:'日本で使用される漢字の総数は約5万字とされる。常用漢字は2136字、日常的な読み書きに必要な漢字は約2000〜3000字程度。音訓の組み合わせは数万通りに及ぶ。'},
    {t:'人間の髪は月に一度の割合で1.25cm伸びる',b:'人間の髪の毛は1ヶ月に約1〜1.5cm（平均1.25cm）伸びる。1年で約15cm伸びる計算になり、10年で1.5m以上伸びる。成長スピードは季節や健康状態で変わる。'},
    {t:'猫の骨の数は人間より多い',b:'猫の骨の数は約230〜240本で、人間の206本より多い。特に尻尾の骨（尾椎）が多く、柔軟な動きを可能にしている。'},
    {t:'バナナは放射性物質を含む',b:'バナナはカリウム40という放射性同位体を含む。「バナナ等価線量（BED）」という単位があるほど。ただしその量は極めて微量で健康への影響はない。'},
    {t:'猫の骨の数は人間より多い',b:'猫の骨の数は約230〜240本で、人間の206本より多い。特に尻尾の骨（尾椎）が多く、柔軟な動きを可能にしている。'},
    {t:'クリスマスの本来のプレゼント贈答習慣は19世紀に定着',b:'サンタクロースの赤い服は1930年代のコカ・コーラの広告によって広まったという説があるが、実際には広告以前から赤いサンタのイメージは存在した。'},

    {t:'世界一大きい花はラフレシア',b:'ラフレシアは直径最大1mにもなる世界最大の花。寄生植物で葉も茎も根もなく、他の植物の根や茎に寄生して栄養を得る。腐った肉のような臭いで昆虫を引き寄せる。'},
    {t:'クモは実は昆虫ではない',b:'クモは昆虫ではなく、クモ綱（蛛形綱）に属する節足動物。昆虫は脚が6本だがクモは8本。カニやサソリと同じ仲間。全世界に約4万種以上が存在する。'},
    {t:'南極で一番多い動物はペンギンではない',b:'南極で最も個体数が多い動物はナンキョクオキアミという小さな甲殻類。推定7億5000万トンが生息し、ペンギン・クジラ・アザラシなどの食物連鎖を支えている。'},
    {t:'人間の骨密度は30歳でピークを迎える',b:'骨密度は30歳頃にピークを迎え、その後は年齢とともに低下する。特に女性は閉経後に急激に低下するため、若いうちから骨を丈夫にする生活習慣が重要。'},
    {t:'チーズは世界に1000種類以上ある',b:'世界中に1000〜2000種類以上のチーズが存在するとされる。フランスだけで400種以上。チーズの種類は乳の種類・製造法・熟成期間などによって決まる。'},
    {t:'蜂の巣の六角形は自然が作る最も効率的な形',b:'蜂の巣の六角形（ハニカム構造）は、最小の材料で最大の空間を作れる最も効率的な形状。建築・航空・自動車など多くの分野でこの構造が応用されている。'},
    {t:'人間は色より形を先に認識する',b:'視覚情報処理において、脳は形・輪郭を色より先に処理する。これは進化的に捕食者の輪郭を素早く検出する必要があったためと考えられている。'},
    {t:'地球の年齢は約46億年',b:'地球は約46億年前に形成されたと推定されている。最古の岩石は約44億年前のもの。地球の全歴史を1年に例えると、人類の出現は12月31日の夜11時58分頃。'},
    {t:'ピラニアは実は臆病な魚',b:'ピラニアは凶暴なイメージとは異なり、実際は臆病で人間を積極的に攻撃することは稀。集団で行動するのも身を守るためで、通常は植物や死んだ魚を主食とする。'},
    {t:'日本語は縦書きでも横書きでも書ける',b:'日本語は縦書き（右から左）と横書き（左から右）の両方が使われる世界でも珍しい言語。縦書きは伝統的な文学や新聞で、横書きは現代のビジネスや教育で主流。'},
    {t:'コーヒーは果物の種',b:'コーヒー豆はコーヒーノキという植物の実（コーヒーチェリー）の中にある種子。赤い実の中に2つの種が向かい合って入っている。厳密には「豆」ではなく「種」。'},
    {t:'人間は生まれつき音楽を好む',b:'乳児研究によると、生後数ヶ月の赤ちゃんでも音楽に反応し、リズムに合わせて体を動かす傾向がある。音楽への感受性は後天的に学習されるのではなく先天的なものと考えられている。'},
    {t:'カエルは皮膚から水分を吸収する',b:'カエルは口で水を飲まず、腹部の薄い皮膚（坐骨部）から水分を吸収する。これを「飲水パッチ」と呼ぶ。水辺に座るだけで体内の水分を補給できる。'},
    {t:'世界で最も古いレシピは4000年前',b:'現存する世界最古のレシピはシュメール（現在のイラク）の粘土板に刻まれたもので、約4000年前のビールの作り方が記されている。'},
    {t:'人間の脳の記憶容量は約2.5ペタバイト',b:'脳の記憶容量は約2.5ペタバイト（=250万GB）と推定されている。これはスマートフォンの約300万台分に相当する膨大な容量。記憶は脳の約1000億個のニューロン間の接続で保存される。'},
    {t:'ダチョウは世界最大の鳥だが飛べない',b:'ダチョウは体重150kg、身長2.7mに達する世界最大の鳥。飛べない代わりに時速70kmで走れ、強力な脚で自衛する。世界最大の卵（約1.5kg）も産む。'},
    {t:'氷は水より10%軽い',b:'水が凍ると体積が約9〜10%増加し密度が下がる。これが氷が水に浮く理由。多くの物質は固体の方が液体より密度が高いが、水は例外的な性質を持つ。'},
    {t:'音の速さは温度によって変わる',b:'音速は気温0℃で約331m/s、20℃では約343m/s。温度が高いほど気体分子の運動が活発になり音速が上がる。一方、光速は真空中では温度に関係なく一定（約30万km/s）。'},
    {t:'サメは4億年以上前から存在する',b:'サメの祖先は約4億2000万年前（シルル紀末期〜デボン紀）から存在していた。恐竜より約1億8000万年古く、大量絶滅を5回乗り越えた「生きた化石」の一つ。'},
    {t:'人間の体には金が含まれている',b:'成人の体内には約0.2mg（0.0002g）の金が含まれている。血液・組織・関節などに微量の金が存在するが、採掘できるほどの量ではない。'},
    {t:'最も高い山は海底から測るとマウナケア',b:'海面からの高さではエベレスト（8849m）が世界最高峰だが、海底から測るとハワイのマウナケアが約10,210mで世界一高い山になる。'},
    {t:'月の重力は地球の6分の1',b:'月の重力は地球の約16.5%（約6分の1）。体重60kgの人が月では約10kgになる。月面では人間が数メートルもジャンプできる。'},
    {t:'電気うなぎは電気で呼吸する',b:'電気うなぎは水面から空気を吸って呼吸できる。また体内の発電器官で最大600ボルトの電気を発生させ、獲物を感電させて捕獲する。魚類ではなく電気うなぎ目に属する。'},
    {t:'世界最小の国はバチカン市国',b:'バチカン市国の面積は約0.44平方km（東京ドーム約9個分）、人口は約800人。世界最小の独立国だが、カトリック教会の総本山として世界に大きな影響力を持つ。'},
    {t:'人間は1日に約2000の決断をする',b:'研究によると人間は1日に約2000〜35000回の決断をしているとされる。食事・服装・返信など大小の決断が積み重なり「決断疲れ」の原因にもなる。'},
    {t:'ハリネズミは自分の毒に免疫がある',b:'ハリネズミは毒を持つ植物（ヒキガエルの皮膚の毒など）を舐めて自分のハリに塗る「自己塗布行動」をする。この毒に自分は免疫があるため、天敵に対する防御手段にする。'},
    {t:'クマは冬眠中も出産する',b:'クマは冬眠中に出産し、冬眠したまま子育てを行う。生まれた子グマは非常に小さく（約300g）、母熊の母乳を飲みながら春まで過ごす。'},
    {t:'人体の水分は年齢とともに減少する',b:'新生児の体内水分量は約75〜80%だが、成人では約60%、高齢者では約50%まで低下する。これが高齢者が脱水症状になりやすい理由の一つ。'},
    {t:'フラミンゴは片足で立つと安定する',b:'フラミンゴが片足で立つのは体温調節のためとも言われていたが、最新の研究では片足立ちの方が筋肉を使わず安定して立てることが判明した。'},
    {t:'世界で最も深い湖はバイカル湖',b:'ロシアのバイカル湖は水深1642mで世界最深の湖。世界の淡水の約20%を蓄える。2500万年以上の歴史を持ち、固有種2500種以上が生息する「生きた化石の宝庫」。'},
    {t:'人間の爪は毎日約0.1mm伸びる',b:'爪は1日に約0.1〜0.12mm伸びる。1ヶ月で約3mm、1年で約3.5cm。手の爪は足の爪より早く伸び、夏の方が冬より成長が速い。'},
    {t:'世界一長い川の長さは議論中',b:'ナイル川（6695km）とアマゾン川（6400〜7000km）のどちらが世界最長かは測定方法によって異なり、現在も科学者の間で議論が続いている。'},
    {t:'ゴリラは草食だが筋肉質',b:'ゴリラは主に果物・葉・茎を食べる草食動物だが、非常に筋肉質。成人男性の5〜10倍の握力を持つとされる。植物性タンパク質と効率的な消化システムが筋肉の源。'},
    {t:'人間の眼球の大きさは生涯ほぼ変わらない',b:'生まれた時の眼球の大きさは直径約18mmで、成人の約24mmと比べると小さいが、他の臓器が大きく成長するのに対し、眼球は比較的小さな変化しかしない。'},
    {t:'世界初のプログラマーは女性だった',b:'エイダ・ラブレスは1840年代に世界初のコンピュータプログラムを書いたとされる。ロマン主義詩人バイロンの娘で、チャールズ・バベッジの解析機関のためのアルゴリズムを考案した。'},
    {t:'コアラは一日に22時間眠る',b:'コアラは1日に18〜22時間眠る。主食のユーカリの葉は毒素と繊維質が多く、消化するのに大量のエネルギーを消費するため、省エネのため長時間眠る必要がある。'},
    {t:'電波と光は同じ種類の波',b:'電波、マイクロ波、赤外線、可視光線、紫外線、X線、ガンマ線はすべて電磁波の仲間。違いは波長の長さだけで、すべて真空中を光速で伝わる。'},
    {t:'日本は温泉数世界一',b:'日本の温泉源泉数は約27,000か所以上で世界最多水準。全都道府県に温泉があり、温泉地数は3000か所以上。温泉文化は江戸時代から日本人の生活に深く根付いている。'},
    {t:'ビタミンCは人間と一部の動物しか合成できない',b:'多くの哺乳類は体内でビタミンCを合成できるが、人間・類人猿・モルモット・一部のコウモリは合成能力を失い、食べ物から摂取する必要がある。'},
    {t:'人間の体は夜に細胞修復を行う',b:'睡眠中、特に深い眠り（徐波睡眠）の時間帯に成長ホルモンが大量分泌され、細胞の修復・再生が行われる。これが「寝る子は育つ」の科学的根拠の一つ。'},
    {t:'世界最大のデルタはガンジス川デルタ',b:'バングラデシュとインドのガンジス川・ブラマプトラ川デルタ（スンダルバンス）は世界最大の河川デルタ。面積は約10万平方kmで、世界最大のマングローブ林も存在する。'},
    {t:'光合成は地球の酸素の大半を生産する',b:'地球の酸素の約50%は海洋の植物プランクトンが光合成で生産する。残り50%を陸上植物が担う。現在の大気の酸素濃度（約21%）は光合成生物が約20億年かけて作り出した。'},
    {t:'数学的には0.9999...=1',b:'0.999...（9が無限に続く）は数学的に1と等しい。1/3=0.333...を3倍すると1=0.999...になることで証明できる。無限の概念を示す興味深い数学的事実。'},
    {t:'人間の免疫細胞は全身の1〜2%の重さ',b:'体重60kgの人の免疫細胞（白血球など）の総重量は約600g〜1.2kgとされる。これら免疫細胞は24時間365日、ウイルス・細菌・がん細胞と戦い続けている。'},
    {t:'地球で最も多い鉱物は花崗岩',b:'地球の地殻は主に玄武岩と花崗岩でできており、大陸地殻の大部分は花崗岩。花崗岩はクォーツ・長石・雲母などの鉱物の混合物で、多くの建築材料にも使われている。'},
    {t:'カタツムリの消化管は体をひっくり返す',b:'カタツムリは発生の過程で体がねじれる「捩転（ねじれ）」が起き、消化管が体の右側に移動する。これがカタツムリの殻が主に右巻きになる理由。'},
    {t:'世界で最も高い気温は56.7℃',b:'記録上最も高い気温は1913年7月10日に米国カリフォルニア州デスバレーで観測された56.7℃。「死の谷」と呼ばれるこの地は、地球上で最も暑い場所として知られる。'},
    {t:'人間の耳は一生伸び続ける',b:'耳は軟骨でできており、軟骨は年齢とともにゆっくりと成長し続ける。これが高齢者の耳が大きく見える理由。鼻も同様に一生わずかずつ成長する。'},
    {t:'恐竜は鳥の先祖',b:'現代の鳥類は恐竜の直系の子孫。特に獣脚類恐竜（ティラノサウルスと同じグループ）から進化した。羽毛恐竜の化石発見などがこの進化の証拠となっている。'},
    {t:'日本語の文字数は世界最多クラス',b:'日本語は漢字・ひらがな・カタカナを組み合わせて使う。常用漢字だけで2136字、音訓の読み方を合わせると数万通り以上。世界でも最も複雑な文字体系を持つ言語の一つ。'},
    {t:'世界最速の動物はハヤブサ（急降下時）',b:'陸上最速はチーター（時速120km）だが、ハヤブサは急降下時に時速320〜390kmに達する記録がある。水平飛行では時速100kmほどで、急降下時の速度が突出している。'},
    {t:'北半球と南半球では台風の回転方向が逆',b:'台風・ハリケーン・サイクロンは北半球では反時計回り、南半球では時計回りに回転する。これはコリオリ効果（地球の自転による見かけの力）によるもの。'},
    {t:'人間の心臓は生涯で30億回以上拍動する',b:'平均的な人の心臓は1分間に60〜100回拍動し、80年の生涯で30億回以上拍動する。心臓は重量わずか300gで、一日に約7,200リットルの血液を全身に送り出す。'},
    {t:'世界最古の木は約5000年前のブリスルコーンパイン',b:'米国カリフォルニア州の「メトセラ」と呼ばれるブリスルコーンパイン（セツブンヒノキ）は樹齢約5000年で、現存する世界最古の木とされる。正確な場所は保護のため非公開。'},
    {t:'光は水の中では遅くなる',b:'光は真空中で秒速約30万kmだが、水中では約22.5万km（約75%）まで遅くなる。ガラス中ではさらに遅くなる。「光速」は真空中での速度であり、物質中では必ず遅くなる。'},
    {t:'サンゴ礁は地球の海洋生物の25%を支える',b:'サンゴ礁は海洋面積の0.1%以下しか占めないが、海洋生物種の約25%の生息地を提供する。「海の熱帯雨林」とも呼ばれる生物多様性の宝庫。'},
    {t:'人間の体の中で最も硬い物質はエナメル質',b:'歯のエナメル質は人体の中で最も硬い物質。硬度はダイヤモンドに次ぐほどではないが、モース硬度で5〜6程度。ただし酸に弱く、虫歯菌が作る酸で溶けてしまう。'},
    {t:'地球上で最も多い有機化合物はセルロース',b:'地球上で最も多く存在する有機化合物はセルロース。植物の細胞壁の主成分で、年間生産量は約1000億トン。木材・綿花などの主成分で、紙や繊維の原料にもなる。'},
    {t:'ペンギンはプロポーズに石を使う',b:'ジェンツーペンギンなど一部の種のオスは、気に入ったメスに石を贈ってプロポーズする。良い石は希少で価値があるため、石を盗む「石泥棒」のペンギンも存在する。'},
    {t:'人間の腸の表面積はテニスコートほど',b:'小腸の内壁には絨毛と微絨毛があり、それらを広げると表面積は約250〜400平方m（テニスコート約1面分）になる。この大きな表面積が効率的な栄養吸収を可能にする。'},
    {t:'ピアノは打楽器に分類される',b:'ピアノはハンマーで弦を叩いて音を出す仕組みのため、楽器分類上は「弦楽器」と「打楽器」の両方の性質を持つ。一般的にはピアノ属または鍵盤楽器として分類される。'},
    {t:'世界一長い国名はイギリス',b:'英国の正式名称は「グレートブリテンおよび北アイルランド連合王国（United Kingdom of Great Britain and Northern Ireland）」で非常に長い。通称「イギリス」はポルトガル語由来。'},
    {t:'赤血球は血管内を約1分で一周する',b:'成人の体の血管の総延長は約10万km（地球2.5周分）。心臓から送り出された赤血球は全身を約1分で一周して戻ってくる。'},
    {t:'世界最古のチョコレートは3500年前',b:'メキシコの遺跡からカカオを使った飲み物の痕跡が発見され、約3500年前のオルメカ文明でカカオが使われていたことが判明した。固形チョコレートが登場したのは1847年のこと。'},
    {t:'ウィルスは生物ではないという考えがある',b:'ウィルスは自己増殖できず宿主の細胞を必要とするため、「生物と無生物の中間」とされる。細胞を持たず代謝もしないが、遺伝情報を持ち進化する。'},
    {t:'地球で最も深い場所はマリアナ海溝',b:'太平洋のマリアナ海溝チャレンジャー深淵は深さ約10,994mで地球最深の場所。エベレストを沈めてもまだ2km以上深い。水圧はほぼ1000気圧に達する。'},
    {t:'ネコは喉を鳴らす（ゴロゴロ）と自己治癒する',b:'ネコのゴロゴロ音（約25〜50Hz）は骨密度の強化、筋肉や腱の修復、傷の治癒を促進する効果があるという研究がある。これがネコが骨折しにくい理由の一つかもしれない。'},
    {t:'人間の手の指の感度は非常に高い',b:'人間の指先には1平方センチに約2500個の触覚受容器がある。これにより0.006mmという非常に小さな隆起も感知できる精度の高い触覚を持つ。'},
    {t:'世界で最もよく使われる言語は英語（第二言語含む）',b:'母語話者数では中国語（普通話）が最多だが、第二言語として話す人を含めると英語が最も多くの人に使われる言語になる。現在の国際共通語としての地位を反映している。'},
    {t:'人間の目は約1億の光受容体を持つ',b:'網膜には約1億2000万個の桿体細胞（暗い場所での視覚）と約600〜700万個の錐体細胞（色の識別）がある。これらがカメラのセンサーと同様に光を電気信号に変換する。'},
    {t:'世界最古の大学はボローニャ大学',b:'イタリアのボローニャ大学は1088年に設立され、世界最古の大学とされる。現在も世界有数の名門大学として活動している。'},
    {t:'クモの巣の糸はケブラーより強い',b:'クモの糸は同じ重さで比較するとケブラー（防弾チョッキに使われる素材）より5倍強い。しかし大量生産が難しく、工業利用の研究が続けられている。'},
    {t:'人間は生まれた時から顔の識別能力を持つ',b:'生後わずか数時間の新生児でも顔に似たパターンをそうでないパターンより長く見つめることが研究で示されている。顔認識能力は生まれつき備わっている可能性がある。'},
    {t:'カニはエラで呼吸するが陸上でも生きられる',b:'カニはエラ呼吸をするが、エラを湿らせておくことで陸上でも短時間は生きられる。ヤシガニなど陸棲のカニは、エラが変化した肺のような器官で直接空気から酸素を取り込む。'},
    {t:'世界最多の言語話者数は中国語（普通話）',b:'母語として話す人の数が最も多い言語は中国語（普通話・マンダリン）で約9億人以上。次いで英語、ヒンディー語、スペイン語、フランス語の順となる。'},
    {t:'リスは自分が埋めた木の実の場所を覚えている',b:'リスは冬に備えて数千か所に木の実を埋め、記憶をもとに取り出す。嗅覚と空間記憶を組み合わせて使い、場所の記憶は驚くほど正確とされている。'},
    {t:'人間の体内で最大の器官は皮膚',b:'皮膚の面積は成人で約1.5〜2平方m、重量は体重の約15%（約9kg）。外界から体を守り、体温調節・感覚・排泄など多くの機能を持つ最大の器官。'},
    {t:'世界最大の砂漠はアフリカのサハラではなく南極',b:'砂漠は「年間降水量250mm以下の地域」と定義される。この基準では南極大陸（面積約1400万平方km）が世界最大の砂漠で、サハラ砂漠（約916万平方km）より大きい。'},
    {t:'人間の細胞は毎日数百億個入れ替わる',b:'人間の体では毎日数百億個の細胞が死に、新しい細胞が生まれる。骨格の細胞は10年で全入れ替わり、胃の内壁細胞は5日で交代する。'},
    {t:'最も多くの言語が話される大陸はアフリカ',b:'アフリカ大陸では約2000〜3000種類の言語が話されており、世界の言語の約30〜40%を占める。これは植民地時代以前から多様な民族・文化が共存してきたことを示している。'},
    {t:'人間の脳の神経接続数は宇宙の星の数より多い',b:'人間の脳には約1000億個のニューロンがあり、それぞれが数千の接続（シナプス）を持つ。脳内のシナプスの総数は約100〜150兆個と推定され、これは観測可能な宇宙の星の数（約1000億個）をはるかに超える。'},
    {t:'メダカは宇宙で産卵した最初の脊椎動物',b:'1994年、スペースシャトルで実施された実験でメダカが宇宙で産卵・孵化に成功。これが無重力環境で繁殖に成功した最初の脊椎動物となった。'},
    {t:'世界一硬い天然物質はダイヤモンド',b:'モース硬度10のダイヤモンドは地球上で最も硬い天然物質。炭素原子が正四面体構造で配列した結晶構造が高い硬度の源。宝飾品だけでなく工業用の切削・研磨ツールにも使われる。'},
    {t:'人間は1秒間に最大10個の物体を視覚処理できる',b:'脳の視覚処理システムは非常に高速だが、意識的に認識・区別できる物体は1秒間に最大10個程度とされる。これを超えると個別の認識が難しくなる。'},
    {t:'カバは皮膚から赤い汗をかく',b:'カバは皮膚から赤みがかった液体を分泌するが、これは汗ではなく日焼け止め・抗菌・保湿の3つの効果を持つ特殊な分泌液。「血の汗」とも呼ばれるが血液ではない。'},
    {t:'世界初のウェブサイトは1991年に公開',b:'ティム・バーナーズ＝リーが1991年8月6日に世界初のウェブサイトを公開した。内容はワールドワイドウェブの説明で、現在もその内容は保存・公開されている。'},
    {t:'人間の鼻は約1兆種類の匂いを識別できる',b:'2014年の研究で、人間は約1兆種類の異なる匂いを区別できる可能性が示された。以前の推定値1万種類を大幅に上回る。匂いの識別能力は視覚・聴覚に劣らず優れている。'},
    {t:'チーターは吠えない',b:'チーターは他の大型猫科動物（ライオン・トラ）と異なり吠えることができない。代わりにイヌに似た鳴き声や、鳥のようなチャープ音を発する。吠えるか鳴くかは声帯の構造の違いによる。'},
    {t:'人間の体の原子は星から来ている',b:'人体を構成する炭素・酸素・窒素・鉄などの原子は、かつての超新星爆発で宇宙に放出されたもの。「私たちは星のかけら」という表現は比喩ではなく科学的事実。'},
    {t:'海の塩分濃度は約3.5%',b:'海水の塩分濃度は平均約3.5%（35g/リットル）。地域・深度・季節によって若干異なる。この塩分の大部分は何億年もかけて川が岩石から溶かし出した塩分が海に蓄積したもの。'},
    {t:'ミツバチは花粉を足の花粉かごで運ぶ',b:'ミツバチの後ろ足には花粉かご（花粉籃）という特殊な構造があり、集めた花粉を丸めてここに詰めて巣に持ち帰る。1回の採餌で体重の約70%に相当する量の花粉を運べることもある。'},
    {t:'世界最長の橋は中国の青島海湾大橋',b:'全長約42.5kmの青島海湾大橋（中国）は世界最長の橋。次いで同じく中国の丹陽・崑山高速鉄道橋（約164km）がある。'},

    {t:'人間の体内で最も強い筋肉はあごの筋肉',b:'咬筋（こうきん）は体重比で最も強い筋肉の一つ。奥歯で噛む力は平均68kg、最大で数百kgに達することもある。歯のエナメル質が人体最硬の理由の一つ。'},
    {t:'カメレオンの舌は体長より長い',b:'カメレオンの舌は体長の1.5〜2倍の長さを持ち、1/100秒以下で伸ばして獲物を捕らえる。舌先の粘着力は体重の約400倍の力で獲物を捕捉できる。'},
    {t:'南極の氷の下に湖がある',b:'南極の厚い氷床の下には約400以上の「氷底湖」が存在する。最大のボストーク湖は面積約1万2500平方kmで湖の深さ最大1000m以上。数百万年以上隔離された環境に未知の生物がいる可能性がある。'},
    {t:'タコは3つの心臓を持つ',b:'タコには心臓が3つある。全身に血液を送る主心臓1つと、エラに血液を送る2つのエラ心臓。血液は銅を含むヘモシアニンが酸素を運ぶため青く見える。'},
    {t:'世界最大の生物はキノコ',b:'米国オレゴン州の「アルミラリア（ナラタケ）」というキノコは、菌糸が地下に約9.6平方km（東京ドーム約200個分）にわたって広がり、推定樹齢約8650年。単一の生物として世界最大・最古とされる。'},
    {t:'人間の体は約7年で全細胞が入れ替わる',b:'体の細胞の種類によって入れ替わるペースが違うが、平均すると約7〜10年で全身のほとんどの細胞が新しくなる。ただし心臓の筋細胞やニューロンの一部は一生持続する。'},
    {t:'ハチドリは毎秒80回羽ばたく',b:'ハチドリは1秒間に最大80回羽ばたき、空中でホバリングできる唯一の鳥。後ろ向きにも飛べる。心拍数は毎分1200回以上で、体重の約50%を1日で消費するほどのエネルギー代謝を持つ。'},
    {t:'雷は同じ場所に何度も落ちる',b:'「雷は同じ場所に2度落ちない」は迷信。エンパイアステートビルには年間約20〜30回の落雷がある。高い建物や木は繰り返し落雷の標的になる。'},
    {t:'人間の肌は28日周期で生まれ変わる',b:'表皮の細胞（ケラチノサイト）は約28日サイクルで新しい細胞に入れ替わる。加齢とともにこのサイクルが遅くなり、くすみやシワの原因となる。生涯で約1000枚分の皮膚が生まれ変わる計算。'},
    {t:'南極では1年中太陽が沈まない時期がある',b:'南極では夏（12月〜1月頃）に「白夜」が続き、太陽が沈まない。逆に冬（6月〜7月頃）は「極夜」で太陽が昇らない。地球の自転軸の傾き（約23.5度）が原因。'},
    {t:'世界で最も多く飲まれている飲み物は水の次にお茶',b:'お茶（緑茶・紅茶・ウーロン茶など）は水の次に世界で最も多く消費される飲み物。年間消費量は約500万トン以上。コーヒーはその約3分の1程度。'},
    {t:'海の深さの約80%はまだ未探索',b:'現在人類が探索した海底は全体の約20%以下とされる。深海は宇宙より未知の領域が多く、新種の深海生物が毎年多数発見されている。'},
    {t:'ゾウは足で音を感知できる',b:'ゾウは耳だけでなく足の裏でも振動（地震波）を感知する。数十km離れた別の群れの足音や、遠くの嵐の雷鳴なども足裏で感じ取ることができる。'},
    {t:'世界最古の現存する大学はボローニャ大学',b:'イタリアのボローニャ大学は1088年創立で、現存する世界最古の大学とされる。法学を中心に発展し、ダンテやペトラルカなど多くの著名人が学んだ。'},
    {t:'人間の血管を全てつなぐと地球2.5周分',b:'体内のすべての血管（動脈・静脈・毛細血管）の総延長は約10万kmで、地球を約2.5周する距離に相当する。毛細血管が全体の約99%を占める。'},
    {t:'砂漠のサソリは水なしで1年以上生きられる',b:'一部のサソリは代謝を極端に低下させ、水や食料なしで1年以上生き延びる能力を持つ。体重の40%近くの水分を失っても生存できる驚異的な乾燥耐性がある。'},
    {t:'木の年輪は気候の記録',b:'木の年輪は1年に1本できる。幅が広い年輪は温暖・降水量が多かった年、狭い年輪は寒冷・乾燥した年を示す。古木の年輪を分析することで数千年前の気候変動を知ることができる（樹木年代学）。'},
    {t:'人間の鼻は1兆種の匂いを嗅ぎ分けられる',b:'2014年の研究で人間が識別できる匂いの種類は約1兆種と判明。従来の推定値1万種を大幅に上回る。約400種類の嗅覚受容体の組み合わせでこの識別能力を実現している。'},
