    {t:'チーターは疾走後に30分休憩が必要',b:'チーターは0〜100km/hを3秒で加速できるが、最高速での疾走は約20〜30秒が限界。その後体温が危険なレベルまで上昇するため、獲物を食べる前に30分ほど休息して体を冷やす必要がある。'},
    {t:'日本語の「木漏れ日」は翻訳困難な言葉',b:'木漏れ日（こもれび）は木の葉の隙間から差し込む光を表す日本語。他の言語に一語で対応する単語が存在しないとされ、日本人の自然への繊細な感性を示す言語表現として世界から注目されている。'},
    {t:'地球の磁極は何千年かで逆転する',b:'地球の磁北極と磁南極は過去に何度も入れ替わっており、約数十万年に一度の割合で逆転する。最後の逆転は約78万年前で、現在も磁場は徐々に弱まりつつある。'},
    {t:'人間の赤ちゃんは生まれた時に約300個の骨を持つ',b:'新生児の骨の数は約270〜300個で成人（206本）より多い。成長するにつれて軟骨が骨化し、複数の骨が癒合して減っていく。'},
    {t:'クジラは地球上で最も大きな声を出す動物',b:'シロナガスクジラの鳴き声は188デシベルに達し、水中で数千km先まで届く。人間の耳には聞こえない低周波（インフラサウンド）も使ってコミュニケーションをとる。'},
    {t:'世界最長のトンネルはスイスのゴッタルドベーストンネル',b:'2016年に開通したゴッタルドベーストンネルは全長57.09kmで世界最長の鉄道トンネル。アルプス山脈の下を通り、スイスのゴシェネンとボデイオを結ぶ。'},
    {t:'人間の脳は寝ている間も夢で問題を解く',b:'REM睡眠中に脳は日中の体験を整理・統合し、創造的な問題解決を行う。ベンゼンの環状構造（ケクレの夢）や多くの芸術的着想が夢の中で生まれたとされる。'},
    {t:'ミツバチは花粉だけでなく蜜も自分で消費する',b:'働きバチは1日に飛び回るためのエネルギーとして蜂蜜を消費する。蜂蜜1kgを作るために働きバチが全員で飛ぶ距離は地球40周分以上に相当する。'},
    {t:'人間の平均体温は37℃より低い',b:'「平均体温36.8〜37℃」という通説は19世紀の研究に基づくが、現代の研究では平均が低下しており約36.6℃が現在の平均とされる。生活環境・医療改善・感染症減少が原因と考えられている。'},
    {t:'カエルは冬眠中に心臓が止まることがある',b:'一部のカエル（ウッドフロッグなど）は冬眠中に体が凍り、心臓が止まり呼吸もしなくなる。春になると解凍されて蘇生する「凍結耐性」という驚異的な適応を持つ。'},
    {t:'世界最小の哺乳類はトガリネズミ',b:'エトルリアトガリネズミは体長約4cm、体重約2gで世界最小の哺乳類の一つ。心臓は毎分1500回以上拍動し、1日に自分の体重以上の食物を食べないと死んでしまう。'},
    {t:'稲妻と雷は同時に起きているが光は音より速い',b:'雷は空気が急激に加熱されて膨張する際の衝撃波が雷鳴、そのときの発光が稲妻。同時に発生するが光（約30万km/s）は音（約340m/s）より約88万倍速いため、光を先に見てから音が聞こえる。'},
    {t:'人間の皮膚には常在菌が約1兆個いる',b:'皮膚の表面には約1兆個（1cm²あたり約100万個）の細菌・真菌・ウイルスが生息する。これらのほとんどは無害または有益で、皮膚バリアの維持・有害菌の排除に役立っている。'},
    {t:'世界最多の島を持つ国はスウェーデン',b:'スウェーデンには約22万島以上の島があり、世界で最も多くの島を持つ国とされる。インドネシア（約1万7000島）やフィンランド（約17万9000島）も上位に入る。'},
    {t:'アリは6本脚で全身の25倍の重さを運べる',b:'アリは自分の体重の10〜50倍の重さの物を運ぶことができる。人間に換算すると約5トンを運ぶ力に相当する。アリの筋肉は体重比で非常に効率が良い。'},
  ];

  const NAZO_DATA = [
    {q:'あなたは飛行機のパイロット。東京を出発し大阪、福岡、沖縄と飛んで東京に戻った。パイロットの名前は？',a:'あなた自身',ex:'最初に「あなたはパイロット」と言っているため答えは読んでいる「あなた」。思い込みで複雑に考えてしまう認知の罠。'},
    {q:'ある男が20階建てビルの10階に住んでいる。晴れの日は10階で降りて歩くが、雨の日は20階まで行く。なぜ？',a:'背が低く傘があれば高いボタンに届く',ex:'エレベーターのボタンが高い位置にある。晴れの日は傘なしで10階しか届かず、雨の日は傘の先端で20階を押せる。身体的制約という発想の転換。'},
    {q:'医師が「この手術は100%成功します」と言った。しかし患者は手術後に死んだ。なぜ？',a:'医師は手術には成功したが患者は別の原因で死亡した',ex:'手術の成功と患者の生存は別問題。「手術が成功した＝患者が助かる」という思い込みを突いた問題。'},
    {q:'100mの縄がある。10mずつ切っていくと何回切る必要があるか？',a:'9回',ex:'10等分すると10本になるが最後の1本は切らなくても取れる。切る回数は9回。「10回」と答えてしまう人が多い。'},
    {q:'北極点に立って南に10km歩き、東に10km歩き、北に10km歩くと、どこにいるか？',a:'北極点',ex:'北極点から南に歩くとどの方向も南。東に歩いて北に戻れば出発点の北極点に戻る。地球の球面上の移動という発想。'},
    {q:'電車が時速100kmで走っている。向かい風が時速100kmで吹いている。煙はどちらに流れるか？',a:'煙は出ない（電車は電気で動くため）',ex:'「電車」という言葉に注目。現代の電車は電気で動くため煙が出ない。思い込みで煙の方向を考えてしまう。'},
    {q:'1枚のコインを投げて100回連続で表が出た。次に投げたとき表と裏どちらが出やすいか？',a:'どちらも50%で同じ',ex:'コインに記憶はなく過去の結果は次に影響しない。「裏が出るはず」と思うのはギャンブラーの誤謬という認知バイアス。'},
    {q:'ある村に1人の理髪師がいる。彼は「自分で髭を剃らない人の髭だけを剃る」という。彼自身の髭は誰が剃るか？',a:'誰も剃れない（ラッセルのパラドックス）',ex:'自分で剃れば「自分で剃らない人」ではなくなり矛盾。剃らなければ彼が剃るべきで矛盾。集合論の根本的矛盾。'},
    {q:'光の速さで移動しながら鏡を見たら、自分の顔は見えるか？',a:'見える。観測者と鏡は同じ速度で動いており静止系では光は正常に伝わる',ex:'この思考実験がアインシュタインを相対性理論へと導いた。慣性系内では物理法則は変わらないという特殊相対性理論の原理。'},
    {q:'あなたの前に2つのドア。一方は天国、一方は地獄。2人の番人で1人は正直、1人は嘘つき。1回の質問で天国を選ぶには？',a:'「もう一方の番人に天国はどちらか聞いたら何と答えますか？」と聞き、その逆を選ぶ',ex:'正直者に聞けば嘘つきの回答を正直に伝え、嘘つきに聞けば正直者の回答を嘘で伝える。どちらに聞いても答えは地獄のドア→その逆が天国。'},
    {q:'1000に40を足して、1000に30を足して、1000に20を足して、1000に10を足すといくつか？',a:'4100（多くの人が5000と答える）',ex:'1000+40+1000+30+1000+20+1000+10=4100。暗算の思い込みを利用した問題。'},
    {q:'砂漠で遭難した。水1Lと金1kgがあるが両方は持てない。どちらを持つか？',a:'水（生命維持に必要）',ex:'金は財産的価値があるが砂漠では役に立たない。状況によって価値は変わる。'},
    {q:'0の0乗は？',a:'数学的には1（0^0=1）と定義されることが多い',ex:'0^0は不定形とも言われるが、組合せ論や二項定理など多くの数学分野でこの定義が都合よく使われる。'},
    {q:'3人の医師が「彼は私の兄弟だ」と言った。しかし彼には兄弟がいない。なぜ？',a:'3人の医師は全員女性（姉妹）',ex:'「医師＝男性」という固定観念が邪魔をする。女性医師が「彼は私の兄弟」と言える状況は普通にある。'},
    {q:'ある男が雨の中を傘もレインコートも持たずに歩いた。しかし髪は一本も濡れなかった。なぜ？',a:'禿げているから',ex:'「髪が濡れなかった」という言葉から屋根や傘を想像してしまうが最もシンプルな答えは「髪がない」こと。'},
    {q:'鶏と卵、どちらが先か？',a:'進化生物学的には「卵が先」',ex:'突然変異は卵の形成時に起きる。鶏の祖先が産んだ卵の中で突然変異が起き初めて鶏になった個体が生まれた。'},
    {q:'同じ大きさの穴が3つある。合計するといくつか？',a:'3つ（穴はいくら足しても穴のまま）',ex:'穴は物質ではなく空間の欠如。3+3+3=9のように計算してしまうが穴は足し算できない概念的な問い。'},
    {q:'リンゴが5個あった。3個取った。何個残っているか？',a:'3個（あなたが取った3個）',ex:'「残っている」を「元の場所に残っている」と解釈すると2個だが「あなたの手元に残っている」なら3個。問題文の視点の曖昧さを突く。'},
    {q:'時計の12と6の間には何本の直線があるか？',a:'1本',ex:'2点を通る直線は1本。「12から6まで」という表現に複数を想像してしまう。'},
    {q:'「この文章は嘘だ」は真実か？',a:'真でも偽でもない（嘘つきのパラドックス）',ex:'真ならこの文章は嘘→矛盾。偽ならこの文章は本当→矛盾。古代から続く自己言及のパラドックス。ゲーデルの不完全性定理につながる。'},
    {q:'エベレストが発見される前、世界で最も高い山は何だったか？',a:'エベレスト（発見されていなかっただけで高さは変わらない）',ex:'「発見される前」という言葉に惑わされる。山の高さは人間が発見するかどうかに関係なく変わらない。'},
    {q:'モンティ・ホール問題：3つのドアのうち1つに賞品。1つ選んだ後、司会が外れのドアを開ける。ドアを変えるべきか？',a:'変えるべき（確率が1/3から2/3に上がる）',ex:'最初の選択は1/3の確率。司会が外れを開けた後、最初に選んでいないドアが当たりである確率は2/3になる。'},
    {q:'ある島に完璧に論理的な100人がいる。鏡がなく目の色を知る方法がない。「少なくとも1人は青い目だ」と宣告されたら何が起きるか？',a:'全員の青い目の人が同じ日に島を去る',ex:'論理的帰納法の問題。n人の青目者はn日目に全員去る。共通知識が生まれたことで行動が可能になる有名な論理パズル。'},
    {q:'無限大＋1は無限大か？',a:'数学的には∞+1=∞（無限大は数ではなく概念）',ex:'カントールの集合論では無限にも大きさがあり自然数の無限と実数の無限は異なる。無限は単純な計算では扱えない。'},
    {q:'テセウスの船：全ての板を取り替えたら同じ船か？',a:'哲学的には議論が続く（同一性の問題）',ex:'古代ギリシャから続く「同一性」の問い。人間の細胞も数年で入れ替わる。「あなた」とは物質か構造か記憶か。'},
    {q:'水は何度で沸騰するか？',a:'100℃は1気圧のとき。高山では90℃台で沸騰する',ex:'富士山頂では気圧が低く約87〜88℃で水が沸騰する。高山での調理時間が長くなる理由はこれ。'},
    {q:'太陽の光が地球に届くのに何分かかるか？',a:'約8分20秒',ex:'もし太陽が突然消えても地球では8分間は太陽が見え続ける。私たちが見ている太陽は8分前の姿。'},
    {q:'なぜ空は青いのか？',a:'太陽光の散乱（レイリー散乱）。短波長の青い光が最も散乱されるから',ex:'太陽光は様々な色を含む。大気中の分子は短波長の光を多く散乱する。朝夕は光が大気を長く通るため赤くなる。'},
    {q:'完全な真空は作れるか？',a:'作れない（量子力学的には真空でも仮想粒子が生成・消滅している）',ex:'ハイゼンベルクの不確定性原理により真空でも仮想粒子が絶えず生成・消滅している。絶対的な「何もなさ」は存在しない。'},
    {q:'巨大な船の錨を海に落とすと海面は上がるか下がるか？',a:'下がる（錨が海底に沈むと船の排水量が減るため）',ex:'錨が船上にある時は船の重さで大量の海水を押しのける。錨を海底に落とすと排水量が減り海面がわずかに下がる。アルキメデスの原理。'},
    {q:'なぜ夜空は暗いのか？（宇宙は無限に星があるなら全方向から光が届くはず）',a:'オルバースのパラドックス。宇宙に始まりがあり膨張しているため',ex:'宇宙が無限で永遠なら夜空は昼と同じ明るさになるはず。しかし宇宙には始まり（138億年前）があり遠くの光はまだ届いていない。'},
    {q:'シュレーディンガーの猫とは何か？',a:'観測されるまで猫は生きている状態と死んでいる状態の重ね合わせ',ex:'量子力学では観測されるまで粒子は複数の状態が重なり合っている。観測が現実を決定するという逆説を巨視的スケールで示した思考実験。'},
    {q:'人間はなぜ眠らなければならないのか？',a:'脳の老廃物除去、記憶の整理・定着、免疫機能強化など',ex:'2013年にグリンパティック系が発見された。睡眠中に脳が縮小し脳脊髄液が老廃物を洗い流す。完全な解明はまだ途上。'},
    {q:'なぜ人はネガティブなニュースに惹きつけられるのか？',a:'ネガティビティバイアス（脅威に敏感に反応する進化的特性）',ex:'サバンナで生き延びるには危険を素早く検知する必要があった。現代でもその回路は働きネガティブ情報を優先処理する。'},
    {q:'鏡はなぜ左右を反転させて上下は反転させないのか？',a:'鏡は前後を反転させているだけ。左右反転に見えるのは人が向き合った状態に解釈するから',ex:'鏡の物理的な反転は前後のみ。人間は「向き合った人間」として解釈するため左右が逆に感じる。上下は体を縦に回転させる習慣がないため反転しない。'},
    {q:'完璧な利他主義（見返りを求めない親切）は存在するか？',a:'進化生物学的には純粋な利他主義は存在しないとも言われる',ex:'親切行為は脳の報酬系を活性化させ自分が気持ちよくなる。つまり「無償の愛」も自己満足を含む。ただしその気持ちよさも他者への価値を生む。'},
    {q:'地球が自転を止めたら何が起きるか？',a:'大惨事（超巨大嵐、海が極に溜まる、磁場消失など）',ex:'自転が止まると赤道付近では物体が時速1670kmで吹き飛ぶ。海は極に溜まり大陸の形が激変する。'},
    {q:'宇宙から地球を見ると国境は見えるか？',a:'見えない（インドとパキスタンの国境は夜に照明で見える特例がある）',ex:'国境は人間が決めた概念で物理的には存在しない。インド・パキスタン国境は夜に照明で輝くため宇宙から見える数少ない人工の線。'},
    {q:'1秒は正確に何秒か？',a:'9,192,631,770回のセシウム原子の振動（SI単位の定義）',ex:'1967年以降「1秒」はセシウム133原子の基底状態における超微細遷移の9,192,631,770周期に対応する時間と定義されている。'},
    {q:'確率1/100万の宝くじに当たった人に「奇跡だ」と言う。しかし誰かが当たる確率は高い。これは矛盾か？',a:'矛盾しない（個人レベルの確率と集団レベルの確率は別）',ex:'100万枚売れれば誰かが当たる確率は高い。しかし特定の1人が当たる確率は依然1/100万。小さな奇跡が大量に起きることで大きな必然が生まれる。'},
    {q:'なぜ物語は普遍的に人間を引きつけるのか？',a:'脳が「因果関係」を物語として処理するように進化したから',ex:'人間の脳はランダムな出来事にも物語を見出す。サバンナで生き延びるには原因と結果を理解する能力が必要だった。'},
    {q:'「常識」とは何か？',a:'特定の社会・時代で共有された思い込みの集合体',ex:'かつての「常識」（天動説、女性参政権なし、奴隷制度）は今では非常識。常識は時代と文化によって変わる相対的なもの。'},
    {q:'なぜ人間だけが芸術を創るのか？',a:'社会的つながりの強化、死への恐怖への対処、余剰エネルギーの発散など諸説ある',ex:'芸術は直接的な生存価値がない。しかし共同体の結束を強め共感を生み「人間とは何か」を問い続ける行為とも言える。'},
    {q:'人間が絶滅した後、地球は何年で人類の痕跡を消すか？',a:'構造物は数百〜数万年、大気中のCO2は10万年以上かかる',ex:'コンクリートは数百年、鋼鉄は数千年で崩壊。しかし核廃棄物（数万年）やCO2（数十万年）は長く残る。'},
    {q:'なぜ人は「正しいこと」よりも「信じたいこと」を信じてしまうのか？',a:'確証バイアス（自分の既存信念を確認する情報を好む）',ex:'人間の脳は認知的不協和を嫌う。自分の信念を確認する情報を無意識に選び取る。フェイクニュース拡散の根本原因。'},
    {q:'なぜ虹は必ず弧（半円）なのか？',a:'太陽光が水滴で屈折・反射する角度が約42度に固定されているから',ex:'太陽を背にして前方42度の角度に水滴があると虹が見える。地面が邪魔をするため半円になる。飛行機からは完全な円の虹が見える。'},
    {q:'「天才」と「凡人」の違いは何か？',a:'才能の差より練習量と環境（1万時間の法則）という研究がある',ex:'グラッドウェルが「アウトライアーズ」で紹介した「1万時間の法則」。ビル・ゲイツもモーツァルトも幼少期の大量練習があった。'},
    {q:'人間の記憶は信頼できるか？',a:'信頼できない（記憶は「再構成」されるたびに変化する）',ex:'記憶は録音ではなく「再構成」。思い出すたびに若干変化する。心理学研究では偽記憶が簡単に植え付けられることが示されている。'},
    {q:'自分の行動は「自由意志」によるものか？',a:'現代神経科学では決定論的な脳のプロセスが先行している可能性がある',ex:'リベットの実験：脳の「準備電位」は意識的決定の0.5秒前に始まっていた。「自分が決めた」と感じる前に脳がすでに動き始めている。'},
    {q:'タイムマシンで過去に行って祖父を殺したら自分はどうなるか？',a:'祖父殺しのパラドックス：自分が生まれないので過去に行けない→の無限ループ',ex:'物理学的には過去への時間旅行は因果律を破るため不可能とされる。多世界解釈では別の宇宙に分岐するとも言われる。'},
    {q:'AIが「意識」を持つことはあるか？',a:'現在の科学では意識の定義すら曖昧で判断基準がない',ex:'中国語の部屋問題、ハードプロブレム（主観的体験はなぜ生まれるか）など哲学的課題が残る。AIが意識を持てるかは未解決問題。'},
    {q:'「幸せ」の定義は普遍的に決まるか？',a:'決まらない（文化・個人・時代によって異なる）',ex:'ポジティブ心理学ではPERMAモデル（ポジティブ感情・エンゲージメント・関係・意味・達成）で定義する試みがある。しかし主観的体験の客観的定義には限界がある。'},
    {q:'お金と幸福は比例するか？',a:'一定の収入まではYES。それ以上は比例しないという研究がある',ex:'カーネマンとディートンの研究では年収7万5千ドル程度まで幸福感は上昇するが、それ以上では頭打ちになる傾向があった。'},
    {q:'人間は本当に「理性的」な生き物か？',a:'行動経済学的には多くの非合理的バイアスを持つ',ex:'カーネマンの「ファスト&スロー」によると、人間の意思決定の多くは直感的なシステム1で行われ理性的なシステム2は後付けの合理化をすることが多い。'},
    {q:'なぜ「締め切り」があると仕事がはかどるのか？',a:'パーキンソンの法則：仕事は与えられた時間いっぱいに膨張する',ex:'1955年に提唱された法則。締め切りが遠いと作業は際限なく広がる。人間は差し迫った締め切りの方が集中力を発揮しやすい。'},
    {q:'なぜ人間は「物語」を作る唯一の動物なのか？',a:'言語と抽象思考の組み合わせが物語を生む',ex:'ユヴァル・ノア・ハラリは「サピエンス全史」で、虚構（物語）を共有する能力が人間に大規模な協力を可能にしたと論じた。国家・お金・宗教も共有された物語。'},
    {q:'「過去は変えられない」は本当か？',a:'物理的な事実は変えられないが、過去の「意味」は変えられる',ex:'出来事自体は変わらないが、それをどう解釈するかは変えられる。心理療法ではトラウマの意味を再構成することが治癒につながる。'},
    {q:'「生きる意味」はあるか？',a:'哲学的には「意味は与えられるものではなく自ら作るもの」（サルトル）',ex:'実存主義では宇宙に客観的な意味はなく人間が自由に意味を作り出すと考える。フランクルは意味を見出す力が人間の最大の能力だと語った。'},
    {q:'脳は自分の痛みを感じるか？',a:'感じない（脳自体には痛みの受容器がない）',ex:'脳外科手術は局所麻酔で行われることがある。患者は会話できる状態で手術を受けることも。「痛みを感じる場所」が痛みを感じないという逆説。'},
    {q:'なぜ人間は死を怖れるのか？',a:'死の恐怖は生存本能の裏側、また「自己」の消滅への恐怖',ex:'テロール管理理論（TMT）によると人間は死の恐怖を文化・宗教・遺産などで「象徴的不死」を追求することで管理している。'},
    {q:'コンピューターが人間の知能を超えたとき（シンギュラリティ）何が起きるか？',a:'予測不可能（だからシンギュラリティと呼ばれる）',ex:'カーツワイルは2045年頃と予測。AIが自己改善を繰り返すと人間には理解不可能な速度で発展する可能性がある。'},
    {q:'「客観的真実」は存在するか？',a:'科学的実在論では「存在する」。ポストモダン哲学では「すべては解釈」',ex:'科学は観測と実験で真実に近づく試み。しかし観測者自身が観測に影響を与える（量子力学）。絶対的な客観性を達成できるかは哲学的問いとして残る。'},
    {q:'人間の直感は信頼できるか？',a:'特定の分野では信頼できる（専門家の直感）が多くのバイアスがある',ex:'チェスの達人は瞬時に最善手を「直感」できる。しかし株式市場の予測など多くの領域では直感は確証バイアスの影響を受ける。'},
    {q:'なぜ人は孤独を感じるのか？',a:'社会的繋がりへの進化的欲求が満たされないとき',ex:'孤独感は身体的痛みと同じ神経回路を使う。サバンナでの孤立は死を意味したため孤独感は危険信号として進化した。'},
    {q:'なぜ人間は笑うのか？',a:'社会的結束を強める信号、脅威でないことを示すコミュニケーション',ex:'霊長類の「遊び顔」が進化したもの。笑いはグループ内の緊張を和らげ社会的絆を強める。一人でいるより誰かといるときの方が30倍笑いやすい。'},
    {q:'なぜ人は他人の失敗を喜ぶことがあるのか？',a:'シャーデンフロイデ（他者の不幸を喜ぶ感情）は妬みと関連する',ex:'自分より上だと思う相手の失敗に喜びを感じる。脳の報酬系（線条体）が活性化することが確認されている。'},
    {q:'なぜ「吊り橋効果」が起きるのか？',a:'恐怖や興奮による生理的覚醒を「恋愛感情」と誤帰属するから',ex:'ダットン&アロンの1974年の実験：揺れる橋の上で会った女性へのアトラクションが安定した橋より高かった。ドキドキを「この人が好き」と解釈する認知バイアス。'},
    {q:'人間の寿命の上限はどこか？',a:'現在確認された最高齢は122歳（ジャンヌ・カルマン）。上限は150〜200歳との研究もある',ex:'細胞の分裂回数（ヘイフリック限界）や染色体末端のテロメアの短縮が老化の一因。老化のメカニズムが解明されれば寿命は伸びる可能性がある。'},
    {q:'なぜ同じ出来事を見ても人によって異なる記憶が残るのか？',a:'記憶は事実の録画ではなく脳が「解釈」して再構成したもの',ex:'人それぞれの感情状態・既存の知識・注目点によって記憶は異なる。目撃証言が法廷で重視される一方で偽記憶の問題が心理学で指摘されている。'},
    {q:'「平等」と「公平」の違いは何か？',a:'平等（equality）は同じものを与えること。公平（equity）は必要に応じて与えること',ex:'同じ身長の台を全員に渡すのが平等。見えなければ台を増やすのが公平。社会正義の議論でこの区別は非常に重要。'},
    {q:'人間の脳は本当に10%しか使っていないのか？',a:'完全な神話。脳全体を常時使っている',ex:'脳の各部位は異なる機能を担い1日を通じてほぼ全域が活性化する。PETスキャンやfMRIで脳全体が常に活動していることが確認されている。'},
    {q:'なぜ群衆の中で孤独を感じることがあるのか？',a:'孤独は人数ではなく「深い繋がり」の欠如から生まれる',ex:'表面的な接触が多くても理解し合える深い関係がないと孤独感は生じる。SNS時代に「繋がっているのに孤独」という現象が増加している。'},
    {q:'「美味しい」という味覚は客観的か？',a:'客観的ではない（文化・記憶・期待・環境で大きく変わる）',ex:'実験では同じワインでも値段を高く見せると「美味しい」と感じやすい。飛行機食が不味く感じるのは低気圧と騒音で味覚が30%鈍化するため。'},
    {q:'なぜ人間は「認められたい」という欲求を持つのか？',a:'マズローの欲求階層：承認欲求は自己実現の一段階前',ex:'社会的動物として進化した人間にとってグループ内での地位は生存に直結していた。承認欲求はその名残。SNSの「いいね」は現代の承認報酬システム。'},
    {q:'なぜ記憶の「フラッシュバルブ記憶」は鮮明なのか？',a:'強い感情（ノルアドレナリン）が記憶の定着を強化するから',ex:'9.11や東日本大震災など衝撃的な出来事のとき「どこにいたか」を鮮明に覚えている。感情的な興奮が扁桃体を活性化し海馬での記憶固定を強化する。'},
    {q:'なぜ人間は宗教を作るのか？',a:'死の恐怖への対処、集団の結束、説明不可能なことへの答えを提供するため',ex:'認知科学では人間の「エージェント検出」（背後に意図を持つ存在を見出す）能力が宗教の起源の一つとされる。'},
    {q:'「不可能」なことは本当に存在するか？',a:'物理法則的には存在する（光速を超えることなど）',ex:'「人間には不可能」と「宇宙で不可能」は異なる。光速を超えることは特殊相対性理論上不可能だが宇宙の膨張自体は光速を超えている。'},
    {q:'なぜ右利きと左利きがあるのか？',a:'遺伝と環境の複合要因。左脳が言語処理を担う人が多く右手が使われやすい',ex:'人口の約10〜13%が左利き。遺伝的要因があるが環境でも変わる。'},
    {q:'もし時間旅行が可能になったとして、未来への旅と過去への旅、どちらが難しいか？',a:'物理学的には未来への旅の方が現実的（相対性理論で時間の遅れが起きる）',ex:'高速移動や強い重力場では時間の進みが遅くなる（時間の遅れ）。宇宙飛行士は地球にいる人より若干時間の進みが遅い。過去への旅は因果律を破るため不可能とされる。'},
    {q:'なぜ人間の脳は「顔」をあらゆるところに見るのか？',a:'パレイドリア（顔認識の過剰適用）',ex:'人間の脳は顔認識に特化した神経回路（紡錘状回）を持つ。進化的に他者の顔を素早く認識する必要があったため顔に見えるパターンに敏感になった。'},
    {q:'「私」はどこにいるのか？',a:'脳の中か、脳と体の相互作用か、社会的関係の中か',ex:'「私」という感覚は脳の特定の部位に関連するが「意識」がどこに宿るかは未解決問題。ボディスワップの実験では「私」の感覚が簡単に騙されることが示されている。'},
    {q:'地球の反対側に穴を掘って落ちたらどうなるか？',a:'地球の中心を超えて反対側まで振り子のように往復し続ける',ex:'理論的には約42分で反対側に到達しまた42分で戻ってくる。これはちょうど地球の低軌道を一周する時間と同じ。'},
    {q:'宇宙に生命は地球以外にいるか？',a:'ドレイク方程式によると統計的には存在する可能性が高い',ex:'ドレイク方程式（1961年）：銀河の星の数×惑星を持つ割合×生命が生まれる確率...の積。計算によっては数百〜数万の文明が存在するはず。'},
    {q:'「経済成長」は永遠に続けられるか？',a:'物理的には続けられない（地球の資源・エネルギーに限界があるため）',ex:'GDP成長は物質・エネルギーの消費増加と連動してきた。脱物質化や循環経済の可能性はあるが物理的制約からの完全解放は未達成。'},
    {q:'なぜ人間は「嫉妬」という感情を持つのか？',a:'社会的資源をめぐる競争から生まれた進化的感情',ex:'嫉妬は自分が持っていないものを他者が持つことへの反応。進化的には競争者の優位性を認識し対抗する動機になる。適度な嫉妬は向上心に転化できる。'},
    {q:'完全に密閉された部屋に鳥が飛んでいる。部屋全体の重さは飛んでいるときと止まっているときで変わるか？',a:'変わらない',ex:'鳥が飛ぶために翼を動かすと空気が押し下げられその反力が床にかかる。重力によって生じる力はすべて床に伝わる。'},
    {q:'ゼノンのパラドックスとは何か？',a:'アキレスは亀に追いつけないという逆説',ex:'亀が先行するとアキレスはまず亀の出発点に到達する必要がある。その間亀は少し進む。これを無限に繰り返すとアキレスは追いつけない。しかし現実には追いつける。無限級数の収束で解決。'},
    {q:'1+1=2は証明できるか？',a:'できる（ペアノの公理系を使えば）',ex:'ラッセルとホワイトヘッドは「数学原理」でこの証明に300ページ以上を費やした。「自明」に見えることが最も難しい。'},
    {q:'なぜ飛行機の翼は上が膨らんでいるのか？',a:'上面を流れる空気が速くなり気圧が下がって揚力が生まれるから（ベルヌーイの定理）',ex:'翼の上面が曲線状になっているため上を通る空気は下面より長い距離を移動する。速度が上がると気圧が下がり揚力が生まれる。'},
    {q:'自分が夢を見ているかどうかを確かめる方法は？',a:'手を見る、テキストを読む（夢の中では文字が安定しない）',ex:'明晰夢の技法。夢の中では同じテキストを2回読んでも変わっていることが多い。指が6本に見える場合も夢のサインとされる。'},
    {q:'なぜ「睡眠」は進化的に存在するのか？',a:'休息より積極的な機能（記憶整理・老廃物除去）のために存在する',ex:'眠っている間は外敵に無防備になるリスクがあるにも関わらずすべての動物が眠る。睡眠の積極的な機能がリスクを上回るために進化した。'},
    {q:'なぜ「アイコンタクト」が人間関係に重要なのか？',a:'目は脳の一部（延長した神経組織）であり内側の状態を映す',ex:'瞳孔の大きさ、視線の動き、まばたきの頻度で感情や意図が伝わる。オキシトシン（愛情ホルモン）はアイコンタクトで分泌が促進される。'},
    {q:'なぜ同じ音楽でも悲しく聴こえたり楽しく聴こえたりするのか？',a:'文脈・気分・記憶・文化的背景によって感情的解釈が変わるから',ex:'同じ曲でも葬式で聴くのと祭りで聴くのでは感じ方が異なる。また短調は悲しく長調は明るいという傾向は文化的に異なる場合もある。'},
    {q:'人間は本当に「理性で感情を制御できる」のか？',a:'限定的にしか制御できない（感情は理性より先に反応する）',ex:'扁桃体（感情の中枢）は大脳新皮質（理性）より速く反応する。感情を認識することで間接的に制御できる程度。'},
    {q:'なぜ人間は死を怖れるのか？（2）',a:'「自己」という物語が終わることへの恐怖',ex:'人間は自分の物語を構築する唯一の動物。その物語の終焉（死）は単なる生物的終わりではなく「意味の喪失」として恐怖される。'},
    {q:'「美しい」という感覚はなぜ人間に共通するのか？',a:'進化的に有利なパターン（対称性・黄金比）が美として認識されるようになったから',ex:'対称な顔は遺伝的健全さを示すため美しいと感じる。緑の自然は食料・水の存在を示す。美の感覚には生存価値がある。'},

    {q:'あなたが生まれた日を知っている人が世界に何人いるか？',a:'少なくとも1人（あなた自身）',ex:'「知っている」の定義によるが、自分が知っているという確実な事実に気づかせる問題。'},
    {q:'赤い家は赤レンガで、青い家は青レンガで作られている。では白い家は？',a:'木やコンクリートなど（白いレンガとは限らない）',ex:'「白いレンガで」と答えてしまう誘導がある。しかし実際の白い家は木材やコンクリートで作られることが多い。'},
    {q:'エベレストが発見される前、世界で最も高い山は何だったか？',a:'エベレスト（発見されていなかっただけで高さは変わらない）',ex:'「発見される前」という言葉に惑わされる。山の高さは人間が発見するかどうかに関係なく変わらない。'},
    {q:'あなたの親の兄弟の一人っ子の子供は、あなたと何の関係？',a:'いとこ（一人っ子でも子供がいれば関係は成立）',ex:'「一人っ子」という言葉に引きずられて「いない」と答えてしまう。一人っ子とは兄弟がいないだけで、子供を持つことはできる。'},
    {q:'モンティ・ホール問題：3つのドアのうち1つに賞品。1つ選んだ後、司会が外れのドアを開ける。ドアを変えるべきか？',a:'変えるべき（確率が1/3から2/3に上がる）',ex:'最初の選択は1/3の確率。司会が外れを開けた後、最初に選んでいないドアが当たりである確率は2/3になる。'},
    {q:'1+1=2は証明できるか？',a:'できる（ペアノの公理系を使えば）',ex:'ラッセルとホワイトヘッドは「数学原理」でこの証明に300ページ以上を費やした。「自明」に見えることが最も難しい。'},
    {q:'無限大＋1は無限大か？',a:'数学的には∞+1=∞（無限大は数ではなく概念）',ex:'カントールの集合論では無限にも大きさがあり、自然数の無限と実数の無限は異なる。無限は単純な計算では扱えない。'},
    {q:'テセウスの船：全ての板を取り替えたら同じ船か？',a:'哲学的には議論が続く（同一性の問題）',ex:'古代ギリシャから続く「同一性」の問い。人間の細胞も数年で入れ替わる。「あなた」とは物質か構造か記憶か。'},
    {q:'水は何度で沸騰するか？',a:'100℃は1気圧のとき。高山では90℃台で沸騰する',ex:'富士山頂では気圧が低く約87〜88℃で水が沸騰する。高山での調理時間が長くなる理由はこれ。'},
    {q:'太陽の光が地球に届くのに何分かかるか？',a:'約8分20秒',ex:'もし太陽が突然消えても、地球では8分間は太陽が見え続ける。私たちが見ている太陽は8分前の姿。'},
    {q:'なぜ空は青いのか？',a:'太陽光の散乱（レイリー散乱）。短波長の青い光が最も散乱されるから',ex:'太陽光は様々な色を含む。大気中の分子は短波長の光を多く散乱する。朝夕は光が大気を長く通るため赤くなる。'},
    {q:'完全な真空は作れるか？',a:'作れない（量子力学的には真空でも仮想粒子が生成・消滅している）',ex:'ハイゼンベルクの不確定性原理により真空でも仮想粒子が絶えず生成・消滅している。絶対的な「何もなさ」は存在しない。'},
    {q:'シュレーディンガーの猫とは何か？',a:'観測されるまで猫は生きている状態と死んでいる状態の重ね合わせ',ex:'量子力学では観測されるまで粒子は複数の状態が重なり合っている。観測が現実を決定するという逆説を巨視的スケールで示した思考実験。'},
    {q:'人間はなぜ眠らなければならないのか？',a:'脳の老廃物除去、記憶の整理・定着、免疫機能強化など',ex:'2013年にグリンパティック系が発見された。睡眠中に脳が縮小し脳脊髄液が老廃物を洗い流す。完全な解明はまだ途上。'},
    {q:'なぜ夜空は暗いのか？（宇宙は無限に星があるなら全方向から光が届くはず）',a:'オルバースのパラドックス。宇宙に始まりがあり膨張しているため',ex:'宇宙が無限で永遠なら夜空は昼と同じ明るさになるはず。しかし宇宙には始まり（138億年前）があり遠くの光はまだ届いていない。'},
    {q:'なぜ人はネガティブなニュースに惹きつけられるのか？',a:'ネガティビティバイアス（脅威に敏感に反応する進化的特性）',ex:'サバンナで生き延びるには危険を素早く検知する必要があった。現代でもその回路は働きネガティブ情報を優先処理する。'},
    {q:'鏡はなぜ左右を反転させて上下は反転させないのか？',a:'鏡は前後を反転させているだけ。左右反転に見えるのは人が向き合った状態に解釈するから',ex:'鏡の物理的な反転は前後のみ。人間は「向き合った人間」として解釈するため左右が逆に感じる。'},
    {q:'地球が自転を止めたら何が起きるか？',a:'大惨事（超巨大嵐、海が極に溜まる、磁場消失など）',ex:'自転が止まると赤道付近では物体が時速1670kmで吹き飛ぶ。海は極に溜まり大陸の形が激変する。'},
    {q:'タイムマシンで過去に行って祖父を殺したら自分はどうなるか？',a:'祖父殺しのパラドックス：自分が生まれないので過去に行けない→の無限ループ',ex:'物理学的には過去への時間旅行は因果律を破るため不可能とされる。多世界解釈では別の宇宙に分岐するとも言われる。'},
    {q:'人間の記憶は信頼できるか？',a:'信頼できない（記憶は「再構成」されるたびに変化する）',ex:'記憶は録音ではなく「再構成」。思い出すたびに若干変化する。心理学研究では偽記憶が簡単に植え付けられることが示されている。'},
    {q:'自分の行動は「自由意志」によるものか？',a:'現代神経科学では決定論的な脳のプロセスが先行している可能性がある',ex:'リベットの実験：脳の「準備電位」は意識的決定の0.5秒前に始まっていた。「自分が決めた」と感じる前に脳がすでに動き始めている。'},
    {q:'なぜ「締め切り」があると仕事がはかどるのか？',a:'パーキンソンの法則：仕事は与えられた時間いっぱいに膨張する',ex:'1955年に提唱された法則。締め切りが遠いと作業は際限なく広がる。人間は差し迫った締め切りの方が集中力を発揮しやすい。'},
    {q:'「生きる意味」はあるか？',a:'哲学的には「意味は与えられるものではなく自ら作るもの」（サルトル）',ex:'実存主義では宇宙に客観的な意味はなく人間が自由に意味を作り出すと考える。フランクルは意味を見出す力が人間の最大の能力だと語った。'},
    {q:'脳は自分の痛みを感じるか？',a:'感じない（脳自体には痛みの受容器がない）',ex:'脳外科手術は局所麻酔で行われることがある。患者は会話できる状態で手術を受けることも。「痛みを感じる場所」が痛みを感じないという逆説。'},
    {q:'なぜ人間は死を怖れるのか？',a:'死の恐怖は生存本能の裏側、また「自己」の消滅への恐怖',ex:'テロール管理理論（TMT）によると人間は死の恐怖を文化・宗教・遺産などで「象徴的不死」を追求することで管理している。'},
    {q:'コンピューターが人間の知能を超えたとき（シンギュラリティ）何が起きるか？',a:'予測不可能（だからシンギュラリティと呼ばれる）',ex:'カーツワイルは2045年頃と予測。AIが自己改善を繰り返すと人間には理解不可能な速度で発展する可能性がある。'},
    {q:'「客観的真実」は存在するか？',a:'科学的実在論では「存在する」。ポストモダン哲学では「すべては解釈」',ex:'科学は観測と実験で真実に近づく試み。しかし観測者自身が観測に影響を与える（量子力学）。絶対的な客観性を達成できるかは哲学的問い。'},
    {q:'人間の直感は信頼できるか？',a:'特定の分野では信頼できる（専門家の直感）が多くのバイアスがある',ex:'チェスの達人は瞬時に最善手を「直感」できる。しかし株式市場の予測など多くの領域では直感は確証バイアスの影響を受ける。'},
    {q:'なぜ人は孤独を感じるのか？',a:'社会的繋がりへの進化的欲求が満たされないとき',ex:'孤独感は身体的痛みと同じ神経回路を使う。サバンナでの孤立は死を意味したため孤独感は危険信号として進化した。'},
    {q:'「美味しい」という味覚は客観的か？',a:'客観的ではない（文化・記憶・期待・環境で大きく変わる）',ex:'実験では同じワインでも値段を高く見せると「美味しい」と感じやすい。飛行機食が不味く感じるのは低気圧と騒音で味覚が30%鈍化するため。'},
    {q:'なぜ人間は「認められたい」という欲求を持つのか？',a:'マズローの欲求階層：承認欲求は自己実現の一段階前',ex:'社会的動物として進化した人間にとってグループ内での地位は生存に直結していた。承認欲求はその名残。'},
    {q:'「平等」と「公平」の違いは何か？',a:'平等（equality）は同じものを与えること。公平（equity）は必要に応じて与えること',ex:'同じ身長の台を全員に渡すのが平等。見えなければ台を増やすのが公平。社会正義の議論でこの区別は非常に重要。'},
    {q:'人間の脳は本当に10%しか使っていないのか？',a:'完全な神話。脳全体を常時使っている',ex:'脳の各部位は異なる機能を担い1日を通じてほぼ全域が活性化する。PETスキャンやfMRIで脳全体が常に活動していることが確認されている。'},
    {q:'なぜ群衆の中で孤独を感じることがあるのか？',a:'孤独は人数ではなく「深い繋がり」の欠如から生まれる',ex:'表面的な接触が多くても理解し合える深い関係がないと孤独感は生じる。SNS時代に「繋がっているのに孤独」という現象が増加している。'},
    {q:'AI（人工知能）が「意識」を持つことはあるか？',a:'現在の科学では意識の定義すら曖昧で判断基準がない',ex:'中国語の部屋問題、ハードプロブレム（主観的体験はなぜ生まれるか）など哲学的課題が残る。'},
    {q:'宇宙に生命は地球以外にいるか？',a:'ドレイク方程式によると統計的には存在する可能性が高い',ex:'ドレイク方程式（1961年）：銀河の星の数×惑星を持つ割合×生命が生まれる確率...の積。計算によっては数百〜数万の文明が存在するはず。'},
    {q:'なぜ人間は音楽に感動するのか？',a:'脳の報酬系の活性化、期待と解決のパターン認識が関係する',ex:'音楽を聞くとドーパミンが放出される。特に「クライマックスへの期待」と「解決（サビ）」の繰り返しが快感を生む。'},
    {q:'「常識」とは何か？',a:'特定の社会・時代で共有された思い込みの集合体',ex:'かつての「常識」（天動説、女性参政権なし、奴隷制度）は今では非常識。常識は時代と文化によって変わる相対的なもの。'},
    {q:'なぜ人間だけが芸術を創るのか？',a:'社会的つながりの強化、死への恐怖への対処、余剰エネルギーの発散など諸説ある',ex:'芸術は直接的な生存価値がない。しかし共同体の結束を強め共感を生み「人間とは何か」を問い続ける行為とも言える。'},
    {q:'人間が絶滅した後、地球は何年で人類の痕跡を消すか？',a:'構造物は数百〜数万年、大気中のCO2は10万年以上かかる',ex:'コンクリートは数百年、鋼鉄は数千年で崩壊。しかし核廃棄物（数万年）やCO2（数十万年）は長く残る。'},
    {q:'なぜ人は「正しいこと」よりも「信じたいこと」を信じてしまうのか？',a:'確証バイアス（自分の既存信念を確認する情報を好む）',ex:'人間の脳は認知的不協和を嫌う。自分の信念を確認する情報を無意識に選び取る。フェイクニュース拡散の根本原因。'},
    {q:'なぜ「吊り橋効果」が起きるのか？',a:'恐怖や興奮による生理的覚醒を「恋愛感情」と誤帰属するから',ex:'ダットン&アロンの1974年の実験：揺れる橋の上で会った女性へのアトラクションが安定した橋より高かった。'},
    {q:'なぜ人間は「嫉妬」という感情を持つのか？',a:'社会的資源をめぐる競争から生まれた進化的感情',ex:'嫉妬は自分が持っていないものを他者が持つことへの反応。進化的には競争者の優位性を認識し対抗する動機になる。'},
    {q:'思考実験：空飛ぶスパゲッティモンスターは証明できないが否定もできない。これは何を意味するか？',a:'反証不可能な命題は科学的ではないというポパーの反証可能性原理',ex:'「証明できない」は「存在しない」を意味しない。科学は反証可能な仮説のみを扱う。宗教と科学の領域の違いを示す思考実験。'},
    {q:'なぜ人は他人の失敗を喜ぶことがあるのか？',a:'シャーデンフロイデ（他者の不幸を喜ぶ感情）は妬みと関連する',ex:'自分より上だと思う相手の失敗に喜びを感じる。脳の報酬系（線条体）が活性化することが確認されている。'},
    {q:'なぜ同じ音楽でも悲しく聴こえたり楽しく聴こえたりするのか？',a:'文脈・気分・記憶・文化的背景によって感情的解釈が変わるから',ex:'同じ曲でも葬式で聴くのと祭りで聴くのでは感じ方が異なる。また短調は悲しく長調は明るいという傾向は文化的に異なる場合もある。'},
    {q:'なぜ記憶の「フラッシュバルブ記憶」は鮮明なのか？',a:'強い感情（ノルアドレナリン）が記憶の定着を強化するから',ex:'9.11や東日本大震災など衝撃的な出来事のとき「どこにいたか」を鮮明に覚えている。感情的な興奮が海馬での記憶固定を強化する。'},
    {q:'人間本当に「理性で感情を制御できる」のか？',a:'限定的にしか制御できない（感情は理性より先に反応する）',ex:'扁桃体（感情の中枢）は大脳新皮質（理性）より速く反応する。感情を認識することで間接的に制御できる程度。'},
    {q:'なぜ「睡眠」は進化的に存在するのか？',a:'休息より積極的な機能（記憶整理・老廃物除去）のために存在する',ex:'眠っている間は外敵に無防備になるリスクがあるにも関わらずすべての動物が眠る。睡眠の積極的な機能がリスクを上回るために進化した。'},
    {q:'なぜ人間は宗教を作るのか？',a:'死の恐怖への対処、集団の結束、説明不可能なことへの答えを提供するため',ex:'認知科学では人間の「エージェント検出」（背後に意図を持つ存在を見出す）能力が宗教の起源の一つとされる。'},
    {q:'「経済成長」は永遠に続けられるか？',a:'物理的には続けられない（地球の資源・エネルギーに限界があるため）',ex:'GDP成長は物質・エネルギーの消費増加と連動してきた。脱物質化や循環経済の可能性はあるが物理的制約からの完全解放は未達成。'},
    {q:'もし時間旅行が可能になったとして、未来への旅と過去への旅、どちらが難しいか？',a:'物理学的には未来への旅の方が現実的（相対性理論で時間の遅れが起きる）',ex:'高速移動や強い重力場では時間の進みが遅くなる。宇宙飛行士は地球にいる人より若干時間の進みが遅い。過去への旅は因果律を破るため不可能とされる。'},
    {q:'なぜ人間の脳は「顔」をあらゆるところに見るのか？',a:'パレイドリア（顔認識の過剰適用）',ex:'人間の脳は顔認識に特化した神経回路（紡錘状回）を持つ。進化的に他者の顔を素早く認識する必要があったため顔に見えるパターンに敏感になった。'},
    {q:'「私」はどこにいるのか？',a:'脳の中か、脳と体の相互作用か、社会的関係の中か',ex:'「私」という感覚は脳の特定の部位に関連するが「意識」がどこに宿るかは未解決問題。ボディスワップの実験では「私」の感覚が簡単に騙されることが示されている。'},
    {q:'地球の反対側に穴を掘って落ちたらどうなるか？',a:'地球の中心を超えて反対側まで振り子のように往復し続ける',ex:'理論的には約42分で反対側に到達しまた42分で戻ってくる。これはちょうど地球の低軌道を一周する時間と同じ。'},
    {q:'なぜ人間は笑うのか？',a:'社会的結束を強める信号、脅威でないことを示すコミュニケーション',ex:'霊長類の「遊び顔」が進化したもの。笑いはグループ内の緊張を和らげ社会的絆を強める。一人でいるより誰かといるときの方が30倍笑いやすい。'},
    {q:'「天才」と「凡人」の違いは何か？',a:'才能の差より練習量と環境（1万時間の法則）という研究がある',ex:'グラッドウェルが「アウトライアーズ」で紹介した「1万時間の法則」。ビル・ゲイツもモーツァルトも幼少期の大量練習があった。'},
    {q:'なぜ右利きと左利きがあるのか？',a:'遺伝と環境の複合要因。左脳が言語処理を担う人が多く右手が使われやすい',ex:'人口の約10〜13%が左利き。遺伝的要因があるが環境でも変わる。'},
    {q:'なぜ人間は「物語」を作る唯一の動物なのか？',a:'言語と抽象思考の組み合わせが物語を生む',ex:'ユヴァル・ノア・ハラリは「サピエンス全史」で、虚構（物語）を共有する能力が人間に大規模な協力を可能にしたと論じた。'},
    {q:'「過去は変えられない」は本当か？',a:'物理的な事実は変えられないが、過去の「意味」は変えられる',ex:'出来事自体は変わらないが、それをどう解釈するかは変えられる。心理療法ではトラウマの意味を再構成することが治癒につながる。'},
    {q:'お金と幸福は比例するか？',a:'一定の収入まではYES。それ以上は比例しないという研究がある',ex:'カーネマンとディートンの研究では年収7万5千ドル程度まで幸福感は上昇するが、それ以上では頭打ちになる傾向があった。'},
    {q:'人間は本当に「理性的」な生き物か？',a:'行動経済学的には多くの非合理的バイアスを持つ',ex:'カーネマンの「ファスト&スロー」によると、人間の意思決定の多くは直感的なシステム1で行われ理性的なシステム2は後付けの合理化をすることが多い。'},

    {q:'地球は動いているのに、なぜ私たちは動きを感じないのか？',a:'地球の動きに合わせて私たち自身も同じ速度で動いているから',ex:'地球は自転（時速約1670km）と公転（時速約10万km）をしているが、私たちも地球と同じ速度で動いているため相対的な差がない。慣性の法則による。'},
    {q:'今日という日と昨日という日、どちらが長いか？',a:'同じ（1日は24時間）',ex:'「今日」や「昨日」は1日=24時間という点で同じ長さ。言葉の印象で「今日」の方が長く感じるかもしれないが、時間の長さは変わらない。'},
    {q:'穴が3つある服は何？',a:'シャツ（首・左腕・右腕の穴）',ex:'「穴」という言葉から複雑なものを想像してしまうが、シャツには首穴と両腕用の穴の3つがある。'},
    {q:'重いほど軽くなるものは？',a:'体重（ダイエットで減らすほど軽くなるという意味で）',ex:'または「雪（温まると軽い水に変わる）」なども答えになりうる。「重い」「軽い」の文脈によって答えが変わる面白い問い。'},
    {q:'飛ばないのに翼がある動物は？',a:'ペンギン・ダチョウ・エミューなど飛べない鳥',ex:'これらの鳥は進化の過程で飛翔能力を失ったが、翼（ひれ状の翼や退化した翼）は残っている。ペンギンは水中で「飛ぶ」ように泳ぐ。'},
    {q:'光が通り抜けても壊れないものは何？',a:'窓ガラス（透明な物体）',ex:'光は窓ガラスを通過するが、ガラス自体は壊れない。光は物質を破壊せずに通過できる。'},
    {q:'昨日の明日は何日か？',a:'今日',ex:'昨日の次の日（明日）は今日。「昨日の明日」=「昨日+1日」=「今日」。言葉のトリックで混乱させる問い。'},
    {q:'一番重い金属は何か？',a:'オスミウム（密度22.59 g/cm³）',ex:'一般的に重いと思われる金（19.3）や鉛（11.3）より、オスミウムの方が密度が高い。白金族元素の一つで、最も密度が高い自然元素。'},
    {q:'太陽は東から昇るか？',a:'正確には真東から昇るのは春分・秋分の日のみ',ex:'季節によって日の出の方向は変わる。夏至は北東、冬至は南東から昇る。「東から昇る」は厳密には年に2回だけ正確。'},
    {q:'世界で最もよく売れている薬は何か？',a:'アスピリン（アセチルサリチル酸）',ex:'年間1000億錠以上消費されると言われるアスピリンは、解熱・鎮痛・抗炎症・血栓予防など多くの用途を持つ。1897年にバイエル社が合成した歴史ある薬。'},
    {q:'明日生まれる子は、昨日生まれた子より若いか？',a:'はい（まだ生まれていない方が未来に生まれるから若い）',ex:'時間軸で考えると、明日生まれる子は今まだ存在せず、昨日生まれた子はすでに存在している。未来の生命は現在の生命よりまだ「若い」。'},
    {q:'お金で買える最も価値あるものは何か？',a:'時間（時間を節約するサービス・道具）',ex:'本当の意味での「時間」は買えないが、時間を節約・有効活用するためのサービス（家事代行・移動手段など）は購入できる。時間の価値についての哲学的な問い。'},
    {q:'なぜ物事は複雑になる一方なのか？',a:'エントロピーの法則（熱力学第二法則）',ex:'物質・情報・システムは放置すると無秩序（エントロピー）が増大する方向に進む。整理・維持にはエネルギーが必要なため、手を抜くと複雑・無秩序になる。'},
    {q:'人は1日に何回「意識的な決断」をするか？',a:'約35,000回（大部分は無意識）',ex:'研究によると人は1日に約35,000回の決断をしているが、大部分は無意識。意識的に認識される決断は1日に約70回程度とも言われる。'},
    {q:'なぜ人は失った物を、手に入れた物より長く覚えているのか？',a:'損失回避バイアス（プロスペクト理論）',ex:'心理学的に人間は「得ること」より「失うこと」に約2倍敏感。カーネマンとトヴェルスキーのプロスペクト理論で示された人間の非合理的な意思決定の特性。'},
    {q:'水を逆さまにしても、落ちないようにする方法は？',a:'コップを布で塞いで逆さにする（表面張力）または水中で逆さにする',ex:'布や紙を水面に当てると表面張力と大気圧の差で水が落ちない実験が有名。また水中では重力方向が変わっても水は「落ちない」。'},
    {q:'なぜ鏡の中の自分は「別の人」のように感じるのか？',a:'左右反転と普段見慣れていない視点のため',ex:'私たちが普段「自分の顔」として認識するのは写真（他人が見る顔）だが、鏡は左右反転した顔を見せる。慣れ親しんだ「自分の顔」との違いが違和感を生む。'},
    {q:'数字の0を誰が発明したか？',a:'インドの数学者（ブラーマグプタ、7世紀頃）',ex:'「0」の概念を最初に数学的に定式化したのは7世紀インドの数学者ブラーマグプタ。古代インド・バビロニア・マヤ文明にも0に似た概念はあったが、完全な数学的定義はインドが先。'},
    {q:'なぜ星は夜しか見えないのか？',a:'太陽の光が大気を散乱させ昼間の空を明るくするから',ex:'星は昼間も空にあるが、太陽光が大気で散乱して空が青く明るくなり、星の光がかき消されて見えない。宇宙空間では昼でも星が見える。'},
    {q:'時間は誰にでも平等か？',a:'相対性理論では厳密には平等ではない',ex:'アインシュタインの特殊・一般相対性理論によると、速く移動するほど、重力が強いほど時間の進みが遅くなる。GPSの時刻補正にも使われる現実の現象。'},
    {q:'「考える」ことと「感じる」ことは別のことか？',a:'神経科学的には密接に結びついている',ex:'かつては理性と感情は別物とされていたが、現代神経科学では感情は思考に不可欠な役割を果たすことが判明。感情なしに合理的な判断はできないとも言われる。'},
    {q:'なぜ薬は苦いのか？',a:'有害物質への防御反応（苦味受容体の進化）',ex:'苦味は毒物の警告信号として進化した。多くの植物毒・動物毒は苦い。薬も多くは植物・化学物質由来のため苦い。これが子供が薬を嫌がる本能的な理由。'},
    {q:'「運」は実在するか？',a:'確率の問題として考えると、運は存在しないとも言える',ex:'物理法則に従う世界では全ての出来事には原因がある（決定論）。しかし量子力学は真の不確実性を示す。「運」は複雑な因果関係を人間がシンプルに理解するための概念かもしれない。'},
    {q:'なぜ「締め切り効果」は本当に機能するのか？',a:'脅威に反応する脳のシステムが活性化するから（闘争・逃走反応）',ex:'締め切りが迫ると脳はそれを脅威と認識し、アドレナリンとコルチゾールを分泌する。これが集中力と処理速度を高める。短期的には有効だが、慢性的なストレスは有害。'},
    {q:'人間の意識はどこにあるのか？',a:'未解明（ハードプロブレム）',ex:'哲学者デビッド・チャーマーズが提唱した「意識のハードプロブレム」。脳の神経活動がなぜ主観的な「体験」を生むのかは未解決の最大の謎の一つ。'},
    {q:'なぜ人は「習慣」から逃れられないのか？',a:'基底核がルーティンを自動化するため',ex:'習慣は大脳基底核に「チャンク」として保存され、ほぼ自動的に実行される。意識的な思考なしに行動できることで認知負荷を減らす進化的メカニズム。'},
    {q:'完璧な記憶を持つことは良いことか？',a:'必ずしも良いことではない（HSAM症例）',ex:'高度な超記憶（HSAM）を持つ人々の研究では、過去の記憶が鮮明すぎて現在の生活に支障をきたすことがある。記憶の「忘却」は脳が重要でない情報を削除する重要な機能。'},
    {q:'なぜ「見たい」ものしか見えないのか？',a:'変化の見落とし（チェンジ・ブラインドネス）と注意の選択性',ex:'脳は毎秒膨大な情報を受け取るが、意識的に処理できるのはごく一部。「見えない」ゴリラ実験（選択的不注意）はこの現象を劇的に示している。'},
    {q:'なぜ人は「物語」の中の登場人物に感情移入するのか？',a:'ミラーニューロンと共感の神経基盤',ex:'観察・読書・映画鑑賞中、脳のミラーニューロンが活性化し、他者（フィクションの人物も含む）の行動・感情を自分のものとして体験する。これが物語の感動の神経科学的根拠。'},
    {q:'「見ない」ふりをすることで、問題は解決するか？',a:'短期的には楽になるが長期的には悪化することが多い',ex:'回避行動は認知行動療法でも扱う重要なテーマ。問題から目を背けることで一時的な不安は軽減するが、問題自体は解決されず、回避すること自体が問題を強化することもある。'},
    {q:'なぜ「良い習慣」は作るのが難しく「悪い習慣」は断つのが難しいのか？',a:'脳の報酬系は即時の報酬を好む（割引逃げ）',ex:'良い習慣（運動・貯金）は将来の報酬、悪い習慣（SNS・甘い物）は即時の報酬。脳は遠い将来の大きな報酬より近い小さな報酬を優先する傾向がある。'},
    {q:'なぜ一部の人々は「規則を破ること」に喜びを感じるのか？',a:'反応性理論（心理的リアクタンス）',ex:'「してはいけない」と言われると逆にやりたくなる心理。自由を制限されると感じると、その自由を回復しようとする動機が高まる。マーケティングでも「限定」「数量限定」に効果があるのはこのため。'},
    {q:'なぜ人は「集団」の中では非合理的な行動をとることがあるのか？',a:'集団思考・同調バイアス（社会的影響）',ex:'バンドワゴン効果・服従実験（ミルグラム実験）などが示すように、集団の圧力は個人の判断を歪める。ナチスドイツなどの歴史的悲劇もこのメカニズムと無関係ではない。'},
    {q:'なぜ同じ状況でも人によって感じ方が違うのか？',a:'認知的解釈の違い（スキーマ・フィルター）',ex:'同じ出来事でも、過去の経験・価値観・信念（スキーマ）によって解釈が全く変わる。認知行動療法はこの「解釈の枠組み」を変えることで感情・行動を変えるアプローチ。'},
    {q:'「正しい答え」は常に一つか？',a:'状況によって複数の正解がある（多義性の存在）',ex:'数学の計算問題では正解は一つだが、倫理的問題・人生の問題・芸術的表現では複数の正解が存在することが多い。「一つの正解」を求めることで重要な視点を失うこともある。'},
    {q:'なぜ大人より子供の方が新しいことを素早く習得できるのか？',a:'脳の可塑性（神経可塑性）が子供の方が高いから',ex:'子供の脳は「クリティカルピリオド（臨界期）」にあり、神経接続の形成・再編成が非常に活発。言語習得・音楽・スポーツなどは幼少期に学ぶと習得が速い。'},
    {q:'なぜ恋愛は「盲目」と言われるのか？',a:'報酬系・オキシトシン・バソプレシンによる判断力の低下',ex:'恋愛中はドーパミン・オキシトシン・セロトニンなどのホルモンが大量分泌され、相手の欠点を見えにくくし、リスク評価能力が低下することが神経科学的に示されている。'},
    {q:'なぜ「第一印象」は変えにくいのか？',a:'確証バイアスと認知的一貫性への欲求',ex:'第一印象が形成されると、それと矛盾する情報を無意識に無視・割り引きし、一致する情報を強調するようになる。これが先入観の形成と持続のメカニズム。'},
    {q:'なぜ人間の目には「盲点」があるのか？',a:'視神経が眼球から出る部分に光受容体がないため',ex:'視野の中に光受容体（錐体・桿体）のない部分（盲点）があるが、脳が周囲の情報から補完するため通常は気づかない。実際に盲点を確認できる簡単な実験がある。'},
    {q:'「公平」とは客観的に測れるか？',a:'測定は困難で文化・状況によって異なる',ex:'何が公平かは「平等」「必要に応じて」「貢献に応じて」など複数の基準があり、どれが正しいかは価値観・文化・状況によって異なる。分配的正義は哲学の重要テーマ。'},
    {q:'なぜ「昨日のことは忘れても、昔のことは覚えている」のか？',a:'長期記憶と短期記憶の仕組みの違い',ex:'最近の出来事は短期記憶に入るが、強い感情・反復・意味づけがないと長期記憶に移行しない。一方、幼少期の記憶は強い感情や繰り返しで長期記憶に固定されていることが多い。'},
    {q:'なぜ宇宙は膨張しているのか？',a:'ビッグバン後の慣性と暗黒エネルギーによる',ex:'ビッグバン後に宇宙は膨張を始め、その慣性が続いている。さらに1998年の発見では「暗黒エネルギー」が宇宙の加速膨張を引き起こしていることが示された。その正体は未解明。'},
    {q:'「幸せ」は感じるものか、なるものか？',a:'両方（瞬間的感情と長期的状態の両方）',ex:'ポジティブ心理学では「快楽（ヘドニア）」と「充実（ユーダイモニア）」の2種類の幸福を区別する。快楽は感じるもの、充実感は生き方・意味から来るもの。'},
    {q:'なぜ権力は人を変えるのか？',a:'抑制システムの低下と共感能力の変化（権力パラドックス）',ex:'心理学研究によると、権力を持つと他者の視点を取りにくくなり、衝動的・自己中心的になる傾向がある。一方で、責任感・使命感として良い変化をもたらすこともある。'},
    {q:'なぜ「完璧主義」は逆効果になることがあるのか？',a:'先延ばし・回避行動・燃え尽き症候群の原因になるから',ex:'完璧主義者は失敗を恐れて行動を先延ばしにしたり、「完璧でなければやる意味がない」という思考パターンから挑戦を避けることがある。「良いものを完成させること」より「完璧なものを作ろうとすること」が行動を阻害する。'},
    {q:'なぜ「音楽」は国境を越えるのか？',a:'感情表現の普遍性と脳の音楽処理の普遍性',ex:'研究では、文化的背景が全く異なる人々でも、同じ音楽から類似した感情を読み取る傾向がある。音楽の感情伝達能力は、言語より普遍的な側面を持つ。'},
    {q:'なぜ「失敗した人」の経験談の方が心に響くのか？',a:'同情・共感と教訓の信憑性（傷つきやすさ効果）',ex:'成功者より失敗者の話の方が感情移入しやすく、教訓の信憑性も高く感じる。ブレネー・ブラウンの「脆弱性の力」の研究が示すように、弱さを認めることが逆に信頼と影響力を高める。'},
    {q:'「時間」は実在するのか？',a:'物理学的には議論が続く（ブロック宇宙論）',ex:'アインシュタインの相対性理論では「過去・現在・未来」は同時に存在する（ブロック宇宙論）。「今」という特別な瞬間は物理法則の中に存在しない可能性がある。時間の流れは人間の知覚の産物かもしれない。'},
    {q:'なぜ「美しい」ものを見ると心が動くのか？',a:'審美的経験の神経基盤（美の神経科学）',ex:'美しいものを見ると、報酬系（ドーパミン）・感情系（扁桃体）・共感系（ミラーニューロン）が活性化する。芸術・自然・人の顔など「美」の基準は文化で異なるが、反応のメカニズムは普遍的。'},
    {q:'なぜ「睡眠不足」で判断力が下がるのか？',a:'前頭前野の機能低下',ex:'判断・計画・感情制御を担う前頭前野は睡眠不足に最も敏感な脳部位の一つ。睡眠不足が続くと「自分の判断力が落ちている」こと自体を認識する能力も低下する。'},
    {q:'なぜ人は「見返りを求めない行動」に感動するのか？',a:'互恵性規範への違反と純粋な利他主義への驚き',ex:'社会的な規範では「与えたら返ってくる」が基本。見返りを求めない純粋な行動は規範の違反であり、希少性から感動を生む。また自分もそうありたいという理想への共鳴もある。'},
    {q:'なぜ「孤独」と「一人でいること」は違うのか？',a:'孤独は繋がりの欠如感、一人でいることは物理的状態',ex:'孤独は心理的な状態（繋がりや理解を感じられないこと）であり、大勢の中でも感じる。一人でいることは物理的状態であり、充実した孤独時間（ソリチュード）は創造性・自己理解を高める。'},
    {q:'なぜ「締め切り」がないと人は動きにくいのか？',a:'双曲割引（現在バイアス）と側坐核の活性化不足',ex:'将来の報酬に対して現在の価値を過小評価する「双曲割引」が行動を先延ばしにする。締め切りは「今行動しないと損をする」という即時の脅威を作り出し、行動回路を活性化する。'},
    {q:'なぜ「比べること」をやめるのが難しいのか？',a:'社会的比較は生存本能から来る進化的特性',ex:'サバンナでは集団内での相対的地位が生存・繁殖に直結した。社会的比較は現代でも自動的に行われる。ただし「上方比較」（自分より上の人と比べること）は不幸を、「下方比較」は満足感を生みやすい。'},
    {q:'なぜ人は「謝られると」許しやすくなるのか？',a:'謝罪が認識のズレを埋め、感情的な負債を解消するから',ex:'謝罪は「相手も悪かったと認識している」ことの証明。認知的不協和が解消され、感情的な怒りが和らぐ。真摯な謝罪の5要素：認め・理解・謝罪・修復・再発防止。'},
    {q:'「今日」を最良の1日にするにはどうすればよいか？',a:'主観的な価値評価と感謝・意味の創造',ex:'最良の日かどうかは客観的な出来事ではなく解釈次第。その日に感謝できることを見つけ、意味ある行動をし、大切な人とつながることが「最良の日」を作る要因という研究がある。'},
    {q:'なぜ「昨日より今日の自分が成長している」実感が持ちにくいのか？',a:'変化が小さすぎて意識的に認識されないから（微小変化の錯覚）',ex:'1日の変化は微小すぎて主観的には感じにくい。日記・記録・比較が有効。「1%の改善を365日続けると37倍になる」という指数成長の概念がこの難しさと可能性を示す。'},
    {q:'なぜ「本当にやりたいこと」を見つけるのが難しいのか？',a:'社会的期待・恐怖・過去の経験が本来の欲求を覆い隠すから',ex:'教育・親・社会の期待が内面化され、本当の欲求と混同されやすい。また「やりたいこと」は考えるだけでは見つからず、様々な経験を通じて発見されることが多い。'},
    {q:'なぜ「聞き上手」は話し上手より価値があるとされるのか？',a:'人は話すことより聞いてもらうことを深く欲するから',ex:'研究では、聞いてもらうことは喜び・ドーパミン分泌・自己肯定感の向上につながる。良い聞き手は相手に「理解された」という感覚を与え、信頼と影響力を生む。'},
    {q:'「決断しない」という決断は、決断か？',a:'はい（不作為もまた行動の一種）',ex:'「何もしない」「先延ばしにする」ことも選択の結果。現状維持バイアスによって「決断しないこと」が「デフォルト」として選ばれやすい。作為と不作為の責任についての哲学的問い。'},
    {q:'なぜ人間の寿命は延び続けているのか？',a:'医療・衛生・栄養・教育の改善',ex:'過去200年で平均寿命は約2倍になった。乳幼児死亡率の低下・ワクチン・抗生物質・外科技術・公衆衛生の改善が主要因。加齢のメカニズム解明で将来さらに延びる可能性がある。'},
    {q:'「美しさ」は主観か客観か？',a:'両方の側面を持つ（普遍的要素と文化的要素）',ex:'顔の対称性や黄金比など普遍的に美しいとされる要素がある一方、痩せ・ふくよかなど体型の好みは文化・時代で大きく異なる。美の感覚は進化・文化・個人経験の複合産物。'},
    {q:'なぜ「気持ちを言葉にする」と楽になるのか？',a:'言語化が感情を処理する前頭前野を活性化するから',ex:'感情を言語化すること（affect labeling）は、扁桃体の過活動を抑制し、感情の強度を下げることが神経画像研究で示されている。日記療法・言語化療法の科学的根拠。'},
    {q:'「知らないことを知っている」のは強みか弱みか？',a:'強み（ソクラテスの「無知の知」）',ex:'自分の無知を自覚することが知恵の始まりだとソクラテスは説いた。「知らないことを知っている」ことで、謙虚に学び続ける姿勢が生まれる。「知っていると思い込む」ことが最大の危険。'},
    {q:'なぜ「共感」は時として人を傷つけるのか？',a:'過共感・共感疲労・偏った共感の問題',ex:'強すぎる共感は「共感疲労」を引き起こし支援者を消耗させる。また共感は自分と似た人により向けられやすく（内集団バイアス）、公平な判断を歪めることもある。'},
    {q:'「正直さ」と「優しさ」が衝突したとき、どちらを選ぶか？',a:'状況によって異なる（思いやりある正直さが理想）',ex:'完全な正直さは時として傷つける。しかし優しいだけの嘘は長期的に信頼を損なう。最も望ましいのは「思いやりを持った正直な言い方」であり、これは高度なコミュニケーション技術が必要。'},
    {q:'「挑戦」と「無謀」の違いは何か？',a:'計算されたリスクか否か',ex:'挑戦はリスクを分析・評価した上での行動、無謀はリスクを無視した行動。勇気は「恐れながらも進む」こと、無謀は「恐れを感じない」こと。リスク管理の意識が両者を分ける。'},
    {q:'なぜ「ユーモア」は人間だけのものとされるのか？',a:'高次の認知機能（不一致の認識と解決）が必要なため',ex:'笑いは「予期せぬ不一致」を認識し、それを無害なものとして解釈する複雑な認知プロセスを要する。チンパンジーにも笑いに似た反応があるが、概念的なユーモアは人間固有とされる。'},
    {q:'なぜ人は「答えのない問い」を問い続けるのか？',a:'意味の探求と不確実性への耐性のため',ex:'「なぜ生きるのか」「何が正しいのか」など答えのない問いに向き合うことが、人間としての深みを作る。フランクルは「意味の探求」が人間の根本的な動機だと語った。'},
    {q:'なぜ「失敗した経験」が「成功した経験」より強く記憶されるのか？',a:'ネガティビティバイアスと感情強度',ex:'失敗はネガティブ感情（恐怖・恥・悲しみ）を伴い、感情の強度が高いほど記憶は鮮明になる。また進化的に危険な出来事を覚えておく必要から、ネガティブな経験は優先的に記憶される。'},
    {q:'「自分らしく生きる」とはどういうことか？',a:'価値観・信念・感情に一致した選択をすること',ex:'自分の core values（核となる価値観）を知り、それに沿った選択をすること。他者の期待や社会規範ではなく、自分の内なる羅針盤に従うこと。これは自己認識と勇気を必要とする継続的なプロセス。'},
    {q:'「自由」とは何からの自由か？',a:'外的制約からの自由（消極的自由）と自己実現への自由（積極的自由）',ex:'Isaiah Berlinが区別した二つの自由概念。消極的自由（干渉からの自由）と積極的自由（自己実現の自由）。真の自由は両方のバランスが必要とも言われる。'},
    {q:'なぜ「夢を持つこと」が重要とされるのか？',a:'目標が認知・行動・動機づけを方向づけるから',ex:'明確な目標（夢）は脳のデフォルトモードネットワークを活性化し、関連する情報への注意を向け（カラーバス効果）、RAS（網様体賦活系）をフィルタリングする。夢は方向性と意味を与える。'},
    {q:'「経験」は必ず人を成長させるか？',a:'経験+内省+行動変容が揃って初めて成長につながる',ex:'経験そのものは成長を保証しない。「経験学習サイクル」（コルブ）では：経験→内省→概念化→実践という循環が必要。同じ失敗を繰り返す人は経験しても内省していない。'},
    {q:'なぜ「感謝の習慣」が幸福感を高めるのか？',a:'ポジティブな偏りの再構築（神経可塑性）',ex:'感謝の気持ちを意識的に記録・表現することで、脳のデフォルトの「脅威検知モード」がポジティブ情報の処理に偏りが生じる。幸福の神経回路が強化され、主観的幸福感が向上する。'},
    {q:'「知識」と「知恵」の違いは何か？',a:'知識は情報の蓄積、知恵は実践に活かせる判断力',ex:'知識はWHATを知ること、知恵はHOW・WHENの判断力。同じ知識を持っていても知恵のある人とない人では判断と行動が異なる。経験・内省・文脈理解が知識を知恵に変える。'},
    {q:'なぜ「孤独な天才」より「チームの天才」が成果を出しやすいのか？',a:'認知的多様性と相互補完（集合知）',ex:'研究によると多様なバックグラウンドを持つチームは同質なチームより問題解決が優れる。異なる視点・スキル・経験の組み合わせが「集合知」を生む。一人の天才より多様なチームが強い。'},
    {q:'なぜ人は「未完成のもの」が気になるのか？',a:'ザイガルニック効果（未完了のことは記憶に残りやすい）',ex:'1920年代の研究者ザイガルニックが発見した、未完成のタスクの方が完成したタスクより記憶に残りやすい現象。これがシリーズものの「続き」や未完の仕事が頭から離れない理由。'},
    {q:'「変化を恐れる心」はどこから来るのか？',a:'不確実性への不安と現状維持バイアス',ex:'人間の脳は不確実性を脅威として解釈する傾向がある。現状（たとえ不満でも）は「既知のリスク」であり、変化は「未知のリスク」。既知の悪より未知の可能性を恐れる傾向がある。'},
    {q:'「批判」を受け入れられる人とそうでない人の違いは？',a:'自己評価の安定性と固定型vs成長型マインドセット',ex:'キャロル・ドゥエックの「マインドセット」研究によると、固定型（才能は固定）の人は批判を自己否定と受け取り、成長型（努力で変わる）の人は学びの機会として受け取る。'},
    {q:'「後悔」は役に立つか？',a:'適切な後悔は行動変容と学習を促す',ex:'後悔は不快な感情だが、それが行動の改善につながれば有益。慢性的な後悔（反芻）は不健全。心理学では「後悔の最小化戦略」（ジェフ・ベゾスが使った意思決定フレームワーク）も知られている。'},
    {q:'なぜ「ありがとう」という言葉はこんなに強いのか？',a:'感謝の表現が双方の幸福感・関係性を高めるから',ex:'感謝を伝えることで受け手のドーパミン・セロトニンが増加し、関係の絆が深まる。送り手も感謝を表現することで主観的幸福感が向上する。「ありがとう」はWin-Winのコミュニケーション。'},
    {q:'「意志力」は筋肉と同じように鍛えられるか？',a:'ある程度は鍛えられるが、消耗もする（自我消耗理論）',ex:'バウマイスターの研究では意志力は使うと消耗する（自我消耗）とされた。ただし後続の研究では「意志力に限界がある」という信念自体がパフォーマンスを下げる可能性も示されている。'},
    {q:'「なりたい自分」に近づく最善の方法は？',a:'少しだけ背伸びをしながら毎日行動すること',ex:'心理学では「行動が先、感情が後」という原則がある。「なりたい自分のように行動する」ことで、やがてその行動が自然になる（行動活性化療法）。完璧を目指すより継続が重要。'},
    {q:'「老い」を受け入れることはできるか？',a:'精神的成熟と意味の再定義によって可能',ex:'老いへの抵抗は苦しみを生む。老年心理学では「老いを受け入れ、現在の自分の可能性を活かす」姿勢が幸福な老いに重要とされる。制約の中に新たな自由と深みを見出すプロセス。'},
    {q:'なぜ「当たり前」に感謝するのは難しいのか？',a:'快楽の適応（ヘドニック・アダプテーション）',ex:'人間は良い状況に慣れると当たり前と感じてしまう。これがリッチになっても幸せが続かない理由の一つ。意識的に当たり前への感謝を練習することで幸福感が維持される。'},
    {q:'「自分を愛する」ことは自己中心的か？',a:'適切な自己愛（セルフコンパッション）は利他的行動の基盤',ex:'自己中心的な自己愛（ナルシシズム）と健全なセルフコンパッション（自分への思いやり）は異なる。クリスティン・ネフの研究では、セルフコンパッションは共感性・向社会的行動を高めることが示されている。'},
    {q:'なぜ「深い話」は人と人を近づけるのか？',a:'自己開示の互恵性と脆弱性の共有',ex:'アーサー・アーロンの「36の質問」実験が示すように、段階的に深い自己開示をし合うと急速に親密性が増す。脆弱さを見せることが信頼を生み、深い繋がりを作る。'},
    {q:'「完璧な計画」と「不完全な実行」、どちらが価値があるか？',a:'不完全な実行（完璧な計画は実行されないことが多い）',ex:'ボルテールの「最善は善の敵」という言葉のように、完璧を追い求めることが行動を阻害する。「80%の完成度で実行し、改善していく」アジャイル思考が現代では重視される。'},
    {q:'なぜ「深呼吸」でリラックスできるのか？',a:'副交感神経の活性化（迷走神経を通じて）',ex:'ゆっくりとした長い呼気は副交感神経（安静系）を活性化し、心拍数・血圧を下げる。特に「4-7-8呼吸法」（吸気4秒・保持7秒・呼気8秒）は即効性の高いリラクゼーション技法。'},
    {q:'「読書」はなぜ脳に良いとされるのか？',a:'認知機能・共感力・語彙・ストレス軽減など多面的効果',ex:'読書中は視覚・言語・感情・記憶など脳の多くの領域が活性化する。フィクション読書は共感力を高め、難解な文章を読む習慣は認知予備力（認知症への耐性）を高める研究もある。'},
    {q:'なぜ「旅」は人を変えるのか？',a:'新しい環境が認知・価値観・自己概念を刺激するから',ex:'旅は日常のルーティンから離れ、新しい視点・価値観・自分の側面に気づかせる。「観光客」より「旅人」として現地に溶け込む体験が内面的変化を促す。'},
    {q:'「習慣化」に必要な期間は21日か？',a:'実際は平均66日（個人差と行動の複雑さによる）',ex:'「21日で習慣が変わる」は根拠薄弱なミス。ロンドン大学の研究では習慣形成に平均66日（18〜254日）かかることが判明。行動が単純ほど早く、複雑ほど時間がかかる。'},
    {q:'なぜ「プレゼント」を受け取るのが苦手な人がいるのか？',a:'受け取ることへの不安・価値観・自己評価の低さ',ex:'「もらうのが苦手」な人は、感謝の表現が難しい、対等でない関係への不安、自分が価値ある扱いを受けることへの違和感などが背景にあることが多い。これは受け取ることを練習することで改善できる。'},
    {q:'なぜ「沈黙」は時として言葉より雄弁なのか？',a:'非言語コミュニケーションと感情的安全性',ex:'適切な沈黙は「今この瞬間に完全に存在している」ことを示す。急いで言葉で埋めようとしないことが、相手の深い感情・思考を引き出す。カウンセリング・瞑想・リーダーシップで重要なスキル。'},

    {q:'なぜ月には「裏側」があるのか？（私たちは常に同じ面しか見えない）',a:'月の自転周期と公転周期が一致しているため（潮汐固定）',ex:'月は地球を一周するのと同じ時間で自転している（約27.3日）。これは地球の重力が月の自転を引き留めた「潮汐固定」という現象のため。月の裏側を最初に撮影したのは1959年のソ連の探査機ルナ3号。'},
    {q:'「完全な真実」は存在するか？',a:'哲学的には「見る人の視点に依存する」という立場と「客観的真実は存在する」という立場がある',ex:'感覚・言語・文化フィルターを通じて現実を認識する人間に、「完全に純粋な真実」が届くかは哲学の根本問題。科学的実在論と反実在論の議論が続く。'},
    {q:'なぜ「楽しい時間は短く感じ、退屈な時間は長く感じる」のか？',a:'注意の向け方と記憶の密度の違い',ex:'楽しいときは外の出来事に集中（注意が外向き）し記憶の密度が低く感じる。退屈なときは時間自体を意識（内的注意）し長く感じる。回顧すると楽しい時間ほど記憶が豊富で長く感じるという逆転現象も。'},
    {q:'なぜ「失恋の痛み」は身体的な痛みに似ているのか？',a:'社会的疼痛と身体的疼痛は同じ神経回路を使う',ex:'拒絶・別れの痛みは、脳の前帯状皮質（身体的な痛みを処理する部位）が活性化する。「心が痛い」という表現は比喩ではなく、神経科学的に正確な表現。鎮痛剤（アセトアミノフェン）が社会的痛みを軽減するという研究も。'},
    {q:'宇宙に「中心」はあるか？',a:'ない（またはどこでもが中心）',ex:'ビッグバンは特定の場所ではなく「空間全体」で始まった。宇宙の膨張は全方向に均等であり、どの場所を選んでも自分を中心に見える。「宇宙の端」も理論上は存在しない。'},
    {q:'「恥ずかしい」という感情はなぜ存在するのか？',a:'社会的評価への適応（社会的感情の進化）',ex:'恥は「他者からどう見られるか」への感情的反応。集団生活で社会規範に従わせる動機づけとして進化した。恥の文化（日本など）と罪の文化（西洋など）の違いも人類学的に研究されている。'},
    {q:'なぜ「習慣」は意識なしに実行されるのか？',a:'大脳基底核による手続き記憶の自動化',ex:'習慣は大脳基底核に「チャンク（一まとまりの行動）」として保存され、トリガーがあると自動的に実行される。意識的な思考が不要になることで認知資源を節約する仕組み。'},
    {q:'「道徳」は主観か客観か？',a:'哲学的に大きく分かれる問い（メタ倫理学の中心テーマ）',ex:'道徳実在論（客観的な道徳的事実がある）と道徳反実在論（道徳は主観的・文化的）の対立は続く。進化倫理学では、共感・互恵・公平感は進化的に形成された普遍的な基盤と見なす。'},
    {q:'なぜ同じ言葉でも受け取り方が違うのか？',a:'言葉には文脈・関係性・感情状態・過去経験によるフィルターがかかるから',ex:'コミュニケーションにおいて「意味」は送り手が作るのではなく、受け手が解釈によって作る。「メッセージは伝えたことではなく、受け取られたことだ」という通信理論の原則。'},
    {q:'なぜ人間は「不公平」に強く反応するのか？',a:'公平性感覚は霊長類共通の進化的特性',ex:'チンパンジーや子供でも不公平な分配を拒否することが実験で確認されている。「最後通牒ゲーム」では不公平な提案を損しても拒否する傾向がある。集団の協力を維持するための進化的メカニズム。'},
    {q:'「無限」は本当に存在するか？',a:'数学的には存在する（カントールの集合論）が、物理的な無限は議論中',ex:'数学では実無限（完成した無限集合）を扱うが、宇宙が有限かどうかは未解決。「実際の無限」が自然界に存在するかは物理学・哲学で現在も議論が続く。'},
    {q:'なぜ「知識を得ること」は快感なのか？',a:'好奇心の充足とドーパミン報酬系の活性化',ex:'脳は「予測と報酬」のサイクルで動く。知識の獲得は不確実性（予測できない状態）の解消であり、ドーパミンが放出される。好奇心は脳の「学習意欲回路」の本質。'},
    {q:'「親切にすること」は自己犠牲か？',a:'多くの場合、親切は自己の幸福感も高める（親切の逆説）',ex:'研究では他者への親切行為は、行為者自身のウェルビーイング・満足感・健康を高めることが示されている。「親切は自己犠牲」という見方より「Win-Winの行動」という側面が大きい。'},
    {q:'なぜ人は「認められたい」のに「目立つことを恐れる」のか？',a:'承認欲求と評価懸念の共存（スポットライト効果）',ex:'承認欲求は「良く見られたい」欲求、評価懸念は「悪く見られることへの恐れ」。両者は矛盾するように見えるが共存する。スポットライト効果：自分は思っているより他者に注目されていないという認知バイアス。'},
    {q:'「孤高」と「孤独」の違いは何か？',a:'孤高は選択的な孤立、孤独は繋がりの欠如感',ex:'孤高は自らの意志で独立した立場を選ぶ状態（ポジティブ）。孤独は求めているのに得られない繋がりへの渇望（ネガティブ）。一人でいることの質は、選択の有無と内面の充実度で決まる。'},
    {q:'なぜ「読書」は現実逃避とされることがあるのか？',a:'物語への没入が現実への注意を一時的に遮断するから',ex:'読書中に「テキスト・ワールド」に没入することは現実逃避に見えるが、実際は共感力・語彙・思考力を高める積極的な心理活動。適度な現実からの距離が精神的健康を保つこともある。'},
    {q:'なぜ「感謝される」と頑張れるのか？',a:'感謝はモチベーションの根本的な強化因子',ex:'感謝されることで自分の行動が意味あるものだったと確認され、自己効力感・存在価値の感覚が高まる。また感謝は社会的絆を強化し、次の親切行動を誘発するポジティブなフィードバックループを作る。'},
    {q:'「集中力」は鍛えられるか？',a:'ある程度は鍛えられる（注意制御の訓練）',ex:'マインドフルネス瞑想・ポモドーロ・テクニック・シングルタスクの習慣化が集中力向上に効果的とされる。しかし現代のデジタル環境（通知・SNS）は集中力を持続的に妨げる要因でもある。'},
    {q:'なぜ「美しい自然」を見ると心が落ち着くのか？',a:'生来の自然との親和性（バイオフィリア仮説）',ex:'E・O・ウィルソンが提唱したバイオフィリア仮説：人間は進化的に自然環境との繋がりを求める本能を持つ。自然の中では交感神経が鎮まり副交感神経が優位になり、ストレスホルモンが低下する。'},
    {q:'「正しく生きること」はどういうことか？',a:'哲学によって異なる（徳倫理学・功利主義・義務論など）',ex:'アリストテレスの「善い生（エウダイモニア）」、カントの「義務に従う行為」、功利主義の「最大多数の最大幸福」など、様々な倫理的立場が異なる答えを示す。普遍的な「正しさ」の定義は哲学の永遠の問い。'},
    {q:'なぜ「努力」は必ずしも報われないのか？',a:'結果は努力だけでなく、タイミング・才能・環境・運の複合産物',ex:'努力は結果に影響する重要な変数だが、唯一の変数ではない。生存者バイアス（成功した努力家だけが語られる）が「努力は必ず報われる」という幻想を強化する。'},
    {q:'「先生」と「生徒」、どちらがより多く学ぶか？',a:'教える側がより多く学ぶことが多い（プロテジェ効果）',ex:'「教えることで最もよく学ぶ」はラーニングピラミッドの概念。説明するために概念を整理・深化させる必要があるため、教える側の理解が深まる。「プロテジェ効果」とも呼ばれる現象。'},
    {q:'なぜ人間は「物語」なしでは生きられないのか？',a:'意味生成の基本ツールとして物語は不可欠',ex:'人間の脳はランダムな出来事にも因果関係（物語）を見出す「ナラティブ衝動」を持つ。自己同一性も「自分の人生の物語」として構成される。物語なしでは出来事に意味を見出せず、方向性を失う。'},
    {q:'「感情」は思考の邪魔か助けか？',a:'適切な感情は思考の重要な情報源（ダマジオのソマティック・マーカー仮説）',ex:'脳損傷で感情を失った患者は合理的に見えるが、実際には意思決定ができなくなる。感情は「身体が送る重要なシグナル」で、合理的判断に不可欠な情報を提供する。感情と理性は協力するもの。'},
    {q:'なぜ「天才」は孤独なことが多いのか？',a:'卓越した能力が同世代との共感・交流を難しくするから',ex:'知的・芸術的に卓越した人は、同じ興味・深さで交流できる相手が少なく孤立しやすい。一方で孤独が創造性を高める側面も。多くの芸術家・科学者が「生産的な孤独」を選んでいる。'},
    {q:'「思いやり」は技術か天性か？',a:'両方（気質的基盤＋後天的スキル）',ex:'共感能力には遺伝的な個人差がある（気質）が、思いやりの表現・実践は訓練できるスキル。マインドフルネス瞑想・思いやり瞑想（コンパッション・トレーニング）が有効だという研究がある。'},
    {q:'なぜ「冒険心」は大人になると薄れるのか？',a:'ネットワーク固定化と損失回避の増大',ex:'子供の脳は可塑性が高く失敗を恐れない。大人になると確立したアイデンティティ・責任・失敗コストが増大し、新しいことへの冒険が減る。「成長型マインドセット」を保つことで冒険心を維持できる。'},
    {q:'「時間を大切にする」とはどういうことか？',a:'量より質：意味・価値・充実感のある時間の使い方',ex:'時間の価値は長さではなく密度で決まる。「フロー状態」（完全な没入）での1時間は、だらだら過ごす10時間より価値があることも。時間の「量的管理」より「質的充実」が本質。'},
    {q:'なぜ「反省」は難しいのか？',a:'自我防衛機制と自己正当化バイアス',ex:'人間の脳は自己イメージを守るために行動を正当化する傾向がある（認知的不協和の回避）。真の反省には自己批判ではなく「自分を観察する力（メタ認知）」と「自己コンパッション」の両方が必要。'},
    {q:'なぜ同じ経験が人を成長させる場合と傷つける場合があるのか？',a:'解釈・サポート・個人の回復力（レジリエンス）の違い',ex:'同じ逆境でもPTSD（心的外傷）を負う人とPTG（心的外傷後成長）を経験する人がいる。違いを生むのは、出来事の意味の解釈・社会的サポート・コーピングスタイル・回復力。'},
    {q:'「嘘をつかない社会」は存在できるか？',a:'難しい（社会的潤滑剤としての小さな嘘の役割）',ex:'心理学研究では人は1日に平均1〜2回の嘘をつくとされる。多くは「白い嘘」（相手を傷つけないため）。完全な正直さは時として関係性を損なうこともあり、嘘は複雑な社会的機能を持つ。'},
    {q:'なぜ人は「過去の栄光」にしがみつくのか？',a:'アイデンティティの維持と現在への不満の回避',ex:'過去の成功体験はアイデンティティの重要な構成要素。現在・未来に不確実性や失望があるほど、安定した過去の栄光に戻ろうとする傾向が強まる（ノスタルジアの機能）。'},
    {q:'なぜ「変化」が怖いのか？',a:'脳は予測可能な状態を好み、不確実性を脅威と認識するから',ex:'前頭前野と扁桃体の相互作用で、未知の状況は潜在的脅威として処理される。変化は「既知の悪」から「未知の可能性」への移行を意味し、その不確実性が恐怖を生む。変化への適応能力はレジリエンスの核心。'},
    {q:'「夢中になること」と「依存すること」の違いは何か？',a:'自律性の有無（選択可能か強制されているか）',ex:'夢中（エンゲージメント）は自律的な没入で充実感・成長・コントロール感を伴う。依存（アディクション）は強迫的・選択不能・否定的結果があっても止められない状態。フロー状態は健全な夢中の最高形。'},
    {q:'なぜ人は「認められない才能」を持つことがあるのか？',a:'タイミング・環境・社会の価値観との不一致',ex:'ヴァン・ゴッホは生前ほぼ無名だったが死後に最高評価を受けた。才能の認識は時代・文化・評価者の価値観に左右される。「時代に合わない才能」は見過ごされることがある。'},
    {q:'「自分の意見を持つ」ことはなぜ大切か？',a:'自律的な思考が多様性・創造性・民主主義の基盤',ex:'「誰かの意見の伝達者」ではなく「自分で考え判断する存在」であることが個人の尊厳の核心。全員が同じ意見を持つ社会は全体主義に近づく。多様な意見の共存が社会を豊かにする。'},
    {q:'なぜ「完璧主義」と「先延ばし」はセットになりやすいのか？',a:'完璧でなければ始めない・完成できないという思考パターン',ex:'完璧主義者は「完璧な結果」か「何もしない」の二択思考に陥りやすい。完璧でない仕事を始めることへの抵抗が先延ばしを生む。「完了は完璧に勝る（Done is better than perfect）」という実践的な解決策。'},
    {q:'「幸運」を呼び寄せることはできるか？',a:'準備・開放性・楽観性が「運に見える結果」を増やす',ex:'心理学者リチャード・ワイズマンの研究では、「運が良い人」は実際には機会に気づく感度が高く、失敗をポジティブに解釈し、直感を信じて行動する傾向があった。「幸運」は能動的に創れる面がある。'},
    {q:'なぜ「良いことより悪いことを覚えている」のか？',a:'ネガティビティバイアス（進化的な生存戦略）',ex:'危険な出来事（天敵・毒物・社会的拒絶）の記憶は生存に直結したため、ネガティブな情報を優先的に記憶・処理するよう進化した。ポジティブな体験を長期記憶に定着させるには意識的な反復が必要。'},
    {q:'「人の心を動かす」のは何か？',a:'論理より感情・共感・物語',ex:'アリストテレスはレトリックの3要素としてロゴス（論理）・エトス（信頼）・パトス（感情）を示した。研究では意思決定の多くは感情が先行し、論理は後付けの正当化に使われることが多い。'},
    {q:'なぜ「自分を客観視すること」は難しいのか？',a:'メタ認知能力の限界と自己サービングバイアス',ex:'自分自身を観察する「メタ認知」は訓練で向上するが、自己評価は無意識のバイアスに歪められやすい（自分を平均以上に見る傾向など）。フィードバック・日記・瞑想が客観視を助けるツールになる。'},
    {q:'なぜ「昨日の答え」が「今日の問い」に合わないことがあるのか？',a:'環境と状況の変化により解決策の有効性が変わるから',ex:'過去の成功体験から導いた「答え」は当時の文脈に合ったもの。状況・技術・社会が変わると同じ方法が通用しなくなる。「昨日の正解は今日の誤りかもしれない」という柔軟な思考が必要。'},
    {q:'なぜ「人に教えること」が自分の学びになるのか？',a:'説明の過程で知識が整理・深化・強化される（プロテジェ効果）',ex:'教えるためには概念を明確化・体系化し、わかりやすい言葉に変換する必要がある。この過程で自分の理解の穴が発見され、より深い学びが生まれる。「教えることは二度学ぶこと」。'},
    {q:'「諦める」ことは弱さか？',a:'状況によっては最善の選択肢（賢明な撤退）',ex:'コンコルド効果（埋没費用の誤謬）：すでに投資した時間・お金・感情があるほど損な選択を続けてしまう。「諦める」は敗北ではなく、より良い選択肢へのリソース再配分。何を諦め何を続けるかの判断が重要。'},
    {q:'なぜ人は「他人に厳しく自分に甘い」のか？',a:'自己サービングバイアスと帰属の誤り',ex:'自分の失敗は状況のせい（外的帰属）、他人の失敗は性格のせい（内的帰属）にしやすい傾向（根本的帰属錯誤）。自己への批判的公正性と他者への共感的理解を意識的に高めることが対処法。'},
    {q:'なぜ「比較」は幸福を奪うのか？',a:'相対的評価が絶対的な豊かさへの感謝を妨げるから',ex:'「自分より上の人との比較」は常に不満を生む（上方比較の罠）。研究では SNS による他者との比較は抑うつ・不満を高めることが示されている。「過去の自分との比較」が最も建設的。'},
    {q:'なぜ「自分の声」を録音で聞くと違和感を感じるのか？',a:'骨導と気導の音の聞こえ方の違い',ex:'普段自分の声を聞くとき、空気振動（気導）と骨振動（骨導）の両方で聞いている。低周波が骨を通じて増幅されるため、自分の声は実際より低く豊かに聞こえる。録音は気導のみなので「違う声」に感じる。'},
    {q:'なぜ「眠い」のに眠れないことがあるのか？',a:'過覚醒・コルチゾール上昇・体内時計のズレなど複合要因',ex:'疲れているほど眠れないのは逆説。ストレスによるコルチゾール分泌が覚醒を維持、不安がREM睡眠を妨げる。また「眠ろうとすること」自体がプレッシャーとなり覚醒を高める「睡眠努力の逆効果」も。'},
    {q:'なぜ「ありがとう」より「ごめんなさい」の方が言いにくい人が多いのか？',a:'謝罪は自我の縮小感・プライドへの挑戦を伴うから',ex:'謝罪は「自分が間違っていた」と認めることで自己イメージへの脅威となる。感謝は自己を下げない。文化によっても大きく異なり、日本では謝罪が比較的容易な文化規範がある。'},
    {q:'なぜ「夕日」は特別に美しく見えるのか？',a:'希少性・儚さの認識と自然の色彩の組み合わせ',ex:'夕日の赤みはレイリー散乱（青い光が散乱されて赤みが残る）による。さらに「明日は来るか分からない」という儚さへの感受性、一日の終わりという時間的な意味付けが感動を深める。'},
    {q:'なぜ「怒り」は行動を生み出すのか？',a:'怒りはエネルギーと方向性を持つ感情',ex:'怒りは「不正が行われた」というシグナルで、変化を求める強力なモーターになる。公民権運動・環境運動など多くの社会変革は怒りが原動力だった。ただし怒りをどこに向けるかが結果を決める。'},
    {q:'なぜ「言葉には力がある」と言われるのか？',a:'言語は現実認識と感情を形成する（言語相対性仮説）',ex:'「言葉が思考を決める」というサピア＝ウォーフ仮説。ポジティブな言葉は脳のポジティブ回路を、ネガティブな言葉はストレス反応を活性化する研究がある。自分への語りかけの言葉が自己認識を形作る。'},
    {q:'なぜ「他者の痛み」に共感できるのか？',a:'ミラーニューロンと感情シミュレーション',ex:'他者が痛みを感じるのを見ると、自分の痛み回路が部分的に活性化する（シミュレーション理論）。これが共感の神経基盤。ただし物理的距離・社会的距離が遠いほど共感は薄れる傾向がある。'},
    {q:'「自己実現」とは何か？',a:'マズローの欲求階層の頂点：自分の潜在能力を最大限に発揮する状態',ex:'マズローによれば自己実現は「自分であることを完全に体現すること」で、特定の達成ではなくプロセス。好奇心・創造性・誠実さ・自律性などを特徴とする。人口の数%のみが継続的に達成するとした。'},
    {q:'なぜ「締め切り前の集中力」は普段と違うのか？',a:'脅威への反応と限られたリソースの効率的活用',ex:'締め切りは脅威として認識され、アドレナリン・ノルアドレナリンが分泌され集中力が高まる。また「残り時間」という制約がタスクの優先度を明確にし、余計な迷いを排除する効果もある。'},
    {q:'なぜ「深夜」は創造的なアイデアが浮かびやすいのか？',a:'前頭前野の活動低下が創造的思考を解放するから',ex:'夜は疲れやアルコールなどで前頭前野（批判的思考の中枢）の活動が低下し、連想的・非線形な思考が活発になる。また日中の情報処理が整理される時間でもあり、統合的なアイデアが生まれやすい。'},
    {q:'なぜ人は「自分が特別だ」と思いたいのか？',a:'自尊心の維持と独自性欲求（ユニークネス理論）',ex:'ティジョエルとリンによる独自性理論：人は「他者と同じでありたい」欲求と「独自でありたい」欲求の間でバランスをとる。自分を特別と思うことは自尊心・生きる意欲の維持に貢献する。'},
    {q:'なぜ「一流の人」ほど基本を大切にするのか？',a:'高度なスキルは基礎の完璧な実行から成り立つから',ex:'スポーツ・音楽・芸術のトップパフォーマーは基礎練習を怠らない。「基本ができていればどんな応用もできる」は技能習得の普遍的な原則。初心者は複雑な技術を求め、上級者は基礎に戻る傾向がある。'},
    {q:'なぜ「笑い」は痛みを和らげるのか？',a:'エンドルフィンの放出と痛み信号のブロッキング',ex:'笑いはエンドルフィン（内因性モルヒネ）を分泌させ、痛みの認識を低下させる。オックスフォード大学の研究では、大笑いの後に痛みの閾値が有意に上昇することが確認されている。'},
    {q:'なぜ「人間関係」は人生の幸福を最も左右するのか？',a:'社会的繋がりは生存・健康・意味感のすべてに影響するから',ex:'ハーバード成人発達研究（80年以上の追跡）では、健康・幸福・長寿の最大の予測因子は「温かい人間関係の質」だった。孤独は喫煙と同程度の健康リスクがある。'},
    {q:'なぜ人は「知らない人」に親切にできるのか？',a:'共感・道徳的感情・互恵的利他主義の組み合わせ',ex:'見知らぬ人への親切（利他主義）は進化的に説明が難しかったが、間接互恵性（評判）・血縁選択・共感の進化・文化的規範の組み合わせで説明される。親切は「種としての人間の強み」の一つ。'},
    {q:'なぜ「静かな環境」の方が集中できるのか？',a:'認知負荷の軽減と作業記憶への干渉減少',ex:'騒音は認知資源（特に作業記憶・処理速度）を消耗させる。音楽は好みと作業の種類によって効果が異なる（BGM効果）。創造的作業には適度な雑音（カフェ程度）が有益という研究もある。'},
    {q:'なぜ「過去の自分」は恥ずかしく見えるのか？',a:'成長の証拠と価値観・知識の更新',ex:'過去の自分を恥ずかしいと感じるのは、それ以来成長・変化した証拠。「昔の自分が恥ずかしい」と感じない人は成長していない可能性がある。これを「クリンジ」と呼び、成長の健全なサインとも言える。'},
    {q:'なぜ「目標を声に出す」と達成しにくくなることがあるのか？',a:'社会的満足感の先取りが行動のモチベーションを下げる',ex:'NYU のピーター・ゴルヴィツァーの研究：目標を他者に宣言することで、達成したような満足感（アイデンティティの更新）を先取りし、実際の行動への欲求が下がることがある。目標は秘密にする方が良い場合も。'},
    {q:'なぜ「後悔しない選択」をしようとするのが難しいのか？',a:'選択時には未来の後悔を正確に予測できないから（感情予測の誤り）',ex:'人間は未来の感情（特に後悔・喜び）を正確に予測できない（感情予測の誤り）。実際に体験した後悔は予測より小さいことが多く、「しなかったことへの後悔」の方が「したことへの後悔」より長く続く傾向がある。'},
    {q:'なぜ「怒りを抑える」のは短期的には有効でも長期的には有害か？',a:'感情抑圧はストレス・生理的緊張・爆発リスクを高めるから',ex:'感情（特に怒り）の抑圧は短期的に状況を収拾するが、長期的には心血管系への悪影響・うつ・バーンアウトのリスクを高める。怒りの健全な表現と処理（アサーティブコミュニケーション）が推奨される。'},
    {q:'なぜ「決断のスピード」が人生に影響するのか？',a:'機会コスト：決断の遅れが選択肢を減らす',ex:'決断を先延ばしにすると、機会の窓が閉じる・最良の時機を逃す・思考の負荷が蓄積するなどのコストが生じる。完璧な情報を待つより「十分な情報での迅速な決断」が多くの場合有利。'},
    {q:'なぜ「感情的になった時の判断」は後で後悔しやすいのか？',a:'扁桃体ハイジャック（感情が理性的判断を支配する）',ex:'強い感情（怒り・恐怖）は扁桃体を過活性化し、前頭前野（合理的判断）への接続を一時的にブロックする（ゴールマンの「扁桃体ハイジャック」）。感情が高ぶったときは重要な決断を避けるのが賢明。'},
    {q:'なぜ人は「自分の問題を他人に話したい」のか？',a:'言語化による感情処理と共感・サポートへの欲求',ex:'悩みを話すことで、①感情が言語化され整理される ②他者の共感で孤立感が軽減される ③解決策・視点を得られる という三重の効果がある。「話すことが療法になる」（talking cure）はフロイトが提唱した。'},
    {q:'なぜ「意識的な呼吸」がストレスを下げるのか？',a:'迷走神経の刺激による副交感神経の活性化',ex:'ゆっくりとした腹式呼吸は横隔膜を動かし迷走神経を刺激する。迷走神経は副交感神経系のメインの神経で、心拍数低下・消化促進・ストレス反応の抑制を引き起こす。「呼吸は自律神経へのリモコン」。'},
    {q:'なぜ「批判」は「称賛」より強く響くのか？',a:'ネガティビティバイアスと自己像への脅威',ex:'批判は自己イメージへの直接の挑戦として脅威として処理される。研究では良いフィードバックを消すには悪いフィードバックの5〜7倍のポジティブフィードバックが必要（ポジティビティ比）。'},
    {q:'なぜ「時間が経つほど思い出が美化される」のか？',a:'記憶の再構成とポジティブ偏向（バラ色の回顧）',ex:'記憶は固定したビデオではなく、想起のたびに再構成される。再構成の際、感情的に中性・ネガティブな詳細は省かれ、ポジティブな要素が残る傾向がある（バラ色の回顧・ノスタルジアの浄化作用）。'},
    {q:'なぜ「スマートフォン」を見るのをやめられないのか？',a:'間欠強化スケジュールによる依存形成',ex:'SNSの通知・いいね・新しい投稿は「予測不可能なタイミングで報酬が来る」間欠強化スケジュールを使う。これはカジノのスロットと同じ最も強力な学習スケジュールで、強迫的な確認行動を生む。'},
    {q:'なぜ「運動」はメンタルヘルスに良いのか？',a:'BDNF分泌・エンドルフィン・セロトニン・神経新生の複合効果',ex:'有酸素運動はBDNF（脳由来神経栄養因子）を分泌し神経細胞の成長を促進。また海馬（記憶・感情調節）での新しいニューロンの生成を促す。運動の抗うつ効果は薬物療法と同程度という研究もある。'},
    {q:'なぜ「言葉を選ぶこと」が重要なのか？',a:'言語は現実の認識を形作るフレームとして機能するから',ex:'「問題」を「課題」と言い換えるだけで取り組み方が変わる。言語フレーミング（メンタルモデル）は感情・行動・他者の認識に影響する。最も影響力のある人は言葉の選び方に細心の注意を払う。'},
    {q:'なぜ「一人の行動」が世界を変えられると信じることが重要か？',a:'自己効力感と社会変革の実際の歴史',ex:'ローザ・パークスの席を譲らない行動、グレタ・トゥーンベリの学校ストライキなど、一人の行動が世界的な運動のきっかけになった歴史は多い。「自分には変えられない」という無力感こそが最大の障壁。'},
    {q:'「今日」に集中することはなぜ難しいのか？',a:'デフォルトモードネットワーク（DMN）の過剰活動',ex:'脳は何もしていないとき（ぼーっとしているとき）にDMNが活性化し、過去の後悔・未来の不安・他者の評価など「今以外のこと」を自動的に考え始める。マインドフルネスはDMNの過剰活動を鎮める練習。'},
    {q:'なぜ「本物の自信」は静かなのか？',a:'真の自信は証明を必要とせず、内なる安定から来るから',ex:'誇示・自慢・傲慢は不安定な自信（外部評価への依存）のサイン。本物の自信（内的自己基盤）は静かで安定しており、他者に認められなくても揺らがない。「自信がある人ほど謙虚」という逆説。'},
    {q:'なぜ「日記を書くこと」が心理的に有益なのか？',a:'感情の外在化・整理・意味付けによる感情調節',ex:'ペネベイカーの開示研究：感情体験を書き出すことが感情処理を助け、免疫機能・幸福感・問題解決能力を向上させることが示された。思考の外在化（紙に書く）は頭の中の「心配の反芻」を減らす。'},
    {q:'なぜ「失敗した直後」が最も学べるのか？',a:'感情的覚醒が記憶の定着を強化し、改善意欲が高いから',ex:'失敗直後は感情的に高ぶっており、記憶が鮮明に定着しやすい。また「何がいけなかったか」への関心が最も高い時期。この窓を「失敗の振り返り」（デブリーフィング）に使うことが学習効果を最大化する。'},
    {q:'なぜ「深く考えること」が怖いことがあるのか？',a:'実存的不安と答えのない問いへの直面',ex:'「生きる意味」「死」「自由の重さ」などを深く考えると、不安・孤独・責任感が高まることがある（実存的不安）。多くの人はエンターテインメント・習慣・日常の忙しさでこの不安を回避する。'},
    {q:'「自分を変えたい」と思うのはいつか？',a:'苦痛・不満・希望・啓示のいずれかのきっかけ',ex:'変化の動機は ①今の状況の苦痛が変化のコストを上回ったとき ②より良い未来への希望が生まれたとき ③価値観を揺るがす体験（啓示）があったとき。この「変化のウィンドウ」を捉えることが自己変革の鍵。'},
    {q:'なぜ「音楽は記憶と結びつく」のか？',a:'感情記憶と音楽処理の脳回路の重なり（自伝的記憶との連合）',ex:'音楽は感情・記憶・場所・人を強く連結した「記憶のフック」として機能する。好きな曲を聴くと当時の記憶・感情が鮮明に甦るのは、海馬・扁桃体・聴覚野・報酬系が同時に活性化するため。'},
    {q:'なぜ「本を読むこと」は思考を変えるのか？',a:'他者の視点・思考プロセスを内面化するから',ex:'読書は著者の思考回路に沿って追体験する認知プロセス。特に物語文学は他者の内的世界を想像し共感する力（ToM：心の理論）を高める。良書は「思考の師匠」として機能する。'},
    {q:'なぜ「子供の時間」は大人の時間より豊かに感じるのか？',a:'新鮮な体験の密度と注意の質の違い',ex:'子供は多くを初体験し、全注意を向けて処理するため記憶が豊富で時間が長く感じる。大人は既知のパターンを素早く処理し注意が薄れ、時間が短く感じる。「初心者の心（ビギナーズ・マインド）」を持つことで豊かな時間を取り戻せる。'},
    {q:'なぜ「沈黙」を恐れる人と楽しめる人がいるのか？',a:'内向性・外向性と沈黙への意味付けの違い',ex:'外向性の高い人は沈黙を「接続の失敗」と不安に感じ、言葉で埋めようとする。内向性の高い人は沈黙を「静かな接続」として心地よく感じる傾向がある。文化的差異も大きい（日本は沈黙を肯定的に解釈する文化）。'},
    {q:'なぜ「希望を持つこと」が困難な状況でも有益なのか？',a:'希望はモチベーション・粘り強さ・問題解決を実際に改善する',ex:'ポジティブ心理学のスナイダーの希望理論：希望は「目標」「経路思考（どうやって達成するか）」「意欲思考（やり遂げる力があるという信念）」の3要素。希望の高い人は困難な状況での成果が実際に高い。'},
    {q:'なぜ「大切なものを大切にすること」は難しいのか？',a:'緊急性vs重要性のジレンマ（コヴィーの時間管理マトリクス）',ex:'人は「緊急だが重要でないこと」に時間を取られ、「重要だが緊急でないこと（家族・健康・成長）」を後回しにしがち。スティーブン・コヴィーの「7つの習慣」のマトリクスがこの問題の核心を示す。'},
    {q:'なぜ「素直さ」は最強の学習ツールとされるのか？',a:'防衛的反応を抑え、外からの情報を最大限取り込めるから',ex:'「もうわかっている」「自分は正しい」という防衛姿勢は学習の最大の障壁。素直さ（オープンネス）は新しい視点・フィードバック・経験を吸収する受容性を生む。初心者ほど伸びるのはこのため。'},
    {q:'「自分の価値」はどこから来るのか？',a:'条件的価値（成果・評価依存）vs無条件の価値（存在そのもの）',ex:'多くの人は「成果を出せば価値がある」という条件的な自己評価を内面化している。一方「存在するだけで価値がある」という無条件の自己尊重は、精神的健康の基盤。セルフコンパッションの核心概念。'},
    {q:'なぜ「今ここにいること」が難しいのか？',a:'人間の脳はデフォルトで過去・未来・他所に飛ぶ',ex:'ハーバードの研究では、人は起きている時間の約47%、「今やっていること以外のこと」を考えているという。この「心の彷徨（マインド・ワンダリング）」は幸福感と逆相関する。マインドフルネスはこれを鎮める実践。'},

    {q:'なぜ「旅」は価値観を変えるのか？',a:'文化的多様性への直接接触が自己の前提を問い直させる',ex:'異なる文化・生活様式に直接触れることで「こうあるべき」という暗黙の前提が可視化される。自分の文化的フィルターに気づき、価値観の相対化が起きる。旅は「見えていなかった自分を見る」プロセス。'},
    {q:'「継続」の本質は何か？',a:'習慣化・システム化・意味の維持の三位一体',ex:'継続の秘訣は ①習慣化（意識的努力が不要になるまで繰り返す） ②システム化（続けやすい環境・仕組みを作る） ③意味の維持（なぜやるかを時々確認する）。モチベーションは波があるため、システムに依存することが重要。'},
    {q:'なぜ「完成させること」が「始めること」より難しいのか？',a:'完璧主義・飽き・完成による変化への恐れなど複合要因',ex:'多くのプロジェクトは80%完成した段階で止まる。残りの20%が最も難しい（仕上げの80/20の逆説）。完成は「評価に晒される」というリスクを伴うため、無意識に先延ばしされる場合もある。'},
    {q:'なぜ人は「誰かを恋しく思う」のか？',a:'愛着・絆・喪失感の神経生物学的基盤',ex:'特定の人（愛着対象）との別れはオキシトシン・ドーパミン系の活動の変化を引き起こす。恋しさは「予期していた報酬（その人の存在）が得られない予測誤差」として脳が処理する。これが恋しさの痛みの源。'},
    {q:'なぜ「今の自分」を受け入れることが出発点になるのか？',a:'変化は否定からではなく受容から始まる（逆説的変容理論）',ex:'ゲシュタルト療法のアーノルド・バイサーの「逆説的変容理論」：「今の自分ではない何か」になろうとするほど変化は難しくなる。「今の自分を完全に受け入れた瞬間に変化が始まる」という逆説。'},

    {q:'なぜ「ありがとう」の一言が人を変えるのか？',a:'感謝は受け手の行動の意味と価値を確認するから',ex:'感謝は「あなたの行動が私にとって意味あるものだった」という最高のフィードバック。人は意味を感じると行動を続け、より良くなろうとする。最小コストで最大の影響を生む言葉。'},
    {q:'なぜ「声に出して読む」と記憶に残りやすいのか？',a:'産出効果（声に出すことで多重感覚が関与し記憶が強化される）',ex:'黙読より音読の方が記憶に残る「産出効果」。視覚・聴覚・発声運動が同時に働くことで記憶の符号化が強化される。自分の声を聞くことで、さらに注意が内容に向く。'},
    {q:'なぜ「食事を誰かと共にする」と美味しく感じるのか？',a:'共食効果と感情の社会的共有による食体験の増幅',ex:'食事の社会的側面（共食）は料理の知覚される美味しさを高める。感情や体験を誰かと共有することで、その体験の強度が増す「社会的増幅効果」。孤食より共食の方が実際に満足感が高いことが研究で示されている。'},
    {q:'なぜ「未来の自分」への手紙が自己変革を助けるのか？',a:'未来自己との心理的繋がりを強め、長期的視点を持たせるから',ex:'ハルサードらの研究：未来の自分を「他人のような存在」ではなく「連続した自分」として捉えることで、長期的な利益のための行動（貯蓄・健康管理）が増える。未来の自分への手紙はこの繋がりを強化する。'},
    {q:'なぜ「怒りをぶつけること」はストレス発散にならないのか？',a:'カタルシス理論は誤りで、怒りの表出は攻撃性を強化する',ex:'「感情を発散する（カタルシス）」という考えは直感的だが、研究では怒りを表出すると怒りが強化されることが示されている。代わりに怒りの認知的再評価（視点の変換）や問題解決が有効。'},

    {q:'なぜ人は「自分だけが知っている秘密」を持ちたいのか？',a:'自律性・独自性・プライバシーへの根本的欲求',ex:'秘密は「自分だけの領域」を持つことで自律性・独自性の感覚を与える。全てを開示することは自己の境界線の消失を意味する。適切な秘密は自己保護と親密な関係での選択的開示のバランスをとるもの。'},
    {q:'なぜ「子育て」は人間を変えるのか？',a:'自己中心性から脱却し、長期的視点と無条件の愛を経験するから',ex:'親になることで ①自分以外の存在の幸福が最優先になる ②何十年後という長期視点で考える ③無条件の愛（条件なしに愛する）を体験する。これらは人格・価値観・時間感覚を根本的に変える体験。'},
    {q:'なぜ「問いを持つこと」が答えを持つことより価値があるのか？',a:'良い問いが思考・探求・成長を駆動するから',ex:'「なぜ」「どうすれば」という問いは思考を前進させ、新たな視点・知識・解決策を生む。答えは文脈が変われば陳腐化するが、良い問いは永続的な探求のエンジンとなる。哲学者・科学者・起業家は皆、優れた問いを持つ人。'},
    {q:'なぜ「諦めない心」と「柔軟性」は矛盾しないのか？',a:'目標への執着と方法への柔軟性は共存できる',ex:'真の粘り強さは「同じ方法を何度も試みること」ではなく「目標は変えずに方法を変え続けること」。水が障害を迂回して流れ続けるように、目標への執着と手段の柔軟性の組み合わせが真の粘り強さ。'},
    {q:'なぜ「弱さを見せること」が強さの証明になるのか？',a:'脆弱性は真の勇気と信頼の源（ブレネー・ブラウンの研究）',ex:'脆弱性（ヴァルネラビリティ）を示すことは「コントロールできない何かに自分をさらす勇気」を必要とする。これは実際には強さの証明であり、真の繋がり・信頼・親密性はこの脆弱性の共有から生まれる。'},
    {q:'なぜ「今日を最高の日にできる」と信じることが重要か？',a:'自己成就予言：期待が行動に影響し、行動が結果に影響するから',ex:'「今日は良い日になる」という期待は注意の焦点・解釈・行動を変え、実際により良い日にする可能性を高める（ポジティブな自己成就予言）。認知・感情・行動のポジティブなサイクルを作る起点。'},
    {q:'なぜ「一歩一歩」が山を登る唯一の方法なのか？',a:'複雑な目標は分解されてのみ達成可能（チャンキングと段階的達成）',ex:'どんな偉大な成果も「一度に一歩ずつ」の積み重ねでしか達成できない。月に行くことも、一冊の本を書くことも、山を登ることも。巨大な目標を小さな次のステップに分解することが実行可能な行動の唯一の源。'},
  ];

  const PROMPTS = ['今日はなにがありましたか？','今日どんな一日でしたか？','今日印象に残ったことは？','今日の気持ちを教えてください。','今日うれしかったことは？','今日ちょっと困ったことは？','今日ふと思ったことを。','今日の発見を書きとめよう。','今日出会った言葉や景色は？','今日感謝したいことは？'];

  const mi = seed % MEIGEN_DATA.length;
  const zi = (seed + 7) % ZATSU_DATA.length;
  const ni = (seed + 13) % NAZO_DATA.length;

  // グローバルキャッシュに保存（showDiarySummaryから参照）
  window._todayData = {
    meigen:         MEIGEN_DATA[mi],
    zatsu:          ZATSU_DATA[zi],
    nazo:           NAZO_DATA[ni],
    seed:           seed
  };

  return {
    prompt:         PROMPTS[seed % PROMPTS.length],
    meigen:         MEIGEN_DATA[mi].m,
    meigen_author:  MEIGEN_DATA[mi].a,
    meigen_bg:      MEIGEN_DATA[mi].bg,
    zatsudan_title: ZATSU_DATA[zi].t,
    zatsudan_body:  ZATSU_DATA[zi].b,
    nazo_q:         NAZO_DATA[ni].q,
    nazo_a:         NAZO_DATA[ni].a,
    nazo_ex:        NAZO_DATA[ni].ex
  };
}

    zatsuHolder = document.createElement('div');
    zatsuHolder.id = 'zatsu-modal-body';
    zatsuHolder.style.display = 'none';

  }
  zatsuHolder.innerHTML = '<b>' + (result.zatsudan_title || '今日の雑学') + '</b><br>' + (result.zatsudan_body || '');

  // なぞなぞ
  var nazoHolder = document.getElementById('nazo-modal-body');
  if (!nazoHolder) {
    nazoHolder = document.createElement('div');
    nazoHolder.id = 'nazo-modal-body';
    nazoHolder.style.display = 'none';
    document.body.appendChild(nazoHolder);
  }
  nazoHolder.innerHTML = '<b>問題</b><br>' + (result.nazo_q || '') +
    '<br><br><details style="margin-top:12px;"><summary style="color:#8b4513;cursor:pointer;font-weight:bold;">▶ 答えを見る</summary>' +
    '<div style="margin-top:10px;"><b>答え</b><br>' + (result.nazo_a || '') +
    '<br><br><b>解説</b><br>' + (result.nazo_ex || '') + '</div></details>';

  // 日記プロンプト
  const promptEl = document.getElementById('diaryPrompt');
  if (promptEl && result.prompt) promptEl.textContent = result.prompt;
}

function renderCalendar2() {
  var label = document.getElementById('calMonthLabel2');
  var grid  = document.getElementById('calGrid2');
  if (!label || !grid) return;
  var today = new Date();
  label.textContent = calYear + '年 ' + (calMonth+1) + '月';
  var DOW = ['日','月','火','水','木','金','土'];
  var html = DOW.map(function(d,i) {
    var c = i===0?'#c0392b':i===6?'#2980b9':'#5a4a3a';
    return '<div style="text-align:center;font-size:11px;color:' + c + ';padding:4px 0;">' + d + '</div>';
  }).join('');
  var firstDay    = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for (var i=0; i<firstDay; i++) html += '<div></div>';
  for (var d=1; d<=daysInMonth; d++) {
    var k = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    var hasEntry = !!diaries[k];
    var dow = (firstDay + d - 1) % 7;
    var color = isToday ? 'white' : dow===0 ? '#c0392b' : dow===6 ? '#2980b9' : '#1a0800';
    var bg = isToday ? '#8b4513' : 'transparent';
    var dot = hasEntry ? '<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:' + (isToday?'rgba(255,255,255,0.8)':'#c17f3a') + ';"></span>' : '';
    html += '<div onclick="selectCal2(\'' + k + '\',' + d + ')" style="position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:8px;cursor:pointer;color:' + color + ';background:' + bg + ';">' + d + dot + '</div>';
  }
  grid.innerHTML = html;
}

function calPrev2() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar2(); }
function calNext2() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar2(); }

function selectCal2(key, d) {

    var totalLabel = totalScore >= 13 ? '★★★★★ 絶好調'
                   : totalScore >= 10 ? '★★★★☆ 好調'
                   : totalScore >= 8  ? '★★★☆☆ 普通'
                   : totalScore >= 6  ? '★★☆☆☆ やや注意'
                   : '★☆☆☆☆ 充電日';

    // 誕生石（日別 BIRTH_STONES から取得）

    var nextBirth = new Date(year2, bMonth-1, bDay);
    if (nextBirth <= td2) nextBirth = new Date(year2+1, bMonth-1, bDay);
    var daysToNext = Math.floor((nextBirth - td2) / 86400000);

    // 今日と同じ日かどうか
    var now = new Date();
    var isSameDay = (month === now.getMonth()+1 && day2 === now.getDate() && year2 === now.getFullYear());
    var _td = window._todayData || {};
    var zt = (_td.zatsu)  || {t:'', b:''};
    var mg = (_td.meigen) || {m:'', a:''};
    var nz = (_td.nazo)   || {q:'', a:'', ex:''};

    // まとめHTML

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// 初期化

async function init() {
  await loadFromStorage();
  var today = new Date();
  calYear  = today.getFullYear();
  calMonth = today.getMonth();

  buildHeader(today);
  var cards = buildCards(today);
  renderCards(cards);

  // カレンダーボタン
  // calBtn はカードとして実装

  // 日記入力
  var input = document.getElementById('diaryInput');
  var charCount = document.getElementById('charCount');
  input.addEventListener('input', function() {
    charCount.textContent = input.value.length + '文字';
  });
  document.getElementById('saveBtn').addEventListener('click', async function() {
    var text = input.value.trim();
    if (!text) { showToast('文字を入力してください'); return; }
    showConfirm('この内容で保存しますか？', text, async function(ok) {
      if (!ok) return;
      var key = formatDateKey(today);
      await saveDiary(key, text);
      input.value = '';
      charCount.textContent = '0文字';
      playSound('save');
      showToast('保存しました ✓');
      setTimeout(function() { showDiarySummary(today, text); }, 600);
    });
  });

  // AI非同期
  updateAICard(today);
  fetchNews();
}

// 今日のニュース（RSS取得）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 今日のニュース
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchNews() {
  var newsWord = document.getElementById('news-word'); // unused
  var newsBody = document.getElementById('news-modal-body');
  if (!newsWord || !newsBody) return;

  try {
    var res = await fetch('/api/news');
    if (!res.ok) throw new Error('status ' + res.status);
    var data = await res.json();
    var allItems = data.items || [];
    if (allItems.length === 0) throw new Error('no items');

    // カードプレビューなし

    var html = '';
    allItems.slice(0, 6).forEach(function(item) {
      var pub = '';
      try {
        var d = new Date(item.pubDate);
        pub = (d.getMonth()+1) + '/' + d.getDate() + ' '
          + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
      } catch(e) {}
      html += '<div style="border-bottom:1px solid rgba(139,69,19,0.15);padding-bottom:14px;margin-bottom:14px;">';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">';
      html += '<span style="background:#8b4513;color:white;font-size:10px;padding:2px 7px;border-radius:4px;">' + (item.label||'') + '</span>';
      if (pub) html += '<span style="font-size:11px;color:#5a4a3a;">' + pub + '</span>';
      html += '</div>';
      html += '<div style="font-size:15px;font-weight:600;color:#1a0800;line-height:1.6;margin-bottom:4px;">' + item.title + '</div>';
      if (item.description) html += '<div style="font-size:13px;color:#4a3a2a;line-height:1.7;">' + item.description + '</div>';
      if (item.link) html += '<a href="' + item.link + '" target="_blank" style="font-size:12px;color:#8b4513;display:inline-block;margin-top:6px;">続きを読む →</a>';
      html += '</div>';
    });
    newsBody.innerHTML = html;

  } catch(e) {
    // カードプレビューなし
    newsBody.innerHTML = '<div style="color:#5a4a3a;padding:10px;">ニュースを取得できませんでした。</div>';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 今日のまとめモーダル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showDiarySummary(today, diaryText) {
  var month = today.getMonth() + 1;
  var day   = today.getDate();
  var year  = today.getFullYear();
  var seed  = month * 100 + day;

  // 今日は何の日
  var todayEvent = TODAY_EVENTS[month + '/' + day];
  var eventName = todayEvent ? todayEvent[0] : '';

  // 総合運勢スコア
  var bd = new Date(settings.birthday);
  var bYear = bd.getFullYear(), bMonth = bd.getMonth()+1, bDay = bd.getDate();
  var honmeiIdx    = getKyuseiYear(bYear, bMonth, bDay);
  var dayStarIdx   = getKyuseiDay(today);
  var monthStarIdx = getKyuseiMonth(year, month, day);
  var yearStarIdx  = getKyuseiYear(year, 6, 15);
  var lsDay   = getKyuseiLuckScore(honmeiIdx, dayStarIdx);
  var lsMonth = getKyuseiLuckScore(honmeiIdx, monthStarIdx);
  var lsYear  = getKyuseiLuckScore(honmeiIdx, yearStarIdx);
  var totalScore = lsDay + lsMonth + lsYear;
  var totalLabel;
  if      (totalScore >= 13) totalLabel = '★★★★★ 絶好調';
  else if (totalScore >= 10) totalLabel = '★★★★☆ 好調';
  else if (totalScore >= 8)  totalLabel = '★★★☆☆ 普通';
  else if (totalScore >= 6)  totalLabel = '★★☆☆☆ やや注意';
  else                       totalLabel = '★☆☆☆☆ 充電日';

  // 誕生石・誕生花（日別データから直接取得）
  var stoneEntry2 = getStoneForDate(month + '/' + day);
  var stoneText = stoneEntry2 ? stoneEntry2.s : '';
  if (!stoneText && typeof BIRTH_STONES_MONTHLY !== 'undefined' && BIRTH_STONES_MONTHLY[month]) {
    stoneText = BIRTH_STONES_MONTHLY[month][0].s;
  }
  var fEntry2 = BIRTH_FLOWERS ? (BIRTH_FLOWERS[month + '/' + day] || null) : null;
  var flowerText = fEntry2 ? fEntry2.f : '';

  // かれこれ計算
  var bd2 = new Date(settings.birthday);
  bd2.setHours(0,0,0,0);
  var td = new Date(today); td.setHours(0,0,0,0);
  var diffDays = Math.floor((td - bd2) / 86400000) + 1;

  // 次の誕生日まで
  var nextBirth = new Date(year, bMonth-1, bDay);
  if (nextBirth <= td) nextBirth = new Date(year+1, bMonth-1, bDay);
  var daysToNext = Math.floor((nextBirth - td) / 86400000);

  // 雑学・言葉・なぞなぞ（グローバルキャッシュ）
  var _td = window._todayData || {};
  var zt = _td.zatsu  || {t:'', b:''};
  var mg = _td.meigen || {m:'', a:''};
  var nz = _td.nazo   || {q:'', a:'', ex:''};

  // HTML構築
  var html = '';
  html += '<div style="font-size:13px;color:#7a3010;letter-spacing:0.1em;margin-bottom:8px;">' + year + '年' + month + '月' + day + '日の日記</div>';

  // 1. 日記本文
  html += '<div style="background:rgba(255,255,255,0.6);border-radius:10px;padding:12px;margin-bottom:12px;font-size:15px;line-height:1.9;color:#1a0800;white-space:pre-wrap;">' + diaryText.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';

  // 2. 今日は何の日
  if (eventName) {
    html += '<div style="text-align:center;font-size:14px;font-weight:bold;color:#c17f3a;margin-bottom:10px;">📅 ' + eventName + '</div>';
  }

  // 3. 総合運勢
  html += '<div style="background:linear-gradient(135deg,rgba(139,69,19,0.10),rgba(193,127,58,0.16));border:1px solid #c17f3a;border-radius:10px;padding:10px;margin-bottom:10px;text-align:center;">';
  html += '<div style="font-size:12px;color:#c17f3a;margin-bottom:2px;">総合運勢　今日</div>';
  html += '<div style="font-size:17px;font-weight:bold;color:#7a3010;">' + totalLabel + '</div>';
  html += '</div>';

  // 4. 誕生石・誕生花
  html += '<div style="display:flex;gap:8px;margin-bottom:10px;">';
  html += '<div style="flex:1;background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;text-align:center;">';
  html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:4px;">💎 誕生石</div>';
  html += '<div style="font-size:15px;font-weight:bold;color:#1a0800;">' + stoneText + '</div></div>';
  html += '<div style="flex:1;background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;text-align:center;">';
  html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:4px;">🌸 誕生花</div>';
  html += '<div style="font-size:15px;font-weight:bold;color:#1a0800;">' + flowerText + '</div></div>';
  html += '</div>';

  // 5. かれこれ & 誕生日まで
  html += '<div style="display:flex;gap:8px;margin-bottom:12px;">';
  html += '<div style="flex:1;background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;text-align:center;">';
  html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:2px;">生まれてから</div>';
  html += '<div style="font-size:20px;font-weight:bold;color:#1a0800;">' + diffDays.toLocaleString() + '<span style="font-size:12px;">日目</span></div></div>';
  html += '<div style="flex:1;background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;text-align:center;">';
  html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:2px;">誕生日まで</div>';
  html += '<div style="font-size:20px;font-weight:bold;color:#1a0800;">' + daysToNext + '<span style="font-size:12px;">日</span></div></div>';
  html += '</div>';

  // 6. 今日の雑学
  if (zt.t) {
    html += '<div style="background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;margin-bottom:10px;">';
    html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:4px;">💡 今日の雑学</div>';
    html += '<div style="font-size:14px;font-weight:bold;color:#1a0800;margin-bottom:4px;">' + zt.t + '</div>';
    html += '<div style="font-size:13px;color:#4a3a2a;line-height:1.8;">' + zt.b + '</div></div>';
  }

  // 7. 今日の言葉
  if (mg.m) {
    html += '<div style="background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;margin-bottom:10px;">';
    html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:4px;">✦ 今日の言葉</div>';
    html += '<div style="font-size:14px;font-style:italic;color:#1a0800;line-height:1.8;margin-bottom:4px;">' + mg.m + '</div>';
    html += '<div style="font-size:12px;color:#5a4a3a;text-align:right;">― ' + mg.a + '</div></div>';
  }

  // 8. 今日のなぞなぞ
  if (nz.q) {
    html += '<div style="background:rgba(139,69,19,0.06);border-radius:10px;padding:10px;">';
    html += '<div style="font-size:11px;color:#c17f3a;margin-bottom:4px;">🧩 今日のなぞなぞ</div>';
    html += '<div style="font-size:13px;color:#1a0800;line-height:1.8;margin-bottom:6px;">' + nz.q + '</div>';
    html += '<details><summary style="color:#7a3010;cursor:pointer;font-size:13px;font-weight:bold;">▶ 答えを見る</summary>';
    html += '<div style="margin-top:8px;font-size:13px;color:#1a0800;line-height:1.8;"><b>答え</b><br>' + nz.a + '<br><br><b>解説</b><br>' + nz.ex + '</div></details></div>';
  }

  openDetailModal('📔', '今日のまとめ', html, null);
}

// 確認ダイアログ（Safari対応・独自実装）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showConfirm(title, preview, callback) {
  var old = document.getElementById('confirmModal');
  if (old) old.remove();
  var modal = document.createElement('div');
  modal.id = 'confirmModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(26,20,16,0.65);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;';
  var inner = document.createElement('div');
  inner.style.cssText = 'background:#1e1a16;border-radius:18px;width:100%;max-width:380px;padding:24px;';
  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'font-size:17px;font-weight:600;color:#c17f3a;margin-bottom:12px;text-align:center;';
  titleEl.textContent = title;
  inner.appendChild(titleEl);
  if (preview) {
    var prev = document.createElement('div');
    prev.style.cssText = 'background:rgba(139,69,19,0.06);border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:14px;color:#1a0800;line-height:1.8;max-height:120px;overflow-y:auto;white-space:pre-wrap;';
    prev.textContent = preview;
    inner.appendChild(prev);
  }
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;';
  var cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:1px solid rgba(139,69,19,0.3);background:transparent;font-size:15px;color:#5a4a3a;cursor:pointer;';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = function() { modal.remove(); document.body.classList.remove('modal-open'); if (callback) callback(false); };
  var okBtn = document.createElement('button');
  okBtn.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:none;background:#8b4513;font-size:15px;color:white;font-weight:bold;cursor:pointer;';
  okBtn.textContent = '保存する';
  okBtn.onclick = function() { modal.remove(); document.body.classList.remove('modal-open'); if (callback) callback(true); };
  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(okBtn);
  inner.appendChild(btnRow);
  modal.appendChild(inner);
  document.body.classList.add('modal-open');
  document.body.appendChild(modal);
  playSound('open');
}

  inner.style.cssText = 'background:#1e1a16;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;';
  var header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;';
  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'font-size:16px;font-weight:600;color:#7a3010;';
  titleEl.textContent = '✏️ 日記を編集';
  var closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'background:none;border:1px solid rgba(139,69,19,0.3);border-radius:50%;width:32px;height:32px;font-size:14px;color:#5a4a3a;cursor:pointer;';
  closeBtn.textContent = '✕';
  closeBtn.onclick = function() { modal.remove(); document.body.classList.remove('modal-open'); playSound('close'); };
  header.appendChild(titleEl);
  header.appendChild(closeBtn);
  inner.appendChild(header);
  var dateEl = document.createElement('div');
  dateEl.style.cssText = 'font-size:12px;color:#5a4a3a;margin-bottom:8px;';
  dateEl.textContent = dateLabel;
  inner.appendChild(dateEl);
  var ta = document.createElement('textarea');
  ta.id = 'editTextarea';
  ta.style.cssText = 'width:100%;min-height:150px;background:rgba(255,255,255,0.7);border:1px solid rgba(139,69,19,0.3);border-radius:12px;padding:12px;font-size:16px;color:#1a0800;resize:none;outline:none;caret-color:#8b4513;box-sizing:border-box;';
  ta.value = originalText;
  inner.appendChild(ta);
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;margin-top:12px;';
  var delBtn = document.createElement('button');
  delBtn.style.cssText = 'padding:12px 16px;border-radius:12px;border:1px solid rgba(200,50,50,0.4);background:transparent;font-size:14px;color:#c0392b;cursor:pointer;';
  delBtn.textContent = '🗑 削除';
  delBtn.onclick = function() { confirmDeleteEntry(key, entryIndex); };
  var saveBtn2 = document.createElement('button');
  saveBtn2.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:none;background:#8b4513;font-size:15px;color:white;font-weight:bold;cursor:pointer;';
  saveBtn2.textContent = '更新する';
  saveBtn2.onclick = function() { confirmEditEntry(key, entryIndex); };
  btnRow.appendChild(delBtn);
  btnRow.appendChild(saveBtn2);
  inner.appendChild(btnRow);
  modal.appendChild(inner);
  document.body.classList.add('modal-open');
  document.body.appendChild(modal);
  playSound('open');
  setTimeout(function(){ ta.focus(); }, 100);
}

async function confirmEditEntry(key, entryIndex) {
  var ta = document.getElementById('editTextarea');
  if (!ta) return;
  var newText = ta.value.trim();
  if (!newText) { showToast('文字を入力してください'); return; }
  var now = new Date();
  if (!diaries[key]) diaries[key] = [];
  diaries[key][entryIndex] = {
    text: newText,
    time: diaries[key][entryIndex] ? diaries[key][entryIndex].time : now.toISOString(),
    editedAt: now.toISOString()
  };
  try { await window.storage.set('diaries', JSON.stringify(diaries)); } catch(e) {}
  document.getElementById('editModal').remove();
  document.body.classList.remove('modal-open');
  playSound('save');
  showToast('更新しました ✓');
  var d = new Date(key + 'T00:00:00');
  selectCal2(key, d.getDate());
}

async function confirmDeleteEntry(key, entryIndex) {
  var editModal = document.getElementById('editModal');
  if (editModal) editModal.remove();
  document.body.classList.remove('modal-open');
  var modal = document.createElement('div');
  modal.id = 'deleteModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(26,20,16,0.65);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;';
  var inner = document.createElement('div');
  inner.style.cssText = 'background:#1e1a16;border-radius:18px;width:100%;max-width:340px;padding:24px;text-align:center;';
  var t1 = document.createElement('div');
  t1.style.cssText = 'font-size:17px;font-weight:bold;color:#c0392b;margin-bottom:8px;';
  t1.textContent = '🗑 削除しますか？';
  var t2 = document.createElement('div');
  t2.style.cssText = 'font-size:13px;color:#5a4a3a;margin-bottom:20px;';
  t2.innerHTML = 'この日記を削除します。<br>この操作は元に戻せません。';
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;';
  var cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:1px solid rgba(139,69,19,0.3);background:transparent;font-size:15px;color:#5a4a3a;cursor:pointer;';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = function() { modal.remove(); document.body.classList.remove('modal-open'); };
  var delBtn = document.createElement('button');
  delBtn.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:none;background:#c0392b;font-size:15px;color:white;font-weight:bold;cursor:pointer;';
  delBtn.textContent = '削除する';
  delBtn.onclick = async function() {
    if (!diaries[key]) return;
    diaries[key].splice(entryIndex, 1);
    if (diaries[key].length === 0) delete diaries[key];
    try { await window.storage.set('diaries', JSON.stringify(diaries)); } catch(e) {}
    modal.remove();
    document.body.classList.remove('modal-open');
    playSound('close');
    showToast('削除しました');
    var d = new Date(key + 'T00:00:00');
    selectCal2(key, d.getDate());
  };
  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(delBtn);
  inner.appendChild(t1);
  inner.appendChild(t2);
  inner.appendChild(btnRow);
  modal.appendChild(inner);
  document.body.classList.add('modal-open');
  document.body.appendChild(modal);
}


init();
</script>
</body>
